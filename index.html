<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="야구기록">
<meta name="theme-color" content="#1B3A6B">
<title>⚾ 우리아이 야구 기록 Ball Matrix</title>
<style>
:root{--navy:#1B3A6B;--red:#922B21;--bg:#f9fafb;--card:#ffffff;--bg2:#f3f4f6;--txt:#111827;--txt2:#6b7280;--bdr:#e5e7eb;--bdr2:#d1d5db;--r:8px;--rl:12px;--sfb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans KR',sans-serif}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg)}
.ghdr{background:var(--navy);color:#fff;padding:11px 14px;padding-top:calc(11px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gh-title{font-size:15px;font-weight:600}.gh-sub{font-size:11px;opacity:.72;margin-top:2px}
.gh-right{display:flex;align-items:center;gap:6px}
.gh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit}
.gh-icon{background:none;border:none;color:rgba(255,255,255,.75);font-size:20px;cursor:pointer;padding:2px;line-height:1;position:relative}
.pdot{position:absolute;top:1px;right:1px;width:7px;height:7px;border-radius:50%;background:#f59e0b;border:1.5px solid var(--navy)}
.tabbar{display:flex;background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0;padding-bottom:var(--sfb)}
.tab{flex:1;padding:8px 2px 10px;text-align:center;border:none;background:none;cursor:pointer;font-size:10px;color:var(--txt2);line-height:1.3;font-family:inherit}
.tab i{display:block;font-size:22px;margin-bottom:2px}
.tab.on{color:var(--navy)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.stabs{display:flex;margin:10px 12px 0;background:var(--bg2);border-radius:var(--r);padding:3px;gap:3px}
.stab{flex:1;padding:8px 4px;border:none;border-radius:6px;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit}
.stab.on{background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stab.bat.on{color:var(--navy)}.stab.pit.on{color:var(--red)}
.pcard{margin:10px 12px 0;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 14px}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pcard-l{display:flex;align-items:center;gap:10px}
.pav{width:38px;height:38px;border-radius:50%;background:var(--red);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcard-name{font-size:15px;font-weight:600;color:var(--txt)}.pcard-role{font-size:11px;color:var(--txt2);margin-top:1px}
.pchg{background:none;border:1px solid var(--bdr2);border-radius:var(--r);padding:5px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit}
.pstats{display:flex}
.pstat{flex:1;text-align:center;padding:0 4px}
.pstat:not(:last-child){border-right:1px solid var(--bdr)}
.pstat-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1}
.pstat-lbl{font-size:10px;color:var(--txt2);margin-top:3px}
.pstat.em .pstat-val{color:var(--red)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px}
.pbtn{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;min-height:52px;width:100%;text-align:left;font-family:inherit}
.pbtn:active{background:var(--bg2)}
.pbtn.sel-b{border:2px solid var(--navy);background:#EBF0FB}
.pbtn.sel-r{border:2px solid var(--red);background:#FDEDEC}
.pno{width:30px;height:30px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pno.b{background:var(--navy)}.pno.r{background:var(--red)}
.pn{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp{font-size:11px;color:var(--txt2)}
.ocsec{padding:8px 12px}
.oclbl{font-size:11px;font-weight:500;color:var(--txt2);padding:5px 0 5px}
.ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;padding:12px 4px;min-height:52px;line-height:1.25;width:100%;font-family:inherit}
.ocbtn:active{filter:brightness(.88);transform:scale(.97)}
.shdr{padding:11px 14px 0;display:flex;align-items:center;gap:9px}
.back{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:24px;padding:0;line-height:1}
.s-title{font-size:15px;font-weight:600;color:var(--txt)}.s-sub{font-size:11px;color:var(--txt2)}
.badge{padding:4px 11px;border-radius:var(--r);font-size:12px;font-weight:500}
.extras{display:grid;gap:8px;padding:8px 12px}
.excard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 8px;text-align:center}
.exlbl{font-size:11px;color:var(--txt2);margin-bottom:6px}
.exval{font-size:24px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:7px}
.exbtns{display:flex;justify-content:center;gap:10px}
.exbtn{width:30px;height:30px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--txt);font-family:inherit}
.callout{margin:8px 12px 0;background:var(--bg2);border-left:3px solid var(--navy);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;font-size:11px;color:var(--txt2);line-height:1.6}
.callout strong{color:var(--navy)}
.savewrap{padding:8px 12px 14px}
.savebtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.savebtn:active{background:#152f58}
.runlist{padding:8px 12px}
.runitem{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.runno{width:32px;height:32px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.runbtn{color:#fff;border:none;border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.runsec{padding:8px 12px}
.rbigrow{display:flex;gap:10px;margin-bottom:14px}
.rbigbtn{flex:1;padding:16px 10px;border:none;border-radius:var(--rl);cursor:pointer;text-align:center;font-size:14px;font-weight:600;line-height:1.4;font-family:inherit}
.rbigbtn:active{filter:brightness(.9)}
.rbigbtn.earn{background:#FDEDEC;color:var(--red);border:1px solid #F5B7B1}
.rbigbtn.uearn{background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr)}
.rminirow{display:flex;gap:8px;margin-bottom:12px}
.rmini{flex:1;background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.rminiv{font-size:22px;font-weight:700}
.rminil{font-size:10px;color:var(--txt2);margin-top:2px}
.rlogitem{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.rlogitem:last-child{border-bottom:none}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rdot.e{background:#e74c3c}.rdot.u{background:#95a5a6}
.rdel{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:18px;padding:2px;line-height:1}
.logitem{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:10px}
.logbadge{width:40px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.logplayer{font-size:13px;font-weight:600;color:var(--txt)}
.logdetail{font-size:11px;color:var(--txt2);margin-top:1px}
.delbtn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;font-size:19px;line-height:1}
.statwrap{overflow-x:auto;padding:0 12px 16px}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
th{padding:7px 5px;text-align:center;font-weight:600;white-space:nowrap;background:var(--navy);color:#fff}
table.pit th{background:var(--red)}
td{padding:6px 5px;text-align:center;border-bottom:1px solid var(--bdr);color:var(--txt);white-space:nowrap}
tr:nth-child(even) td{background:var(--bg2)}
.hi{color:var(--navy);font-weight:600}.hir{color:var(--red);font-weight:600}
.sth{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,.5)}
.sth:active{opacity:.7}
.seclbl{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.empty{padding:40px 20px;text-align:center;color:var(--txt2)}
.cfgwrap{padding:12px}
.cfgcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:15px;margin-bottom:10px}
.cfgtitle{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cfginput{width:100%;border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 11px;font-size:12px;font-family:'SF Mono',Consolas,monospace;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:8px;-webkit-appearance:none}
.cfginput:focus{border-color:var(--navy)}
.cfgrow{display:flex;gap:7px}
.cfgbtn{flex:1;padding:9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt);cursor:pointer;font-size:12px;text-align:center;font-family:inherit}
.cfgbtn.pr{background:var(--navy);color:#fff;border-color:var(--navy)}
.connst{display:none;margin-top:6px;font-size:11px}
.srow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.srow:last-of-type{border-bottom:none}
.srow span:first-child{color:var(--txt2)}
.syncbig{width:100%;margin-top:10px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.syncbig:active{background:#152f58}
.syncbig:disabled{opacity:.38;cursor:not-allowed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px;padding-bottom:calc(20px + var(--sfb));width:100%;max-width:430px;margin:0 auto;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:14px}
.modal input[type=text],.modal input[type=number],.modal input[type=date]{width:100%;border:1.5px solid var(--bdr2);border-radius:var(--r);padding:12px 14px;font-size:16px;font-family:inherit;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:10px;-webkit-appearance:none}
.modal input:focus{border-color:var(--navy)}
.mlbl{font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.mbtns{display:flex;gap:8px;margin-top:6px}
.mcancel{flex:1;padding:13px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:15px;font-family:inherit}
.mok{flex:2;padding:13px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit}
.em-lbl{font-size:11px;font-weight:600;color:var(--txt2);margin:10px 0 6px}
.em-ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:4px}
.em-ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:11px;font-weight:500;padding:9px 3px;min-height:44px;line-height:1.2;width:100%;font-family:inherit;transition:opacity .15s}
.em-row{display:grid;gap:8px;margin-bottom:10px}
.em-card{background:var(--bg2);border-radius:var(--r);padding:9px 8px;text-align:center}
.em-card-lbl{font-size:10px;color:var(--txt2);margin-bottom:5px}
.em-card-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:5px}
.em-card-btns{display:flex;justify-content:center;gap:8px}
.em-card-btn{width:26px;height:26px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.em-btns{display:flex;gap:8px;margin-top:14px}
.em-cancel{flex:1;padding:12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:14px;font-family:inherit}
.em-save{flex:2;padding:12px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.em-zone-of{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px}
.em-zone-if{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.em-zbtn{padding:8px 2px;border-radius:var(--r);font-size:11px;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:var(--bg2);color:var(--txt2)}
#toast{position:fixed;bottom:calc(72px + var(--sfb));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:99;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.ok{background:#15803d}#toast.err{background:#991b1b}#toast.off{opacity:0}
@keyframes flash{0%{background:#fde68a}100%{background:var(--card)}}
.flash{animation:flash .5s ease-out}
.cal-wrap{background:var(--card);border-bottom:1px solid var(--bdr)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.cal-nav span{font-size:15px;font-weight:700;color:var(--txt)}
.cal-nav button{width:32px;height:32px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 6px;gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;padding:4px 0;letter-spacing:.02em}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px;min-height:40px;border-radius:var(--r);cursor:default;gap:3px}
.cal-cell.has-game{cursor:pointer}
.cal-cell.has-game:active{background:var(--bg2)}
.cal-cell.selected{background:#EBF0FB}
.cal-day{font-size:13px;font-weight:400;color:var(--txt);line-height:1.2}
.cal-cell.selected .cal-day{font-weight:700;color:var(--navy)}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-legend{display:flex;gap:14px;padding:4px 14px 8px;font-size:11px;color:var(--txt2)}
.cal-legend span{display:flex;align-items:center;gap:5px}
.cal-summary{border-top:1px solid var(--bdr);padding:12px 14px}
.cal-sum-date{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cal-sum-player{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:3px}
.cal-sum-stat{font-size:13px;color:var(--txt);line-height:1.8}
</style>
</head>
<body>
<div id="app">
  <div id="ghdr"></div>
  <div class="content" id="ct"></div>
  <div class="tabbar" id="tbr"></div>
</div>
<div id="toast" class="off"></div>
<div id="modal-root"></div>
<script>
// ── 선수 명단 ─────────────────────────────────────────────
let ROSTER=[
  {no:1,name:"김민준",pos:"P",r:"p"},{no:2,name:"이서준",pos:"C",r:"b"},
  {no:3,name:"박도현",pos:"1B",r:"b"},{no:4,name:"최지호",pos:"2B",r:"b"},
  {no:5,name:"정우진",pos:"3B",r:"b"},{no:6,name:"강현서",pos:"SS",r:"b"},
  {no:7,name:"윤준혁",pos:"LF",r:"b"},{no:8,name:"임재원",pos:"CF",r:"b"},
  {no:9,name:"한승민",pos:"RF",r:"b"},{no:10,name:"오태양",pos:"DH",r:"b"},
  {no:11,name:"신동혁",pos:"P",r:"p"},{no:12,name:"배준서",pos:"P",r:"p"},
  {no:13,name:"류민성",pos:"IF",r:"b"},{no:14,name:"전하늘",pos:"OF",r:"b"},
  {no:15,name:"조재현",pos:"C",r:"b"},
];

// ── 타구 결과 정의 ────────────────────────────────────────
const OC_HIT=[
  {id:"1B",l:"안타",bg:"#22c55e",fg:"#166534"},
  {id:"2B",l:"2루타",bg:"#3b82f6",fg:"#1e3a8a"},
  {id:"3B",l:"3루타",bg:"#8b5cf6",fg:"#3b0764"},
  {id:"HR",l:"홈런",bg:"#ef4444",fg:"#7f1d1d"},
];
const OC_OB=[
  {id:"BB",l:"볼넷",bg:"#f59e0b",fg:"#78350f"},
  {id:"HBP",l:"사구",bg:"#f97316",fg:"#7c2d12"},
  {id:"IBB",l:"고의4구",bg:"#d97706",fg:"#78350f"},
];
const OC_OUT=[
  {id:"K",l:"삼진",bg:"#6b7280",fg:"#f9fafb"},
  {id:"GO",l:"땅볼",bg:"#e5e7eb",fg:"#374151"},
  {id:"FO",l:"뜬공",bg:"#e5e7eb",fg:"#374151"},
  {id:"DP",l:"병살타",bg:"#9ca3af",fg:"#1f2937"},
  {id:"SF",l:"희생플라이",bg:"#fde68a",fg:"#78350f"},
  {id:"SH",l:"희생번트",bg:"#fde68a",fg:"#78350f"},
  {id:"FC",l:"야선택",bg:"#e5e7eb",fg:"#374151"},
  {id:"E",l:"실책출루",bg:"#e5e7eb",fg:"#374151"},
];
const ALL_OC=[...OC_HIT,...OC_OB,...OC_OUT];
const BIP_OC=["1B","2B","3B","HR","GO","FO","DP","SF","FC","E"];
const UID=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function ocOuts(o){if(o==='DP')return 2;if(['K','GO','FO','SF','SH','FC'].includes(o))return 1;return 0;}
function ocInfo(id){return ALL_OC.find(x=>x.id===id)||{l:id,bg:"#e5e7eb",fg:"#374151"};}

// ── 앱 상태 ───────────────────────────────────────────────
let S={
  tab:0,
  // 타자 입력
  batSub:0,bs:0,bp:null,bo:null,brbi:0,bsb:0,bcs:0,bzone:null,
  // 투수 입력
  curPit:null,pitSub:0,
  // 통계
  sprayPlayer:null,statsFilter:'all',
  // 기록
  logGameId:null,calMonth:null,myPlayer:null,
  // 설정
  rosterSub:0,
  // 데이터
  game:null,gcnt:1,games:[],
  blog:[],pit_bf:[],pit_runs:[],
  // 동기화
  scriptUrl:"",lastSync:null,syncing:false,loading:false,rosterDirty:false,syncedIds:new Set(),
};

// ── 저장/불러오기 ──────────────────────────────────────────
function load(){
  try{
    const raw=localStorage.getItem('bb_final');
    if(raw){
      const d=JSON.parse(raw);
      ['blog','pit_bf','pit_runs','games','game','gcnt','scriptUrl','lastSync','rosterDirty'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
      if(d.myPlayer!=null)S.myPlayer=parseInt(d.myPlayer)||null;
      S.syncedIds=new Set(d.syncedIds||[]);

// ── 통계 계산 ─────────────────────────────────────────────
function paS(o){
  const noAB=["BB","IBB","HBP","SF","SH"],hits=["1B","2B","3B","HR"];
  return{pa:1,ab:noAB.includes(o)?0:1,h:hits.includes(o)?1:0,
    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:o==="K"?1:0,sf:o==="SF"?1:0};
}
// MLB 기준 등급 판별
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'▲'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'▼'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'—'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pn;
    if(!m[k])m[k]={name:k,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.r==='b');
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.r==='b');
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function pendingCount(){

    +'<div class="rmini"><div class="rminiv" style="color:var(--txt2)">'+ur+'</div><div class="rminil">비자책 (UER)</div></div>'
    +'<div class="rmini"><div class="rminiv">'+(er+ur)+'</div><div class="rminil">총 실점 (R)</div></div>'
    +'</div>';
  if(runs.length){
    h+='<p style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px">실점 기록</p><div>';
    runs.slice().reverse().forEach(e=>{
      h+='<div class="rlogitem"><div class="rdot '+(e.earned?'e':'u')+'"></div>'
        +'<div style="flex:1;font-size:12px;color:var(--txt2)">'+(e.earned?'자책점':'비자책점')+'</div>'
        +'<button class="rdel" onclick="delPitRun(\''+e.id+'\')">✕</button></div>';
    });
    h+='</div>';
  }
  return h+'</div>';
}

// ── 기록 탭 (전체 경기 목록) ──────────────────────────────
function rLog(){
  // 전체 경기 목록 수집
  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  // blog/pit_bf에서 game 정보 보완
  const knownGids=new Set(allGames.map(g=>g.id));
  const usedGids=[...new Set([...S.blog.map(e=>e.gid),...S.pit_bf.map(e=>e.gid)])].filter(Boolean);
  usedGids.forEach(gid=>{
    if(!knownGids.has(gid)){
      const sample=S.blog.find(e=>e.gid===gid)||S.pit_bf.find(e=>e.gid===gid);
      if(sample){allGames.push({id:gid,no:'?',date:sample.date||'',opp:sample.opp||'?'});knownGids.add(gid);}
    }
  });
  allGames.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!allGames.length)
    return'<div class="empty">📋<br><br>기록이 없습니다.</div>';

  // 선택 경기
  const selGid=S.logGameId||(S.game?S.game.id:allGames[0]&&allGames[0].id);

  // 달력 표시 월 결정 (기본: 현재 년/월)
  const now=new Date();
  const todayMon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let calMon=S.calMonth||todayMon;
  const calY=parseInt(calMon.slice(0,4)),calM=parseInt(calMon.slice(5,7));
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const nextMon=calM===12?(calY+1)+'-01':calY+'-'+String(calM+1).padStart(2,'0');
  const firstDow=new Date(calY,calM-1,1).getDay();
  const daysInMon=new Date(calY,calM,0).getDate();

  // 이 달의 경기 맵 {dd -> game}
  const gameMap={};
  allGames.forEach(g=>{
    if(g.date&&g.date.slice(0,7)===calMon){
      const dd=g.date.slice(8,10);
      if(!gameMap[dd])gameMap[dd]=g;
    }
  });

  // 달력 렌더
  const DOW=['일','월','화','수','목','금','토'];
  let h='<div class="cal-wrap">';
  h+='<div class="cal-nav">'
    +'<button onclick="S.calMonth=\''+prevMon+'\';renderCt()">&#8249;</button>'
    +'<span>'+calY+'년 '+calM+'월</span>'
    +'<button onclick="S.calMonth=\''+nextMon+'\';renderCt()">&#8250;</button>'
    +'</div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d,i){
    h+='<div class="cal-dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--txt2)')+'">'+d+'</div>';
  });
  for(var ei=0;ei<firstDow;ei++)h+='<div class="cal-cell"></div>';
  for(var day=1;day<=daysInMon;day++){
    var ds=String(day).padStart(2,'0');
    var g=gameMap[ds];
    var isSel=g&&g.id===selGid;
    var isOff=g&&(g.type||'O')==='O';
    var dow=new Date(calY,calM-1,day).getDay();
    var dc=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--txt)';
    var isCurG=g&&S.game&&g.id===S.game.id;
    h+='<div class="cal-cell'+(g?' has-game':'')+(isSel?' selected':'')+'"'
      +(g?' onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()"':'')+' >';
    h+='<span class="cal-day" style="color:'+dc+'">'+(isCurG?'<strong>'+day+'</strong>':day)+'</span>';
    if(g)h+='<span class="cal-dot" style="background:'+(isOff?'var(--navy)':'#16a34a')+'"></span>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="cal-legend">'
    +'<span><span class="cal-dot" style="background:var(--navy);display:inline-block"></span>정식경기</span>'
    +'<span><span class="cal-dot" style="background:#16a34a;display:inline-block"></span>연습경기</span>'
    +'</div>';

  // 선택 경기 요약
  const selGame=allGames.find(function(g){return g.id===selGid;});
  if(selGame){
    var sd=selGame.date||'';
    var sdParts=sd.split('-');
    var sdow=sd?['일','월','화','수','목','금','토'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOffSel=(selGame.type||'O')==='O';
    var isCurSel=S.game&&S.game.id===selGid;
    h+='<div class="cal-summary">';
    h+='<div class="cal-sum-date">';
    if(sd)h+=parseInt(sdParts[1])+'월 '+parseInt(sdParts[2])+'일 ('+sdow+') &nbsp;';
    h+='G'+(selGame.no||'?')+' vs '+selGame.opp;
    h+=' <span style="background:'+(isOffSel?'#EBF0FB':'#dcfce7')+';color:'+(isOffSel?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">'+(isOffSel?'정식':'연습')+'</span>';
    if(isCurSel)h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">진행중</span>';
    h+='</div>';

    // 대표 선수 기록
    if(S.myPlayer){
      var mp=ROSTER.find(function(x){return x.no===S.myPlayer;});
      if(mp){
        var mpBat=S.blog.filter(function(e){return e.gid===selGid&&e.pno===S.myPlayer;});
        var mpPit=S.pit_bf.filter(function(e){return e.gid===selGid&&e.pno===S.myPlayer;});
        h+='<div class="cal-sum-player">#'+mp.no+' '+mp.name+'</div>';
        if(mpBat.length){
          var bAB=0,bH=0,bRBI=0;
          mpBat.forEach(function(e){var s=paS(e.oc);bAB+=s.ab;bH+=s.h;bRBI+=e.rbi||0;});
          h+='<div class="cal-sum-stat">타격 · '+bAB+'타수 '+bH+'안타'+(bRBI?' · '+bRBI+'타점':'')+'</div>';
        }
        if(mpPit.length){
          var ps=calcPitStats(S.myPlayer,selGid);
          h+='<div class="cal-sum-stat">투수 · '+ps.ipd+'이닝'+(ps.r?' · '+ps.r+'실점 (자책 '+ps.er+')':'')+'</div>';
        }
        if(!mpBat.length&&!mpPit.length)
          h+='<div class="cal-sum-stat" style="color:var(--txt2)">이 경기 기록 없음</div>';
      }
    } else {
      h+='<div class="cal-sum-stat" style="color:var(--txt2);font-size:12px">설정에서 대표 선수를 지정하면 개인 기록이 표시됩니다.</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  const be=S.blog.filter(e=>e.gid===selGid);
  const pbf=S.pit_bf.filter(e=>e.gid===selGid);
  const pr=S.pit_runs.filter(e=>e.gid===selGid);

  if(!be.length&&!pbf.length){
    h+='<div class="empty" style="padding:24px">이 경기의 기록이 없습니다.</div>';
    return h;
  }

  if(be.length){
    h+='<div class="seclbl">타자 기록 ('+be.length+'타석)</div>';
    be.slice().reverse().forEach(e=>{
      const oc=ocInfo(e.oc);
      const ex=[];
      if(e.rbi>0)ex.push(e.rbi+'타점');
      if(e.run>0)ex.push(e.run+'득점');
      if(e.sb>0)ex.push('도루');
      if(e.zone)ex.push('📍'+e.zone);
      const sy=S.syncedIds.has(e.id);
      h+='<div class="logitem">'
        +'<div class="logbadge" style="background:'+oc.bg+';color:'+oc.fg+';font-size:10px">'+oc.l+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div class="logplayer">'+e.pn+' <span style="font-size:10px;color:'+(sy?'#15803d':'#f59e0b')+'">'+(sy?'✓':'●')+'</span></div>'
        +'<div class="logdetail">'+(ex.length?ex.join(' · '):'—')+'</div>'
        +'</div>'
        +'<button onclick="showEditBatModal(\''+e.id+'\')" style="background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 8px;font-size:11px;color:var(--txt2);cursor:pointer;margin-right:4px;font-family:inherit">✏</button>'
        +'<button class="delbtn" onclick="del(\'b\',\''+e.id+'\')">✕</button>'
        +'</div>';
    });
  }
  if(pbf.length){
    const pnos=[...new Set(pbf.map(e=>e.pno))];
    h+='<div class="seclbl">투수 기록 ('+pbf.length+'타자 상대)</div>';
    pnos.forEach(pno=>{
      const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
      const st=calcPitStats(pno,selGid);
      const pitRuns=pr.filter(e=>e.pno===pno);
      h+='<div class="logitem" style="background:var(--bg2);flex-direction:column;align-items:stretch;gap:5px">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<div class="logbadge" style="background:var(--red);color:#fff;font-size:11px">#'+pno+'</div>'
        +'<div style="flex:1"><div class="logplayer">'+p.name+'</div>'
        +'<div class="logdetail">'+st.ipd+'이닝 · '+st.h+'H · '+st.er+'ER · '+st.bb+'BB · '+st.k+'K</div></div>'
        +'</div>'
        +'<div style="padding-left:46px;display:flex;flex-direction:column;gap:4px">';
      pbf.filter(e=>e.pno===pno).slice().reverse().forEach(e=>{
        const oc=ocInfo(e.oc);const sy=S.syncedIds.has(e.id);
        h+='<div style="display:flex;align-items:center;gap:5px">'
          +'<span style="background:'+oc.bg+';color:'+oc.fg+';padding:2px 7px;border-radius:4px;font-size:11px">'+oc.l+'</span>'
          +'<span style="font-size:10px;color:'+(sy?'#15803d':'#f59e0b')+'">'+(sy?'✓':'●')+'</span>'
          +'<button onclick="showEditPitBfModal(\''+e.id+'\')" style="background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 7px;font-size:10px;color:var(--txt2);cursor:pointer;font-family:inherit">✏</button>'
          +'<button onclick="del(\'pbf\',\''+e.id+'\')" style="background:none;border:none;color:var(--txt2);cursor:pointer;font-size:14px;line-height:1">✕</button>'
          +'</div>';
      });
      if(pitRuns.length){
        h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">실점: ';
        pitRuns.forEach(r=>{
          h+='<span onclick="showEditPitRunModal(\''+r.id+'\')" style="cursor:pointer;text-decoration:underline;margin-right:8px">'+(r.earned?'자책':'비자책')+' ✏</span>';
        });
        h+='</div>';
      }
      h+='</div></div>';
    });
  }
  return h;
}

// ── 통계 탭 ──────────────────────────────────────────────
function rStats(){
  const sf=S.statsFilter||'all';
  let filtGids=null;
  if(sf!=='all'){
    filtGids=new Set(S.games.filter(g=>(g.type||'O')===sf).map(g=>g.id));
  }
  const bs=batAgg(filtGids),ps=pitAgg(filtGids);
  const totalG=S.games.length;
  const offG=S.games.filter(g=>(g.type||'O')==='O').length;
  const praG=S.games.filter(g=>g.type==='P').length;

  const fbBase='padding:6px 14px;border-radius:20px;border:1px solid var(--bdr);'
    +'font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;';
  const fbOn=fbBase+'background:var(--navy);color:#fff;border-color:var(--navy)';
  const fbOff=fbBase+'background:var(--card);color:var(--txt2)';

  let h='<div style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--bdr);background:var(--card)">'
    +'<button onclick="S.statsFilter=\'all\';renderCt()" style="'+(sf==='all'?fbOn:fbOff)+'">전체 '+totalG+'</button>'
    +'<button onclick="S.statsFilter=\'O\';renderCt()" style="'+(sf==='O'?fbOn:fbOff)+'">정식 '+offG+'</button>'
    +'<button onclick="S.statsFilter=\'P\';renderCt()" style="'+(sf==='P'?fbOn:fbOff)+'">연습 '+praG+'</button>'
    +'</div>';

  if(!bs.length&&!ps.length)return h+'<div class="empty" style="padding:32px">해당 경기 기록이 없습니다.</div>';

  if(bs.length){
    h+='<div class="seclbl">🏏 타자 기본 기록 <span style="font-size:10px;font-weight:400;color:var(--txt2)">— 이름 탭 → 스프레이 차트</span></div>'
      +'<div class="statwrap"><table><thead><tr>'
      +'<th style="text-align:left;min-width:62px">선수</th>'
      +'<th class="sth" onclick="showStatInfo(\'PA\')">PA</th>'
      +'<th class="sth" onclick="showStatInfo(\'AB\')">AB</th>'
      +'<th class="sth" onclick="showStatInfo(\'H\')">H</th>'
      +'<th class="sth" onclick="showStatInfo(\'2B\')">2B</th>'
      +'<th class="sth" onclick="showStatInfo(\'3B\')">3B</th>'
      +'<th class="sth" onclick="showStatInfo(\'HR\')" style="color:#fca5a5">HR</th>'
      +'<th class="sth" onclick="showStatInfo(\'RBI\')">RBI</th>'
      +'<th class="sth" onclick="showStatInfo(\'R\')">R</th>'
      +'<th class="sth" onclick="showStatInfo(\'BB\')">BB</th>'
      +'<th class="sth" onclick="showStatInfo(\'K\')">K</th>'
      +'<th class="sth" onclick="showStatInfo(\'SB\')">SB</th>'
      +'</tr></thead><tbody>';
    bs.forEach(s=>{
      const sel=S.sprayPlayer===s.name;
      h+='<tr style="cursor:pointer" onclick="setSprayPlayer(\''+s.name+'\')">'
        +'<td style="text-align:left;font-weight:700;color:'+(sel?'var(--navy)':'var(--txt)')+';text-decoration:'+(sel?'underline':'none')+'">'+s.name+(sel?' 📍':'')+'</td>'
        +'<td>'+s.pa+'</td><td>'+s.ab+'</td><td>'+s.h+'</td>'
        +'<td>'+s.d2+'</td><td>'+s.d3+'</td>'
        +'<td style="color:var(--red);font-weight:600">'+s.hr+'</td>'
        +'<td>'+s.rbi+'</td><td>'+s.run+'</td><td>'+s.bb+'</td><td>'+s.so+'</td><td>'+s.sb+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    if(S.sprayPlayer)h+=rSprayChart(S.sprayPlayer);
    h+='<div class="seclbl">📊 타자 세이버매트릭스 <span style="font-size:10px;font-weight:400;color:var(--txt2)">— 지표 탭하면 설명 · MLB 기준 색상</span></div>';
    // myPlayer 우선 정렬
    const sortedBs=S.myPlayer?[...bs].sort((a,b)=>(b.no===S.myPlayer?1:0)-(a.no===S.myPlayer?1:0)):bs;
    sortedBs.forEach(function(s){
      const isMy=S.myPlayer&&s.no===S.myPlayer;
      const heroData=[
        {key:'OPS',val:s.ops,fmt:s.ops.toFixed(3)},
        {key:'wRC+',val:s.wrc_plus,fmt:String(s.wrc_plus)},
        {key:'WAR',val:s.war,fmt:s.war.toFixed(1)},
      ];
      const detailData=[
        {key:'AVG',val:s.avg,fmt:s.avg.toFixed(3)},
        {key:'OBP',val:s.obp,fmt:s.obp.toFixed(3)},
        {key:'SLG',val:s.slg,fmt:s.slg.toFixed(3)},
        {key:'wOBA',val:s.woba,fmt:s.woba.toFixed(3)},
        {key:'ISO',val:s.iso,fmt:s.iso.toFixed(3)},
        {key:'BABIP',val:s.babip,fmt:s.babip.toFixed(3)},
        {key:'BB%',val:s.bbp,fmt:(s.bbp*100).toFixed(1)+'%'},
        {key:'K%',val:s.kp,fmt:(s.kp*100).toFixed(1)+'%'},
        {key:'BB/K',val:s.bbk>=99?0.99:s.bbk,fmt:s.bbk>=99?'∞':s.bbk.toFixed(2)},
      ];
      h+='<div style="margin:0 12px 12px;background:var(--card);border:'+(isMy?'2px solid var(--navy)':'1px solid var(--bdr)')+';border-radius:var(--rl);overflow:hidden">';
      // 카드 헤더
      h+='<div style="padding:9px 13px;background:'+(isMy?'#EBF0FB':'var(--bg2)')+';display:flex;align-items:center;justify-content:space-between">';
      h+='<div style="display:flex;align-items:center;gap:7px">';
      if(isMy)h+='<span style="background:var(--navy);color:#fff;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">대표</span>';
      h+='<span style="font-size:14px;font-weight:700;color:var(--txt)">'+s.name+'</span>';
      h+='</div>';
      h+='<span style="font-size:11px;color:var(--txt2)">'+s.pa+'PA · '+s.g+'G</span>';
      h+='</div>';
      // 핵심 지표 3칸
      h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bdr);border-top:1px solid var(--bdr)">';

        h+='<div style="font-size:22px;font-weight:800;color:'+st.fc+'">'+d.fmt+'</div>';
        h+='<div style="font-size:10px;color:'+st.fc+';margin-top:3px;font-weight:600">'+st.mark+(t==='good'?' 좋음':t==='bad'?' 낮음':' 보통')+'</div>';
        h+='</div>';
      });
      h+='</div>';
      // 세부 지표 9칸 (3x3)

        h+='<div style="font-size:9px;color:'+st.fc+';margin-top:2px">'+st.mark+'</div>';
        h+='</div>';
      });
      h+='</div>';
      h+='</div>';
    });
  }
  if(ps.length){
    h+='<div class="seclbl">⚾ 투수 기본 기록</div>'
      +'<div class="statwrap"><table class="pit"><thead><tr>'
      +'<th style="text-align:left;min-width:62px">선수</th>'
      +'<th>G</th><th>IP</th><th>H</th><th>BB</th>'
      +'<th style="color:#93c5fd">K</th><th style="color:#fca5a5">HR</th><th>ER</th><th>R</th>'
      +'</tr></thead><tbody>';
    ps.forEach(s=>{
      h+='<tr>'
        +'<td style="text-align:left;font-weight:700">'+s.name+'</td>'
        +'<td>'+s.g+'</td><td>'+s.ipd+'</td><td>'+s.h+'</td><td>'+s.bb+'</td>'
        +'<td style="color:#1d4ed8;font-weight:600">'+s.k+'</td>'
        +'<td style="color:var(--red)">'+s.hr+'</td>'
        +'<td style="color:var(--red);font-weight:600">'+s.er+'</td>'
        +'<td>'+s.r+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div class="seclbl">📈 투수 세이버매트릭스 <span style="font-size:10px;font-weight:400;color:var(--txt2)">— 지표 탭하면 설명 표시</span></div>'
      +'<div class="statwrap"><table class="pit"><thead><tr>'
      +'<th style="text-align:left;min-width:62px">선수</th>'

// ── 스프레이 차트 ─────────────────────────────────────────
function rSprayChart(playerName){
  var blog=S.blog.filter(function(e){return e.pn===playerName;});
  var entries=blog.filter(function(e){return e.zone;});
  var cx=175,cy=200,r=162;
  var SECTORS=[
    {label:'3루수', keys:['3B','LF'],           startDeg:-45,endDeg:-26,color:'#e74c3c',inner:'#922b21'},
    {label:'유격수', keys:['SS'],           startDeg:-26,endDeg:-8, color:'#f39c12',inner:'#d35400'},
    {label:'중앙',   keys:['LC','CF','RC'], startDeg:-8, endDeg:10, color:'#f1c40f',inner:'#d4ac0d'},
    {label:'2루수',  keys:['2B'],           startDeg:10, endDeg:28, color:'#2ecc71',inner:'#1e8449'},
    {label:'1루수',  keys:['1B','RF'],           startDeg:28, endDeg:45, color:'#16a085',inner:'#0e6655'},
  ];
  function pxy(deg){
    var rd=deg*Math.PI/180;
    return{x:cx+r*Math.sin(rd),y:cy-r*Math.cos(rd)};
  }
  function f(v){return v.toFixed(1);}
  var sc=SECTORS.map(function(s){
    return Object.assign({},s,{count:s.keys.reduce(function(a,k){return a+(entries.filter(function(e){return e.zone===k;}).length);},0)});
  });
  var total=sc.reduce(function(a,x){return a+x.count;},0);
  var noData=total===0;
  var h='';

  if(noData){
    // 데이터 없을 때도 팬 틀은 보여줌
    var bg0=pxy(-45),bg1=pxy(45);
    h+='<path d="M '+cx+' '+cy+' L '+f(bg0.x)+' '+f(bg0.y)+' A '+r+' '+r+' 0 0 1 '+f(bg1.x)+' '+f(bg1.y)+' Z" fill="rgba(255,255,255,.06)"/>';
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.18"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var ep={x:cx+(r*0.6)*Math.sin(mid*Math.PI/180),y:cy-(r*0.6)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.25)" font-size="11">'+s.label+'</text>';
    });
  } else {
    // 거리 반호
    [0.48,0.74].forEach(function(ratio){
      var s=pxy(-45),e=pxy(45);
      var ri=r*ratio;
      var si={x:cx+ri*Math.sin(-45*Math.PI/180),y:cy-ri*Math.cos(-45*Math.PI/180)};
      var ei={x:cx+ri*Math.sin(45*Math.PI/180),y:cy-ri*Math.cos(45*Math.PI/180)};
      h+='<path d="M '+f(si.x)+' '+f(si.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(ei.x)+' '+f(ei.y)+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-dasharray="3 4"/>';
    });
    // 섹터
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      var pct=Math.round(s.count/total*100);
      // 섹터 채움
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.88"/>';
      // 안쪽 어둠
      var ri=r*0.38;
      var p1i={x:cx+ri*Math.sin(s.startDeg*Math.PI/180),y:cy-ri*Math.cos(s.startDeg*Math.PI/180)};
      var p2i={x:cx+ri*Math.sin(s.endDeg*Math.PI/180),y:cy-ri*Math.cos(s.endDeg*Math.PI/180)};
      h+='<path d="M '+cx+' '+cy+' L '+f(p1i.x)+' '+f(p1i.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(p2i.x)+' '+f(p2i.y)+' Z" fill="'+s.inner+'" opacity="0.4"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var lp={x:cx+(r*0.62)*Math.sin(mid*Math.PI/180),y:cy-(r*0.62)*Math.cos(mid*Math.PI/180)};
      // % 텍스트 - 폰트 크기 조정
      h+='<text x="'+f(lp.x)+'" y="'+f(lp.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="10" font-weight="900" opacity=".95">'+pct+'%</text>';
      // 타구수
      if(s.count>0){
        h+='<text x="'+f(lp.x)+'" y="'+f(lp.y+15)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.6)" font-size="10">'+s.count+'타구</text>';
      }
      // 구역 레이블 - 호 가장자리
      var ep={x:cx+(r*0.87)*Math.sin(mid*Math.PI/180),y:cy-(r*0.87)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="9.5" font-weight="600" opacity="0.75">'+s.label+'</text>';
    });
  }

  // 구분선
  [-26,-8,10,28].forEach(function(deg){
    var ep=pxy(deg);
    h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(ep.x)+'" y2="'+f(ep.y)+'" stroke="rgba(0,0,0,.28)" stroke-width="1.5"/>';
  });
  // 파울라인
  var fl=pxy(-45),fr=pxy(45);
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fl.x)+'" y2="'+f(fl.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fr.x)+'" y2="'+f(fr.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  // 외야 펜스 호
  h+='<path d="M '+f(fl.x)+' '+f(fl.y)+' A '+r+' '+r+' 0 0 1 '+f(fr.x)+' '+f(fr.y)+'" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>';
  // 홈플레이트
  h+='<polygon points="'+cx+','+(cy-8)+' '+(cx+6)+','+(cy+1)+' '+(cx+3)+','+(cy+7)+' '+(cx-3)+','+(cy+7)+' '+(cx-6)+','+(cy+1)+'" fill="white" opacity=".9"/>';
  // 제목
  h+='<text x="175" y="12" text-anchor="middle" fill="white" font-size="13" font-weight="700" opacity=".9">'+playerName+'의 스프레이 차트</text>';
  h+='<text x="175" y="25" text-anchor="middle" fill="rgba(255,255,255,.42)" font-size="9.5">'+total+'타구 방향 기록 / 전체 '+blog.length+'타석</text>';

  // 하단 요약 통계
  var pull=sc[0].count+sc[1].count;
  var ctr=sc[2].count;
  var oppo=sc[3].count+sc[4].count;
  var pp=total>0?Math.round(pull/total*100):0;
  var cp=total>0?Math.round(ctr/total*100):0;
  var op=total>0?Math.round(oppo/total*100):0;

  return '<div style="padding:0 12px 8px">'
    +'<div style="background:#111827;border-radius:14px;overflow:hidden;padding:12px 0 10px">'
    +'<div style="display:flex;align-items:center;justify-content:flex-end;padding:0 12px 6px">'
    +'<button onclick="setSprayPlayer(&apos;'+playerName+'&apos;)" style="background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px;line-height:1">✕</button>'
    +'</div>'
    +'<svg viewBox="0 0 350 215" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'+h+'</svg>'
    // 범례
    +'<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 8px;flex-wrap:wrap">'
    +'<span style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#e74c3c"></span>당겨치기</span>'
    +'<span style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f39c12"></span>유격수</span>'
    +'<span style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f1c40f"></span>중앙</span>'
    +'<span style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2ecc71"></span>2루수</span>'
    +'<span style="font-size:10px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#16a085"></span>밀어치기</span>'
    +'</div>'
    // 3단 요약
    +(noData?('<div style="padding:0 12px;text-align:center;font-size:11px;color:rgba(255,255,255,.35)">타구 방향 데이터가 없습니다. 타석 입력 시 방향을 선택하면 표시됩니다.</div>'):('<div style="display:flex;gap:6px;margin:0 12px">'+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#f87171">'+pp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">당겨치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#fde047">'+cp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">중앙</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#4ade80">'+op+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">밀어치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:white">'+total+'</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">기록타구</div></div>')+'</div>'))
    +'</div></div>';
}

// ── 이벤트 핸들러 ─────────────────────────────────────────
function endGame(){
  if(!S.game)return;
  if(!confirm('vs '+S.game.opp+' 경기를 종료하시겠습니까?'))return;
  S.game=null;S.curPit=null;S.bs=0;S.batSub=0;S.ps=0;
  save();r();toast('경기 종료');
}
function selBat(no){S.bp=no;S.bs=1;r();}
function selOC(id){S.bo=id;S.brbi=S.bsb=S.bcs=0;S.bzone=null;S.bs=2;r();}
function selPit(no){S.curPit=no;S.pitSub=0;r();}
function adj(key,d){
  S[key]=Math.max(0,(S[key]||0)+d);
  const el=document.getElementById('ev-'+key);if(el)el.textContent=S[key];
}
function saveBat(){
  if(!S.game){toast('경기를 먼저 시작해주세요','err');return;}
  const p=ROSTER.find(x=>x.no===S.bp);
  S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,
    pno:p.no,pn:p.name,oc:S.bo,rbi:S.brbi,run:0,sb:S.bsb,cs:S.bcs,zone:S.bzone});
  save();toast(p.name+' '+ocInfo(S.bo).l+' 저장!','ok');S.bs=0;S.bzone=null;r();
}
function pitOC(id){
  if(!S.game){toast('경기를 먼저 시작해주세요','err');return;}
  const p=ROSTER.find(x=>x.no===S.curPit);
  S.pit_bf.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:p.no,pn:p.name,oc:id});
  save();const st=calcPitStats(S.curPit,S.game.id);
  toast(p.name+' '+ocInfo(id).l+' · '+st.ipd+'이닝 '+st.k+'K','ok');renderCt();
}
function addBatRun(pno){
  if(!S.game){toast('경기를 먼저 시작해주세요','err');return;}
  const entries=S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno);
  if(!entries.length){const p=ROSTER.find(x=>x.no===pno);S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:p.no,pn:p.name,oc:'_RUN',rbi:0,run:1,sb:0,cs:0});}
  else entries[entries.length-1].run=(entries[entries.length-1].run||0)+1;
  save();const p=ROSTER.find(x=>x.no===pno);toast(p.name+' 득점!','ok');
  const row=document.getElementById('rr-'+pno);
  if(row){row.classList.remove('flash');void row.offsetWidth;row.classList.add('flash');
    const c=row.querySelectorAll('div div')[1];if(c)c.textContent='이번 경기 '+getRunsThisGame(pno)+'득점';}
}
function addPitRun(earned){
  if(!S.game){toast('경기를 먼저 시작해주세요','err');return;}
  const p=ROSTER.find(x=>x.no===S.curPit);
  S.pit_runs.push({id:UID(),gid:S.game.id,pno:p.no,pn:p.name,earned});
  save();toast(p.name+' '+(earned?'자책점':'비자책점'),'ok');renderCt();
}
function delPitRun(id){S.pit_runs=S.pit_runs.filter(e=>e.id!==id);save();renderCt();}
function del(type,id){
  if(type==='b')S.blog=S.blog.filter(e=>e.id!==id);
  else if(type==='pbf')S.pit_bf=S.pit_bf.filter(e=>e.id!==id);
  S.syncedIds.delete(id);save();renderCt();
}

// ── 기록 편집 ─────────────────────────────────────────────
let editState={id:null,type:null,oc:null,rbi:0,run:0,sb:0,cs:0,zone:null,earned:null};
function showEditBatModal(id){
  const e=S.blog.find(x=>x.id===id);if(!e)return;
  editState={id,type:'bat',oc:e.oc,rbi:e.rbi||0,run:e.run||0,sb:e.sb||0,cs:e.cs||0,zone:e.zone||null,earned:null};
  renderEditModal();
}
function showEditPitBfModal(id){
  const e=S.pit_bf.find(x=>x.id===id);if(!e)return;
  editState={id,type:'pitbf',oc:e.oc,rbi:0,run:0,sb:0,cs:0,zone:null,earned:null};
  renderEditModal();
}
function showEditPitRunModal(id){
  const e=S.pit_runs.find(x=>x.id===id);if(!e)return;
  editState={id,type:'pitrun',oc:null,rbi:0,run:0,sb:0,cs:0,zone:null,earned:e.earned};
  renderEditModal();
}
function renderEditModal(){
  const es=editState;
  const isBat=es.type==='bat',isPitRun=es.type==='pitrun';
  const e=isBat?S.blog.find(x=>x.id===es.id):isPitRun?S.pit_runs.find(x=>x.id===es.id):S.pit_bf.find(x=>x.id===es.id);
  if(!e)return;
  const isBIP=BIP_OC.includes(es.oc);
  let h='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>'+(isBat?'타자':'투수')+' 기록 편집</h3>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:12px">'+e.pn+' · '+e.date+' vs '+e.opp+'</div>';
  if(isPitRun){
    h+='<div class="em-lbl">실점 종류</div>'
      +'<div style="display:flex;gap:10px;margin-bottom:10px">'
      +'<button onclick="editState.earned=true;renderEditModal()" style="flex:1;padding:14px;border:'+(es.earned===true?'2px solid var(--red)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(es.earned===true?'#FDEDEC':'var(--bg2)')+';color:'+(es.earned===true?'var(--red)':'var(--txt2)')+';cursor:pointer;font-size:14px;font-weight:600;font-family:inherit">자책점</button>'
      +'<button onclick="editState.earned=false;renderEditModal()" style="flex:1;padding:14px;border:'+(es.earned===false?'2px solid var(--navy)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(es.earned===false?'#EBF0FB':'var(--bg2)')+';color:'+(es.earned===false?'var(--navy)':'var(--txt2)')+';cursor:pointer;font-size:14px;font-weight:600;font-family:inherit">비자책점</button>'
      +'</div>';
  } else {
    h+='<div class="em-lbl">타석 결과</div><div class="em-ocgrid">';
    [...OC_HIT,...OC_OB].forEach(o=>{h+='<button class="em-ocbtn" style="background:'+o.bg+';color:'+o.fg+';opacity:'+(es.oc===o.id?1:.45)+'" onclick="editState.oc=\''+o.id+'\';'+(isBat?'editState.zone=null;':'')+'renderEditModal()">'+o.l+'</button>';});
    h+='</div><div class="em-ocgrid">';
    OC_OUT.forEach(o=>{h+='<button class="em-ocbtn" style="background:'+o.bg+';color:'+o.fg+';opacity:'+(es.oc===o.id?1:.45)+'" onclick="editState.oc=\''+o.id+'\';'+(isBat?'editState.zone=null;':'')+'renderEditModal()">'+o.l+'</button>';});
    h+='</div>';
  }
  if(isBat){
    const cols=es.oc!=='SH'?3:2;
    h+='<div class="em-row" style="grid-template-columns:repeat('+cols+',1fr)">';
    if(es.oc!=='SH')h+='<div class="em-card"><div class="em-card-lbl">타점</div><div class="em-card-val" id="em-rbi">'+es.rbi+'</div><div class="em-card-btns"><button class="em-card-btn" onclick="editState.rbi=Math.max(0,editState.rbi-1);document.getElementById(\'em-rbi\').textContent=editState.rbi">−</button><button class="em-card-btn" onclick="editState.rbi++;document.getElementById(\'em-rbi\').textContent=editState.rbi">+</button></div></div>';
    h+='<div class="em-card"><div class="em-card-lbl">득점</div><div class="em-card-val" id="em-run">'+es.run+'</div><div class="em-card-btns"><button class="em-card-btn" onclick="editState.run=Math.max(0,editState.run-1);document.getElementById(\'em-run\').textContent=editState.run">−</button><button class="em-card-btn" onclick="editState.run++;document.getElementById(\'em-run\').textContent=editState.run">+</button></div></div>';
    h+='<div class="em-card"><div class="em-card-lbl">도루</div><div class="em-card-val" id="em-sb">'+es.sb+'</div><div class="em-card-btns"><button class="em-card-btn" onclick="editState.sb=Math.max(0,editState.sb-1);document.getElementById(\'em-sb\').textContent=editState.sb">−</button><button class="em-card-btn" onclick="editState.sb++;document.getElementById(\'em-sb\').textContent=editState.sb">+</button></div></div>';
    h+='</div>';
    if(isBIP){
      h+='<div class="em-lbl">타구 방향 <span style="font-weight:400">(선택사항)</span></div>'
        +'<div class="em-zone-of">';
      ['LF','LC','CF','RC','RF'].forEach(z=>{
        const sel=es.zone===z;
        h+='<button class="em-zbtn" onclick="editState.zone=editState.zone===\''+z+'\'?null:\''+z+'\';renderEditModal()" style="border:'+(sel?'2px solid var(--navy)':'1px solid var(--bdr)')+';background:'+(sel?'#EBF0FB':'var(--bg2)')+';color:'+(sel?'var(--navy)':'var(--txt2)')+';font-weight:'+(sel?'700':'400')+'">'+z+'</button>';
      });
      h+='</div><div class="em-zone-if">';
      ['3B','SS','2B','1B'].forEach(z=>{
        const sel=es.zone===z;
        h+='<button class="em-zbtn" onclick="editState.zone=editState.zone===\''+z+'\'?null:\''+z+'\';renderEditModal()" style="border:'+(sel?'2px solid var(--red)':'1px solid var(--bdr)')+';background:'+(sel?'#FDEDEC':'var(--bg2)')+';color:'+(sel?'var(--red)':'var(--txt2)')+';font-weight:'+(sel?'700':'400')+'">'+z+'</button>';
      });
      h+='</div>';
    }
  }
  h+='<div class="em-btns"><button class="em-cancel" onclick="closeModal()">취소</button><button class="em-save" onclick="confirmEditEntry()">✓ 저장</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
}
function confirmEditEntry(){
  const es=editState;
  if(es.type==='bat'){
    const idx=S.blog.findIndex(x=>x.id===es.id);
    if(idx>=0){S.blog[idx]={...S.blog[idx],oc:es.oc,rbi:es.rbi,run:es.run,sb:es.sb,cs:es.cs,zone:es.zone};S.syncedIds.delete(es.id);}
  }else if(es.type==='pitbf'){
    const idx=S.pit_bf.findIndex(x=>x.id===es.id);
    if(idx>=0){S.pit_bf[idx]={...S.pit_bf[idx],oc:es.oc};S.syncedIds.delete(es.id);}
  }else if(es.type==='pitrun'){
    const idx=S.pit_runs.findIndex(x=>x.id===es.id);
    if(idx>=0){S.pit_runs[idx]={...S.pit_runs[idx],earned:es.earned};S.syncedIds.delete(es.id);}
  }
  save();closeModal();renderCt();toast('수정 완료 — 재동기화 필요','ok');
}

// ── 선수 관리 ─────────────────────────────────────────────
function showEditPlayerModal(no,role){
  const p=ROSTER.find(x=>x.no===no&&x.r===role);if(!p)return;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>선수 편집</h3>'
    +'<div class="mlbl">등번호</div><input type="number" id="ep-no" min="0" max="99" value="'+p.no+'">'
    +'<div class="mlbl">이름</div><input type="text" id="ep-name" value="'+p.name+'" maxlength="10">'
    +'<div class="mlbl">포지션</div><input type="text" id="ep-pos" value="'+p.pos+'" maxlength="5" placeholder="'+(role==='b'?'1B, SS, LF 등':'P')+'">'
    +'<div class="mbtns">'
    +'<button class="mcancel" onclick="deletePlayer('+no+',\''+role+'\')" style="background:#FDEDEC;color:var(--red);border-color:#F5B7B1;flex:1">삭제</button>'
    +'<button class="mok" onclick="confirmEditPlayer('+no+',\''+role+'\')" style="flex:2">저장</button>'
    +'</div></div></div>';
  setTimeout(()=>document.getElementById('ep-name').focus(),100);
}
function confirmEditPlayer(no,role){
  const nn=parseInt(document.getElementById('ep-no').value);
  const nm=document.getElementById('ep-name').value.trim();
  const np=document.getElementById('ep-pos').value.trim();
  if(!nm||!np){toast('이름과 포지션을 입력해주세요','err');return;}
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER[idx]={...ROSTER[idx],no:isNaN(nn)?no:nn,name:nm,pos:np};
  S.rosterDirty=true;save();closeModal();r();toast(nm+' 저장 완료','ok');
}
function deletePlayer(no,role){
  if(!confirm('이 선수를 삭제하시겠습니까?'))return;
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER.splice(idx,1);
  S.rosterDirty=true;save();closeModal();r();toast('삭제 완료');
}
function showAddPlayerModal(){
  const type=S.rosterSub===0?'b':'p';
  const nos=ROSTER.map(p=>p.no).filter(n=>!isNaN(n));
  const nextNo=nos.length?Math.max(...nos)+1:1;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>'+(type==='b'?'타자':'투수')+' 추가</h3>'
    +'<div class="mlbl">등번호</div><input type="number" id="ap-no" min="0" max="99" value="'+nextNo+'">'
    +'<div class="mlbl">이름</div><input type="text" id="ap-name" placeholder="선수 이름" maxlength="10">'
    +'<div class="mlbl">포지션</div><input type="text" id="ap-pos" placeholder="'+(type==='b'?'1B, 2B, SS, LF, CF, RF, C, DH':'P')+'" maxlength="5">'
    +'<div class="mbtns"><button class="mcancel" onclick="closeModal()">취소</button>'
    +'<button class="mok" onclick="confirmAddPlayer(\''+type+'\')">추가</button></div></div></div>';
  setTimeout(()=>document.getElementById('ap-name').focus(),100);
}
function confirmAddPlayer(type){
  const no=parseInt(document.getElementById('ap-no').value)||0;
  const name=document.getElementById('ap-name').value.trim();
  const pos=document.getElementById('ap-pos').value.trim();
  if(!name||!pos){toast('이름과 포지션을 입력해주세요','err');return;}
  ROSTER.push({no,name,pos,r:type});
  ROSTER.sort((a,b)=>a.no-b.no);
  S.rosterDirty=true;save();closeModal();r();toast(name+' 추가 완료','ok');
}

  'pitK%':{name:'삼진 비율 (K%)',desc:'상대한 타자 중 삼진으로 잡은 비율이에요. 높을수록 공이 강력한 투수예요.',tip:'25% 이상이면 탈삼진 능력이 좋은 투수예요.'},
  'pitBB%':{name:'볼넷 비율 (BB%)',desc:'상대한 타자 중 볼넷을 허용한 비율이에요. 낮을수록 제구력이 좋아요.',tip:'8% 이하면 제구가 안정적인 투수예요.'},
};
function showStatInfo(key){
  const info=STAT_INFO[key];
  if(!info)return;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="padding-bottom:calc(24px + var(--sfb))">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">'
    +'<div>'
    +'<div style="font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.05em;margin-bottom:4px">지표 설명</div>'
    +'<div style="font-size:18px;font-weight:700;color:var(--txt)">'+info.name+'</div>'
    +'</div>'
    +'<button onclick="closeModal()" style="background:var(--bg2);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);flex-shrink:0">✕</button>'
    +'</div>'
    +'<div style="background:var(--bg2);border-radius:var(--r);padding:14px 15px;margin-bottom:'+(info.tip?'12px':'0')+';">'
    +'<p style="font-size:14px;color:var(--txt);line-height:1.75;margin:0">'+info.desc+'</p>'
    +'</div>'
    +(info.tip?'<div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#EBF0FB;border-radius:var(--r)">'
      +'<span style="font-size:16px;line-height:1.4">💡</span>'
      +'<p style="font-size:13px;color:var(--navy);line-height:1.6;margin:0">'+info.tip+'</p>'
      +'</div>':'')
    +'</div></div>';
}
function showGameModal(){
  const today=new Date();
  const dd=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const curDate=S.game?S.game.date:dd;
  const curOpp=S.game?S.game.opp:'';
  const curType=S.game?(S.game.type||'O'):'O';
  const tbBase='flex:1;padding:9px 0;border-radius:var(--r);border:1px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s,color .15s';
  const tbOn=tbBase+';background:var(--navy);color:#fff;border-color:var(--navy)';
  const tbOff=tbBase+';background:var(--card);color:var(--txt2)';
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>'+(S.game?'경기 변경':'경기 시작')+'</h3>'
    +'<div class="mlbl">경기 날짜</div><input type="date" id="m-date" value="'+curDate+'">'
    +'<div class="mlbl">상대팀</div><input type="text" id="m-opp" placeholder="상대팀 이름" maxlength="20" value="'+curOpp+'">'
    +'<div class="mlbl">경기 종류</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:4px">'
    +'<button id="m-type-O" onclick="setGameType(\'O\')" style="'+(curType==='O'?tbOn:tbOff)+'">정식경기</button>'
    +'<button id="m-type-P" onclick="setGameType(\'P\')" style="'+(curType==='P'?tbOn:tbOff)+'">연습경기</button>'
    +'</div>'
    +'<input type="hidden" id="m-gtype" value="'+curType+'">'
    +'<div class="mbtns"><button class="mcancel" onclick="closeModal()">취소</button>'
    +'<button class="mok" onclick="confirmGame()">'+(S.game?'변경':'경기 시작')+'</button></div></div></div>';
  setTimeout(()=>document.getElementById('m-opp').focus(),100);
}
function setGameType(t){
  const base='flex:1;padding:9px 0;border-radius:var(--r);border:1px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
  ['O','P'].forEach(x=>{
    const b=document.getElementById('m-type-'+x);
    if(!b)return;
    b.style.cssText=base+(x===t?';background:var(--navy);color:#fff;border-color:var(--navy)':';background:var(--card);color:var(--txt2)');
  });
  document.getElementById('m-gtype').value=t;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function confirmGame(){
  const d=document.getElementById('m-date').value.trim();
  const o=document.getElementById('m-opp').value.trim();
  const t=document.getElementById('m-gtype').value||'O';
  if(!d||!o){toast('날짜와 상대팀을 입력해주세요','err');return;}
  S.game={id:UID(),no:S.gcnt++,date:d,opp:o,type:t};
  S.games.push({...S.game});
  S.curPit=null;save();closeModal();r();toast('vs '+o+' '+(t==='P'?'연습':'정식')+'경기 시작!');
}

// ── URL / 동기화 / 불러오기 ───────────────────────────────
function saveUrl(){S.scriptUrl=document.getElementById('url-input').value.trim();save();toast('URL 저장 완료','ok');r();}
async function testConn(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){toast('URL을 먼저 입력하세요','err');return;}
  const st=document.getElementById('connst');st.style.display='block';st.textContent='연결 확인 중...';st.style.color='#6b7280';
  try{
    const res=await fetch(url,{method:'GET'});
    if(res.ok){st.textContent='✓ 연결 성공!';st.style.color='#15803d';}
    else{st.textContent='⚠ 응답 오류 ('+res.status+')';st.style.color='#b45309';}
  }catch(e){st.textContent='✗ 연결 실패 - URL 확인';st.style.color='#991b1b';}
}
async function doSync(){
  if(!S.scriptUrl||S.syncing)return;
  const bP=S.blog.filter(e=>!S.syncedIds.has(e.id));
  const pfP=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
  const prP=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));
  const gP=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
  if(!bP.length&&!pfP.length&&!prP.length&&!S.rosterDirty){toast('동기화할 데이터 없음');return;}
  S.syncing=true;r();
  try{
    if(bP.length||pfP.length||prP.length||gP.length){
      const res=await fetch(S.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body:JSON.stringify({type:'sync',games:gP,bat_log:bP,pit_bf:pfP,pit_runs:prP})});
      const data=await res.json();
      if(data.status!=='ok')throw new Error(data.message||'서버 오류');
      bP.forEach(e=>S.syncedIds.add(e.id));
      pfP.forEach(e=>S.syncedIds.add(e.id));
      prP.forEach(e=>S.syncedIds.add(e.id));
      gP.forEach(g=>S.syncedIds.add('g_'+g.id));
    }
    if(S.rosterDirty){
      const rp=encodeURIComponent(JSON.stringify(ROSTER));
      const rr=await fetch(S.scriptUrl+'?action=saveRoster&data='+rp);
      const rd=await rr.json();
      if(rd.status==='ok')S.rosterDirty=false;
    }
    S.lastSync=Date.now();save();
    const total=bP.length+pfP.length+prP.length;
    toast('☁ 동기화 완료 ('+(total>0?total+'건':'선수명단')+'전송)','ok');
  }catch(e){toast('동기화 실패: '+e.message,'err');console.error(e);}
  S.syncing=false;r();
}
async function loadFromSheets(){
  if(!S.scriptUrl){toast('먼저 URL을 저장해주세요','err');return;}
  S.loading=true;r();
  try{
    const res=await fetch(S.scriptUrl+'?action=fetch');
    const data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'오류');
    let added=0;
    const exIds=new Set([...S.blog.map(e=>e.id),...S.pit_bf.map(e=>e.id),...S.pit_runs.map(e=>e.id)]);
    (data.bat_log||[]).forEach(e=>{if(!exIds.has(e.id)){S.blog.push(e);exIds.add(e.id);added++;}});
    (data.pit_bf||[]).forEach(e=>{if(!exIds.has(e.id)){S.pit_bf.push(e);exIds.add(e.id);added++;}});
    (data.pit_runs||[]).forEach(e=>{if(!exIds.has(e.id)){S.pit_runs.push(e);exIds.add(e.id);added++;}});
    (data.games||[]).forEach(g=>{if(!S.games.find(x=>x.id===g.id))S.games.push(g);});
    if(data.roster&&data.roster.length>0){ROSTER.splice(0,ROSTER.length,...data.roster);S.rosterDirty=false;}
    S.blog.forEach(e=>S.syncedIds.add(e.id));
    S.pit_bf.forEach(e=>S.syncedIds.add(e.id));
    S.pit_runs.forEach(e=>S.syncedIds.add(e.id));
    S.games.forEach(g=>S.syncedIds.add('g_'+g.id));
    save();
    const rMsg=data.roster&&data.roster.length>0?' / 선수 '+data.roster.length+'명':'';
    toast(added>0?'✓ '+added+'건 불러오기 완료'+rMsg:'✓ 이미 최신 데이터'+rMsg,'ok');
  }catch(e){toast('불러오기 실패 — URL 확인','err');console.error(e);}
  S.loading=false;r();
}

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('m-opp'))confirmGame();});
load();r();
</script>
