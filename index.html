<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="야구기록">
<meta name="theme-color" content="#1B3A6B">
<title>⚾ 우리아이 야구 기록 Ball Matrix</title>
<style>
:root{--navy:#1B3A6B;--red:#922B21;--bg:#f9fafb;--card:#ffffff;--bg2:#f3f4f6;--txt:#111827;--txt2:#6b7280;--bdr:#e5e7eb;--bdr2:#d1d5db;--r:8px;--rl:12px;--sfb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans KR',sans-serif}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;background:var(--bg)}
.ghdr{background:var(--navy);color:#fff;padding:11px 14px;padding-top:calc(11px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gh-title{font-size:15px;font-weight:600}.gh-sub{font-size:11px;opacity:.72;margin-top:2px}
.gh-right{display:flex;align-items:center;gap:6px}
.gh-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:inherit}
.gh-icon{background:none;border:none;color:rgba(255,255,255,.75);font-size:20px;cursor:pointer;padding:2px;line-height:1;position:relative}
.pdot{position:absolute;top:1px;right:1px;width:7px;height:7px;border-radius:50%;background:#f59e0b;border:1.5px solid var(--navy)}
.tabbar{display:flex;background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0;padding-bottom:var(--sfb)}
.tab{flex:1;padding:8px 2px 10px;text-align:center;border:none;background:none;cursor:pointer;font-size:11px;color:var(--txt2);line-height:1.3;font-family:inherit}
.tab i{display:block;font-size:22px;margin-bottom:2px}
.tab.on{color:var(--navy)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.stabs{display:flex;margin:10px 12px 0;background:var(--bg2);border-radius:var(--r);padding:3px;gap:3px}
.stab{flex:1;padding:8px 4px;border:none;border-radius:6px;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit}
.stab.on{background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stab.bat.on{color:var(--navy)}.stab.pit.on{color:var(--red)}
.pcard{margin:10px 12px 0;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:12px 14px}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pcard-l{display:flex;align-items:center;gap:10px}
.pav{width:38px;height:38px;border-radius:50%;background:var(--red);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pcard-name{font-size:15px;font-weight:600;color:var(--txt)}.pcard-role{font-size:11px;color:var(--txt2);margin-top:1px}
.pchg{background:none;border:1px solid var(--bdr2);border-radius:var(--r);padding:5px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit}
.pstats{display:flex}
.pstat{flex:1;text-align:center;padding:0 4px}
.pstat:not(:last-child){border-right:1px solid var(--bdr)}
.pstat-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1}
.pstat-lbl{font-size:11px;color:var(--txt2);margin-top:3px}
.pstat.em .pstat-val{color:var(--red)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px}
.pbtn{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;min-height:52px;width:100%;text-align:left;font-family:inherit}
.pbtn:active{background:var(--bg2)}
.pbtn.sel-b{border:2px solid var(--navy);background:#EBF0FB}
.pbtn.sel-r{border:2px solid var(--red);background:#FDEDEC}
.pno{width:30px;height:30px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pno.b{background:var(--navy)}.pno.r{background:var(--red)}
.pn{font-size:13px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp{font-size:11px;color:var(--txt2)}
.ocsec{padding:8px 12px}
.oclbl{font-size:11px;font-weight:500;color:var(--txt2);padding:5px 0 5px}
.ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;padding:12px 4px;min-height:52px;line-height:1.25;width:100%;font-family:inherit}
.ocbtn:active{filter:brightness(.88);transform:scale(.97)}
.shdr{padding:11px 14px 0;display:flex;align-items:center;gap:9px}
.back{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:24px;padding:0;line-height:1}
.s-title{font-size:15px;font-weight:600;color:var(--txt)}.s-sub{font-size:11px;color:var(--txt2)}
.badge{padding:4px 11px;border-radius:var(--r);font-size:12px;font-weight:500}
.extras{display:grid;gap:8px;padding:8px 12px}
.excard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 8px;text-align:center}
.exlbl{font-size:11px;color:var(--txt2);margin-bottom:6px}
.exval{font-size:24px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:7px}
.exbtns{display:flex;justify-content:center;gap:10px}
.exbtn{width:30px;height:30px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--txt);font-family:inherit}
.callout{margin:8px 12px 0;background:var(--bg2);border-left:3px solid var(--navy);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;font-size:11px;color:var(--txt2);line-height:1.6}
.callout strong{color:var(--navy)}
.savewrap{padding:8px 12px 14px}
.savebtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.savebtn:active{background:#152f58}
.runlist{padding:8px 12px}
.runitem{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.runno{width:32px;height:32px;border-radius:50%;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.runbtn{color:#fff;border:none;border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.runsec{padding:8px 12px}
.rbigrow{display:flex;gap:10px;margin-bottom:14px}
.rbigbtn{flex:1;padding:16px 10px;border:none;border-radius:var(--rl);cursor:pointer;text-align:center;font-size:14px;font-weight:600;line-height:1.4;font-family:inherit}
.rbigbtn:active{filter:brightness(.9)}
.rbigbtn.earn{background:#FDEDEC;color:var(--red);border:1px solid #F5B7B1}
.rbigbtn.uearn{background:var(--bg2);color:var(--txt2);border:1px solid var(--bdr)}
.rminirow{display:flex;gap:8px;margin-bottom:12px}
.rmini{flex:1;background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.rminiv{font-size:22px;font-weight:700}
.rminil{font-size:10px;color:var(--txt2);margin-top:2px}
.rlogitem{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.rlogitem:last-child{border-bottom:none}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rdot.e{background:#e74c3c}.rdot.u{background:#95a5a6}
.rdel{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:18px;padding:2px;line-height:1}
.logitem{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:10px}
.logbadge{width:40px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;text-align:center;line-height:1.2}
.logplayer{font-size:13px;font-weight:600;color:var(--txt)}
.logdetail{font-size:11px;color:var(--txt2);margin-top:1px}
.delbtn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;font-size:19px;line-height:1}
.statwrap{overflow-x:auto;padding:0 12px 16px}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
th{padding:7px 5px;text-align:center;font-weight:600;white-space:nowrap;background:var(--navy);color:#fff}
table.pit th{background:var(--red)}
td{padding:6px 5px;text-align:center;border-bottom:1px solid var(--bdr);color:var(--txt);white-space:nowrap}
tr:nth-child(even) td{background:var(--bg2)}
.hi{color:var(--navy);font-weight:600}.hir{color:var(--red);font-weight:600}
.sth{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;text-decoration-color:rgba(255,255,255,.5)}
.sth:active{opacity:.7}
.seclbl{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.empty{padding:40px 20px;text-align:center;color:var(--txt2)}
.cfgwrap{padding:12px}
.cfgcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:15px;margin-bottom:10px}
.cfgtitle{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cfginput{width:100%;border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 11px;font-size:12px;font-family:'SF Mono',Consolas,monospace;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:8px;-webkit-appearance:none}
.cfginput:focus{border-color:var(--navy)}
.cfgrow{display:flex;gap:7px}
.cfgbtn{flex:1;padding:11px 9px;min-height:44px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt);cursor:pointer;font-size:12px;text-align:center;font-family:inherit}
.cfgbtn.pr{background:var(--navy);color:#fff;border-color:var(--navy)}
.connst{display:none;margin-top:6px;font-size:11px}
.srow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--bdr)}
.srow:last-of-type{border-bottom:none}
.srow span:first-child{color:var(--txt2)}
.syncbig{width:100%;margin-top:10px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.syncbig:active{background:#152f58}
.syncbig:disabled{opacity:.38;cursor:not-allowed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end}
.modal{background:var(--card);border-radius:var(--rl) var(--rl) 0 0;padding:20px 16px;padding-bottom:calc(20px + var(--sfb));width:100%;max-width:430px;margin:0 auto;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:14px}
.modal input[type=text],.modal input[type=number],.modal input[type=date]{width:100%;border:1.5px solid var(--bdr2);border-radius:var(--r);padding:12px 14px;font-size:16px;font-family:inherit;color:var(--txt);background:var(--bg2);outline:none;margin-bottom:10px;-webkit-appearance:none}
.modal input:focus{border-color:var(--navy)}
.mlbl{font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.mbtns{display:flex;gap:8px;margin-top:6px}
.mcancel{flex:1;padding:13px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:15px;font-family:inherit}
.mok{flex:2;padding:13px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit}
.em-lbl{font-size:11px;font-weight:600;color:var(--txt2);margin:10px 0 6px}
.em-ocgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:4px}
.em-ocbtn{border:none;border-radius:var(--r);cursor:pointer;font-size:11px;font-weight:500;padding:9px 3px;min-height:44px;line-height:1.2;width:100%;font-family:inherit;transition:opacity .15s}
.em-row{display:grid;gap:8px;margin-bottom:10px}
.em-card{background:var(--bg2);border-radius:var(--r);padding:9px 8px;text-align:center}
.em-card-lbl{font-size:10px;color:var(--txt2);margin-bottom:5px}
.em-card-val{font-size:20px;font-weight:600;color:var(--txt);line-height:1;margin-bottom:5px}
.em-card-btns{display:flex;justify-content:center;gap:8px}
.em-card-btn{width:26px;height:26px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.em-btns{display:flex;gap:8px;margin-top:14px}
.em-cancel{flex:1;padding:12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);color:var(--txt2);cursor:pointer;font-size:14px;font-family:inherit}
.em-save{flex:2;padding:12px;border:none;border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.em-zone-of{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:4px}
.em-zone-if{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.em-zbtn{padding:8px 2px;border-radius:var(--r);font-size:11px;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:var(--bg2);color:var(--txt2)}
#toast{position:fixed;bottom:calc(72px + var(--sfb));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:99;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.ok{background:#15803d}#toast.err{background:#991b1b}#toast.off{opacity:0}
#setup-overlay{position:fixed;inset:0;background:var(--navy);z-index:300;display:none;flex-direction:column;align-items:stretch;overflow:hidden}
.su-progress{display:flex;gap:5px;justify-content:center;padding:calc(18px + env(safe-area-inset-top,0px)) 0 0}
.su-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);transition:all .35s}
.su-dot.on{background:#fff;width:24px;border-radius:3px}
.su-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px calc(32px + env(safe-area-inset-left,0px)) 8px calc(32px + env(safe-area-inset-right,0px));text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.su-icon{font-size:72px;line-height:1;margin-bottom:22px;animation:suPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes suPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.su-title{font-size:27px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:11px;animation:suUp .35s ease-out}
.su-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.75;margin-bottom:28px;animation:suUp .35s ease-out .05s both}
@keyframes suUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.su-field{width:100%;text-align:left;margin-bottom:10px}
.su-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.su-input{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:13px;padding:16px 17px;font-size:16px;color:#fff;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .2s,background .2s}
.su-input:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.16)}
.su-input::placeholder{color:rgba(255,255,255,.5)}
.su-actions{padding:8px 24px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;gap:8px;align-items:center}
.su-next{width:100%;padding:17px;background:#fff;color:var(--navy);border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.su-next:active{opacity:.82}
.su-skip{background:none;border:none;color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;padding:8px 16px;font-family:inherit;min-height:44px}
.su-skip:active{color:rgba(255,255,255,.9)}
.su-summary{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 18px;width:100%;text-align:left;font-size:14px;color:rgba(255,255,255,.8);line-height:2;margin-bottom:4px}
.su-tip{background:rgba(255,255,255,.07);border-radius:12px;padding:13px 16px;width:100%;font-size:12px;color:rgba(255,255,255,.6);line-height:1.75;text-align:left;margin-top:8px}
.su-connst{font-size:12px;color:rgba(255,255,255,.5);min-height:18px;text-align:center;margin-top:6px;width:100%}
#login-overlay{position:fixed;inset:0;background:var(--navy);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-wrap{width:100%;max-width:340px}
.pin-logo{font-size:52px;text-align:center;margin-bottom:8px}
.pin-title{font-size:22px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px}
.pin-sub{font-size:13px;color:rgba(255,255,255,.6);text-align:center;margin-bottom:32px}
.pin-input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:var(--rl);padding:16px 18px;font-size:20px;color:#fff;text-align:center;letter-spacing:6px;outline:none;font-family:inherit;-webkit-appearance:none;margin-bottom:10px}
.pin-input:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.18)}
.pin-input::placeholder{letter-spacing:normal;font-size:14px;color:rgba(255,255,255,.4)}
.pin-btn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.pin-btn.primary{background:#fff;color:var(--navy)}
.pin-btn.primary:active{opacity:.85}
.pin-btn.secondary{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.2)}
.pin-btn.secondary:active{opacity:.7}
.pin-err{font-size:12px;color:#fca5a5;text-align:center;min-height:18px;margin-bottom:8px}
@keyframes flash{0%{background:#fde68a}100%{background:var(--card)}}
.flash{animation:flash .5s ease-out}
.cal-wrap{background:var(--card);border-bottom:1px solid var(--bdr)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.cal-nav span{font-size:15px;font-weight:700;color:var(--txt)}
.cal-nav button{width:32px;height:32px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:18px;color:var(--txt2);display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 6px;gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;padding:4px 0;letter-spacing:.02em}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px;min-height:40px;border-radius:var(--r);cursor:default;gap:3px}
.cal-cell.has-game{cursor:pointer}
.cal-cell.has-game:active{background:var(--bg2)}
.cal-cell.selected{background:#EBF0FB}
.cal-day{font-size:13px;font-weight:400;color:var(--txt);line-height:1.2}
.cal-cell.selected .cal-day{font-weight:700;color:var(--navy)}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-legend{display:flex;gap:14px;padding:4px 14px 8px;font-size:11px;color:var(--txt2)}
.cal-legend span{display:flex;align-items:center;gap:5px}
.cal-summary{border-top:1px solid var(--bdr);padding:12px 14px}
.cal-sum-date{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cal-sum-player{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:3px}
.cal-sum-stat{font-size:13px;color:var(--txt);line-height:1.8}
</style>
</head>

let ROSTER=[

function ocOuts(o){if(o==='DP')return 2;if(['K','GO','FO','SF','SH','FC'].includes(o))return 1;return 0;}

// ── 앱 상태 ───────────────────────────────────────────────
let S={
  tab:0,
  // 타자 입력
  batSub:0,bs:0,bp:null,bo:null,brbi:0,bsb:0,bcs:0,bzone:null,

};

// ── 저장/불러오기 ──────────────────────────────────────────
function load(){
  try{
    const raw=localStorage.getItem('bb_final');
    if(raw){
      const d=JSON.parse(raw);
      ['blog','pit_bf','pit_runs','games','game','gcnt','scriptUrl','scriptToken','lastSync','rosterDirty','deletedGids','schoolName'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});
      if(d.myPlayer!=null)S.myPlayer=parseInt(d.myPlayer)||null;
      S.syncedIds=new Set(d.syncedIds||[]);
      if(d.setupDone!==undefined)S.setupDone=d.setupDone;
      else S.setupDone=!!(S.scriptUrl||S.games.length>0||S.schoolName);
      if(d.setupStep!==undefined)S.setupStep=d.setupStep;
      if(d.roster&&d.roster.length>0){parseRosterSiblings(d.roster);ROSTER.splice(0,ROSTER.length,...d.roster);}
    }
    var sr=sessionStorage.getItem('bb_role');
    if(sr)S.role=sr;
  }catch(e){console.error(e);}
}
function save(){
  try{
    localStorage.setItem('bb_final',JSON.stringify({
      blog:S.blog,pit_bf:S.pit_bf,pit_runs:S.pit_runs,games:S.games,
      game:S.game,gcnt:S.gcnt,scriptUrl:S.scriptUrl,lastSync:S.lastSync,
      syncedIds:[...S.syncedIds],roster:ROSTER,rosterDirty:S.rosterDirty,myPlayer:S.myPlayer,
      deletedGids:S.deletedGids,schoolName:S.schoolName,scriptToken:S.scriptToken,setupDone:S.setupDone,setupStep:S.setupStep,
    }));
  }catch(e){console.error(e);}
}

function parseRosterSiblings(roster){
  (roster||[]).forEach(function(p){
    if(!p.siblings||p.siblings===''||p.siblings===null){p.siblings=[];return;}
    if(Array.isArray(p.siblings))return;
    if(typeof p.siblings==='string'){
      var s=p.siblings.trim();
      try{
        var parsed=JSON.parse(s);
        p.siblings=Array.isArray(parsed)?parsed.map(Number).filter(function(n){return!isNaN(n);}):[];
      }catch(e){
        // "5,7" 형식 fallback
        p.siblings=s.split(',').map(function(x){return parseInt(x.trim());}).filter(function(n){return!isNaN(n);});
      }
    }
  });
}
function getSiblingGroup(){
  if(!S.myPlayer)return[];
  // 같은 번호가 타자/투수 두 항목으로 있을 수 있으므로 모든 항목에서 siblings 수집
  var sibNos=[];
  ROSTER.filter(function(x){return x.no===S.myPlayer;}).forEach(function(me){
    if(me.siblings)me.siblings.forEach(function(s){if(sibNos.indexOf(s)<0)sibNos.push(s);});
  });
  if(!sibNos.length)return[];
  var seen=new Set();
  return sibNos.map(function(sno){return ROSTER.find(function(x){return x.no===sno;});}).filter(function(p){return p&&!seen.has(p.no)&&seen.add(p.no);});
}
function activeNo(){return S.activeChild!=null?S.activeChild:S.myPlayer;}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(m,type=''){
  const t=document.getElementById('toast');
  t.textContent=m;t.className=type||'';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('off'),2000);
}

// ── 통계 계산 ─────────────────────────────────────────────
function paS(o){
  const noAB=["BB","IBB","HBP","SF","SH"],hits=["1B","2B","3B","HR"];
  return{pa:1,ab:noAB.includes(o)?0:1,h:hits.includes(o)?1:0,
    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:o==="K"?1:0,sf:o==="SF"?1:0};
}
// MLB 기준 등급 판별
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
  ERA: {good:3.50,bad:5.00,rev:true},
  WHIP:{good:1.20,bad:1.50,rev:true},
  FIP: {good:3.50,bad:5.00,rev:true},
  'K/9':{good:9.0,bad:6.0,rev:false},
  'BB/9':{good:3.0,bad:4.5,rev:true},
  'pitK%':{good:0.25,bad:0.15,rev:false},
  'pitBB%':{good:0.08,bad:0.12,rev:true},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'▲'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'▼'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'—'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pn;
    if(!m[k])m[k]={name:k,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.r==='b');
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.r==='b');
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function gameScore(gid){
  var our=S.blog.filter(function(e){return e.gid===gid;}).reduce(function(s,e){return s+(e.run||0);},0);
  var opp=S.pit_runs.filter(function(e){return e.gid===gid;}).length;
  var hasBat=S.blog.some(function(e){return e.gid===gid;});
  var hasPit=S.pit_runs.some(function(e){return e.gid===gid;});
  return{our:our,opp:opp,has:hasBat||hasPit};
}
function pendingCount(){
  return S.blog.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_bf.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_runs.filter(e=>!S.syncedIds.has(e.id)).length
    +S.games.filter(g=>!S.syncedIds.has('g_'+g.id)).length
    +(S.deletedGids&&S.deletedGids.length?S.deletedGids.length:0)
    +(S.rosterDirty?1:0);
}

// ── 로그인 ────────────────────────────────────────────────
function renderLogin(){
  var ol=document.getElementById('login-overlay');
  if(!ol)return;
  if(!S.setupDone){ol.style.display='none';return;}
  if(!S.scriptUrl&&!S.role){
    S.role='admin';
    sessionStorage.setItem('bb_role','admin');
  }
  if(S.role){ol.style.display='none';return;}
  ol.style.display='flex';
  ol.innerHTML='<div class="pin-wrap">'
    +'<div class="pin-logo">⚾</div>'
    +'<div class="pin-title">우리아이 야구 기록</div>'
    +'<div class="pin-sub">코치/감독, 기록자 또는 학부모 PIN을 입력하세요</div>'
    +'<input class="pin-input" id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="PIN 입력" autocomplete="off" onkeydown="if(event.key===&apos;Enter&apos;)doLogin()">'
    +'<div class="pin-err" id="pin-err"></div>'
    +'<button class="pin-btn primary" onclick="doLogin()">로그인</button>'
    +'</div>';
  setTimeout(function(){var el=document.getElementById('pin-input');if(el)el.focus();},100);
}
async function doLogin(){
  var pin=(document.getElementById('pin-input')||{}).value||'';
  var errEl=document.getElementById('pin-err');
  if(!pin){if(errEl)errEl.textContent='PIN을 입력해주세요.';return;}
  if(!S.scriptUrl){localLogin();return;}
  if(errEl)errEl.textContent='확인 중...';
  try{
    var res=await fetch(S.scriptUrl+'?action=login&pin='+encodeURIComponent(pin));
    var data=await res.json();
    if(data.status==='ok'&&data.role){
      sessionStorage.setItem('bb_role',data.role);
      S.role=data.role;
      document.getElementById('login-overlay').style.display='none';
      r();
    }else{
      if(errEl)errEl.textContent=data.message||'PIN이 올바르지 않습니다.';
    }
  }catch(e){
    if(errEl)errEl.textContent='서버에 연결할 수 없습니다.';
  }
}
function localLogin(){
  sessionStorage.setItem('bb_role','admin');
  S.role='admin';
  document.getElementById('login-overlay').style.display='none';
  r();
}
function doLogout(){
  sessionStorage.removeItem('bb_role');
  S.role=null;
  renderLogin();
}

      +'<div class="su-lbl">Apps Script URL</div>'
      +'<input class="su-input" id="su-url" type="url" placeholder="https://script.google.com/macros/s/.../exec" value="'+esc(S.scriptUrl)+'" autocomplete="off" spellcheck="false">'
      +'</div>'
      +'<div class="su-connst" id="su-connst"></div>';
    actions='<button class="su-next" id="su-fetch-btn" onclick="saveSetupUrl()">연결 및 불러오기</button>';
  } else if(step===2){
    // 학교/팀명 입력 (목록 찾기 또는 직접 입력)
    body='<div class="su-icon">🏫</div>'
      +'<div class="su-title">우리 팀 이름을<br>알려주세요</div>'
      +'<div class="su-desc">목록에서 선택하거나<br>직접 입력해주세요</div>'
      +'<div class="su-field">'
      +'<div class="su-lbl">학교 / 팀명</div>'
      +'<div style="display:flex;gap:8px;align-items:stretch">'
      +'<input class="su-input" id="su-school" type="text" placeholder="직접 입력 또는 아래 찾기" value="'+esc(S.schoolName)+'" maxlength="30" autocomplete="off" style="flex:1;margin-bottom:0">'
      +'<button onclick="searchTeams()" style="flex-shrink:0;padding:0 16px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">🔍 찾기</button>'
      +'</div>'
      +'<div id="su-team-list" style="margin-top:6px"></div>'
      +'</div>'
      +'<div class="su-connst" id="su-school-st"></div>';
    actions='<button class="su-next" onclick="saveSetupSchool()">다음</button>';
  } else if(step===3){

var _teamSearchList=[];
var _teamFiltered=[];
async function searchTeams(){
  var listEl=document.getElementById('su-team-list');
  if(!listEl)return;
  if(!S.scriptUrl){
    listEl.innerHTML='<div style="color:#fca5a5;font-size:12px;padding:8px 0;text-align:center">클라우드 연동 후 사용 가능합니다.</div>';

  try{
    var res=await fetch(S.scriptUrl+'?action=getTeams');

    _teamSearchList=data.teams||[];
    renderTeamList('');
  }catch(e){
    listEl.innerHTML='<div style="color:#fca5a5;font-size:12px;padding:8px 0;text-align:center">불러오기 실패 — 다시 시도해주세요</div>';

function renderTeamList(q){
  var listEl=document.getElementById('su-team-list');
  if(!listEl)return;
  _teamFiltered=q?_teamSearchList.filter(function(t){return t.toLowerCase().indexOf(q.toLowerCase())>=0;}):_teamSearchList.slice();
  if(!_teamSearchList.length){
    listEl.innerHTML='<div style="color:rgba(255,255,255,.5);font-size:12px;padding:8px 0;text-align:center">등록된 팀이 없습니다.</div>';

  }
  var html='<input type="text" value="'+esc(q)+'" placeholder="팀명 검색..." oninput="renderTeamList(this.value)" style="width:100%;box-sizing:border-box;margin-top:2px;padding:10px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;font-size:13px;font-family:inherit;outline:none">'
    +'<div style="max-height:160px;overflow-y:auto;margin-top:6px;border-radius:var(--r)">';
  if(!_teamFiltered.length){
    html+='<div style="color:rgba(255,255,255,.5);font-size:12px;padding:10px;text-align:center">검색 결과가 없습니다.</div>';

    _teamFiltered.forEach(function(t,i){
      html+='<button onclick="selectTeam('+i+')" style="display:block;width:100%;text-align:left;padding:11px 13px;background:rgba(255,255,255,.07);border:none;border-bottom:1px solid rgba(255,255,255,.07);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">'+esc(t)+'</button>';
    });
  }
  html+='</div>';

function selectTeam(i){

}
function saveSetupSchool(){
  var el=document.getElementById('su-school');
  var name=el?el.value.trim():'';
  if(!name){
    var st=document.getElementById('su-school-st');
    if(st){st.textContent='⚠ 팀/학교명을 입력해주세요.';st.style.color='#fca5a5';}
    return;
  }
  S.schoolName=name;S.setupStep=3;save();renderSetup();
}
async function saveSetupUrl(){
  var el=document.getElementById('su-url');
  var url=el?el.value.trim():'';
  var st=document.getElementById('su-connst');
  var btn=document.getElementById('su-fetch-btn');
  if(!url){
    if(st){st.textContent='⚠ URL을 입력해주세요.';st.style.color='#fca5a5';}
    return;
  }
  if(st){st.textContent='⏳ 데이터 불러오는 중...';st.style.color='rgba(255,255,255,.6)';}
  if(btn){btn.disabled=true;btn.textContent='불러오는 중...';}
  try{
    var res=await fetch(url+'?action=fetch');
    var data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'서버 오류');
    S.scriptUrl=url;
    S.games=data.games||[];
    S.blog=data.bat_log||[];
    S.pit_bf=data.pit_bf||[];
    S.pit_runs=data.pit_runs||[];
    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);}
    S.syncedIds=new Set();
    (data.games||[]).forEach(function(g){S.syncedIds.add('g_'+g.id);});
    (data.bat_log||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_bf||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_runs||[]).forEach(function(e){S.syncedIds.add(e.id);});
    if(data.teamName)S.schoolName=data.teamName;
    S.lastSync=Date.now();save();
    // 클라우드에서 팀명이 왔으면 step 2(팀명 입력) 건너뜀
    S.setupStep=S.schoolName?3:2;renderSetup();
  }catch(err){
    if(st){st.textContent='✗ 연결 실패 — URL을 확인해주세요';st.style.color='#fca5a5';}
    if(btn){btn.disabled=false;btn.textContent='연결 및 불러오기';}
  }
}
function finishSetup(asAdmin){
  S.setupDone=true;
  if(asAdmin){
    if(!S.scriptUrl){S.role='admin';sessionStorage.setItem('bb_role','admin');}
    else{S.role=null;sessionStorage.removeItem('bb_role');}
  } else {
    S.role='user';sessionStorage.setItem('bb_role','user');
  }
  save();
  document.getElementById('setup-overlay').style.display='none';
  renderLogin();r();
}

function rBatTab(){

  h+='</div>';

    h+='<div style="padding:4px 12px 8px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:6px">🎯 타구 방향 <span style="font-weight:400">(선택사항)</span></div>'
      +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:5px">';
    zoneOF.forEach(z=>{
      const sel=S.bzone===z;
      h+='<button onclick="S.bzone=S.bzone===\''+z+'\'?null:\''+z+'\';renderCt()" style="padding:9px 2px;border:'+(sel?'2px solid var(--navy)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(sel?'#EBF0FB':'var(--card)')+';color:'+(sel?'var(--navy)':'var(--txt2)')+';font-size:12px;font-weight:'+(sel?'700':'400')+';cursor:pointer;font-family:inherit">'+z+'</button>';
    });
    h+='</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">';
    zoneIF.forEach(z=>{
      const sel=S.bzone===z;
      h+='<button onclick="S.bzone=S.bzone===\''+z+'\'?null:\''+z+'\';renderCt()" style="padding:9px 2px;border:'+(sel?'2px solid var(--red)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(sel?'#FDEDEC':'var(--card)')+';color:'+(sel?'var(--red)':'var(--txt2)')+';font-size:12px;font-weight:'+(sel?'700':'400')+';cursor:pointer;font-family:inherit">'+z+'</button>';
    });
    h+='</div>'+(S.bzone?'<div style="margin-top:5px;font-size:11px;color:var(--txt2);text-align:center">선택: <strong style="color:var(--navy)">'+S.bzone+'</strong> <button onclick="S.bzone=null;renderCt()" style="background:none;border:none;color:var(--txt2);cursor:pointer;text-decoration:underline;font-size:11px">해제</button></div>':'')+'</div>';
  }
  h+='<div class="savewrap"><button class="savebtn" onclick="saveBat()">✓ 기록 저장</button></div>';
  return h;
}

// ── 투수 탭 ──────────────────────────────────────────────
function rPitTab(){
  if(S.curPit===null||S.curPit===undefined){
    let h='<div class="seclbl">현재 투수 선택</div><div class="pgrid">';
    const pitAllowedNos=getAllowedNos();
    ROSTER.filter(p=>p.r==='p'&&(!pitAllowedNos||pitAllowedNos.indexOf(p.no)>=0)).forEach(p=>{
      h+='<button class="pbtn'+(S.curPit===p.no?' sel-r':'')+'" onclick="selPit('+p.no+')">'
        +'<div class="pno r">'+p.no+'</div>'
        +'<div><div class="pn">'+esc(p.name)+'</div><div class="pp">'+esc(p.pos)+'</div></div>'
        +'</button>';
    });
    return h+'</div>';
  }
  const p=ROSTER.find(x=>String(x.no)===String(S.curPit));
  if(!p){S.curPit=null;return rPitTab();}
  const gid=S.game?S.game.id:null;
  const st=calcPitStats(S.curPit,gid);
  let h='<div class="pcard">'
    +'<div class="pcard-hdr"><div class="pcard-l">'
    +'<div class="pav">'+p.no+'</div>'
    +'<div><div class="pcard-name">'+esc(p.name)+'</div><div class="pcard-role">'+esc(p.pos)+' · 투구 중</div></div>'
    +'</div><button class="pchg" onclick="S.curPit=null;r()">⇄ 교체</button></div>'
    +'<div class="pstats">'
    +['<div class="pstat em"><div class="pstat-val">'+st.ipd+'</div><div class="pstat-lbl">IP</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.h+'</div><div class="pstat-lbl">피안타</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.bb+'</div><div class="pstat-lbl">볼넷</div></div>',
      '<div class="pstat"><div class="pstat-val">'+st.k+'</div><div class="pstat-lbl">삼진</div></div>',
      '<div class="pstat em"><div class="pstat-val">'+st.er+'</div><div class="pstat-lbl">자책</div></div>',
    ].join('')+'</div></div>';
  h+='<div class="stabs">'
    +'<button class="stab pit'+(S.pitSub===0?' on':'')+'" onclick="S.pitSub=0;r()">👤 타자 결과</button>'
    +'<button class="stab pit'+(S.pitSub===1?' on':'')+'" onclick="S.pitSub=1;r()">💧 실점 처리</button>'
    +'</div>';
  if(S.pitSub===0){
    h+=rOCSel('pit');
    h+='<div style="margin:0 12px 12px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);font-size:11px;color:var(--txt2)">아웃 3개마다 IP 자동 증가 · 실점은 <strong style="color:var(--red)">실점 처리</strong>에서 입력</div>';
  } else {
    h+=rPitRunInput();
  }
  return h;
}
function rPitRunInput(){
  const gid=S.game?S.game.id:null;
  const runs=S.pit_runs.filter(e=>e.pno===S.curPit&&(gid?e.gid===gid:true));
  const er=runs.filter(e=>e.earned).length,ur=runs.filter(e=>!e.earned).length;
  let h='<div class="runsec"><p style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:10px">실점 발생 시 구분해서 탭하세요</p>'
    +'<div class="rbigrow">'
    +'<button class="rbigbtn earn" onclick="addPitRun(true)">💧+ 자책점<br><span style="font-size:11px;opacity:.7">ERA에 반영</span></button>'
    +'<button class="rbigbtn uearn" onclick="addPitRun(false)">💧+ 비자책점<br><span style="font-size:11px;opacity:.7">ERA 미반영</span></button>'
    +'</div>'
    +'<div class="rminirow">'
    +'<div class="rmini"><div class="rminiv" style="color:var(--red)">'+er+'</div><div class="rminil">자책점 (ER)</div></div>'
    +'<div class="rmini"><div class="rminiv" style="color:var(--txt2)">'+ur+'</div><div class="rminil">비자책 (UER)</div></div>'
    +'<div class="rmini"><div class="rminiv">'+(er+ur)+'</div><div class="rminil">총 실점 (R)</div></div>'
    +'</div>';
  if(runs.length){
    h+='<p style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px">실점 기록</p><div>';
    runs.slice().reverse().forEach(e=>{
      h+='<div class="rlogitem"><div class="rdot '+(e.earned?'e':'u')+'"></div>'
        +'<div style="flex:1;font-size:12px;color:var(--txt2)">'+(e.earned?'자책점':'비자책점')+'</div>'
        +'<button class="rdel" onclick="delPitRun(\''+e.id+'\')">✕</button></div>';
    });
    h+='</div>';
  }
  return h+'</div>';
}

// ── 기록 탭 (전체 경기 목록) ──────────────────────────────
function rLog(){
  // 전체 경기 목록 수집
  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  // blog/pit_bf에서 game 정보 보완
  const knownGids=new Set(allGames.map(g=>g.id));
  const usedGids=[...new Set([...S.blog.map(e=>e.gid),...S.pit_bf.map(e=>e.gid)])].filter(Boolean);
  usedGids.forEach(gid=>{
    if(!knownGids.has(gid)){
      const sample=S.blog.find(e=>e.gid===gid)||S.pit_bf.find(e=>e.gid===gid);
      if(sample){allGames.push({id:gid,no:'?',date:sample.date||'',opp:sample.opp||'?'});knownGids.add(gid);}
    }
  });
  allGames.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!allGames.length)
    return'<div class="empty">📋<br><br>기록이 없습니다.</div>';

  // 선택 경기
  const selGid=S.logGameId;

  // 달력 표시 월 결정 (기본: 현재 년/월)
  const now=new Date();
  const todayMon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let calMon=S.calMonth||todayMon;
  const calY=parseInt(calMon.slice(0,4)),calM=parseInt(calMon.slice(5,7));
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const nextMon=calM===12?(calY+1)+'-01':calY+'-'+String(calM+1).padStart(2,'0');
  const firstDow=new Date(calY,calM-1,1).getDay();
  const daysInMon=new Date(calY,calM,0).getDate();

  // 이 달의 경기 맵 {dd -> game}
  const gameMap={};
  allGames.forEach(g=>{
    if(g.date&&g.date.slice(0,7)===calMon){
      const dd=g.date.slice(8,10);
      if(!gameMap[dd])gameMap[dd]=g;
    }
  });

  // 달력 렌더
  const DOW=['일','월','화','수','목','금','토'];
  let h='<div class="cal-wrap">';
  h+='<div class="cal-nav">'
    +'<button onclick="S.calMonth=\''+prevMon+'\';S.logGameId=null;renderCt()">&#8249;</button>'
    +'<span>'+calY+'년 '+calM+'월</span>'
    +'<button onclick="S.calMonth=\''+nextMon+'\';S.logGameId=null;renderCt()">&#8250;</button>'
    +'</div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d,i){
    h+='<div class="cal-dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--txt2)')+'">'+d+'</div>';
  });
  for(var ei=0;ei<firstDow;ei++)h+='<div class="cal-cell"></div>';
  for(var day=1;day<=daysInMon;day++){
    var ds=String(day).padStart(2,'0');
    var g=gameMap[ds];
    var isSel=g&&g.id===S.logGameId;
    var isOff=g&&(g.type||'O')==='O';
    var dow=new Date(calY,calM-1,day).getDay();
    var dc=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--txt)';
    var isCurG=g&&S.game&&g.id===S.game.id;
    h+='<div class="cal-cell'+(g?' has-game':'')+(isSel?' selected':'')+'"'
      +(g?' onclick="var _gid=\''+g.id+'\';S.logGameId=(_gid===S.logGameId?null:_gid);S.calMonth=\''+calMon+'\';renderCt()"':'')+' >';
    h+='<span class="cal-day" style="color:'+dc+'">'+(isCurG?'<strong>'+day+'</strong>':day)+'</span>';
    if(g){
      var csc=gameScore(g.id);
      if(csc.has){
        var cwin=csc.our>csc.opp,close=csc.our<csc.opp;
        h+='<span style="font-size:9px;font-weight:700;color:'+(cwin?'#16a34a':close?'#dc2626':'var(--txt2)')+'">'+csc.our+'-'+csc.opp+'</span>';
      } else {
        h+='<span class="cal-dot" style="background:'+(isOff?'var(--navy)':'#16a34a')+'"></span>';
      }
    }
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="cal-legend">'
    +'<span><span class="cal-dot" style="background:var(--navy);display:inline-block"></span>정식경기</span>'
    +'<span><span class="cal-dot" style="background:#16a34a;display:inline-block"></span>연습경기</span>'
    +'</div>';

  // 선택 경기 요약 (날짜 클릭 시만)
  if(selGid){
    const selGame=allGames.find(function(g){return g.id===selGid;});
    if(selGame){
      var sd=selGame.date||'';
      var sdParts=sd.split('-');
      var sdow=sd?['일','월','화','수','목','금','토'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
      var isOffSel=(selGame.type||'O')==='O';
      var isCurSel=S.game&&S.game.id===selGid;
      h+='<div class="cal-summary">';
      var selSc=gameScore(selGid);
      if(selSc.has){
        var selWin=selSc.our>selSc.opp,selLose=selSc.our<selSc.opp;
        h+='<div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:8px">'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">우리팀</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selWin?'#16a34a':'var(--txt)')+'">'+selSc.our+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:14px;font-weight:700;padding:4px 10px;border-radius:6px;background:'+(selWin?'#dcfce7':selLose?'#fee2e2':'var(--bg2)')+';color:'+(selWin?'#15803d':selLose?'#dc2626':'var(--txt2)')+';">'+(selWin?'승':selLose?'패':'무')+'</div></div>'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--txt2);margin-bottom:2px">상대팀</div>'
          +'<div style="font-size:32px;font-weight:900;color:'+(selLose?'#dc2626':'var(--txt)')+'">'+selSc.opp+'</div></div>'
          +'</div>';
      }
      h+='<div class="cal-sum-date">';
      if(sd)h+=parseInt(sdParts[1])+'월 '+parseInt(sdParts[2])+'일 ('+sdow+') &nbsp;';
      h+='vs '+esc(selGame.opp);
      h+=' <span style="background:'+(isOffSel?'#EBF0FB':'#dcfce7')+';color:'+(isOffSel?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">'+(isOffSel?'정식':'연습')+'</span>';
      if(isCurSel)h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">진행중</span>';
      h+='<button onclick="showEditGameModal(\''+selGid+'\')" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit;flex-shrink:0">✏ 수정</button>';
      h+='<button onclick="delGame(\''+selGid+'\')" style="background:none;border:1px solid #fca5a5;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#dc2626;cursor:pointer;font-family:inherit;flex-shrink:0">🗑 삭제</button>';
      h+='</div>';
      var _isAddAllowed=(S.role==='admin'||S.role==='recorder'||!S.role);
      if(_isAddAllowed){
        h+='<div style="display:flex;gap:8px;margin-top:10px">'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'bat\')" style="flex:1;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">⚾ 타자 기록 추가</button>'
          +'<button onclick="startAddToGame(\''+selGid+'\',\'pit\')" style="flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">🎯 투수 기록 추가</button>'
          +'</div>';
      }

      // 대표 선수 기록
      var _an=activeNo();
      if(_an){
        var mp=ROSTER.find(function(x){return x.no===_an;});
        if(mp){
          var mpBat=S.blog.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          var mpPit=S.pit_bf.filter(function(e){return e.gid===selGid&&e.pno===_an;});
          h+='<div class="cal-sum-player">#'+mp.no+' '+mp.name+'</div>';
          if(mpBat.length){
            var bAB=0,bH=0,bRBI=0;
            mpBat.forEach(function(e){var s=paS(e.oc);bAB+=s.ab;bH+=s.h;bRBI+=e.rbi||0;});
            h+='<div class="cal-sum-stat">타격 · '+bAB+'타수 '+bH+'안타'+(bRBI?' · '+bRBI+'타점':'')+'</div>';
          }
          if(mpPit.length){
            var ps=calcPitStats(_an,selGid);
            h+='<div class="cal-sum-stat">투수 · '+ps.ipd+'이닝'+(ps.r?' · '+ps.r+'실점 (자책 '+ps.er+')':'')+'</div>';
          }
          if(!mpBat.length&&!mpPit.length)
            h+='<div class="cal-sum-stat" style="color:var(--txt2)">이 경기 기록 없음</div>';
        }
      } else {
        h+='<div class="cal-sum-stat" style="color:var(--txt2);font-size:12px">설정에서 대표 선수를 지정하면 개인 기록이 표시됩니다.</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';

  // 날짜 없거나 빈 경기 복구 섹션
  const noDateGames=allGames.filter(g=>!g.date||!g.date.match(/^\d{4}-\d{2}-\d{2}$/));
  if(noDateGames.length){
    h+='<div style="margin:8px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--rl);padding:12px 14px">';
    h+='<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px">⚠ 달력에 표시되지 않은 경기 ('+noDateGames.length+'개)</div>';
    h+='<div style="font-size:11px;color:#78350f;margin-bottom:10px;line-height:1.6">날짜 정보가 없어 달력에 표시되지 않습니다. 수정 버튼을 눌러 날짜를 입력해주세요.</div>';
    noDateGames.forEach(function(g){
      var bCnt=S.blog.filter(function(e){return e.gid===g.id;}).length;
      var pCnt=S.pit_bf.filter(function(e){return e.gid===g.id;}).length;
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #fcd34d">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">vs '+esc(g.opp||'?')+'</div>';
      h+='<div style="font-size:11px;color:var(--txt2)">타석 '+bCnt+' · 투수 '+pCnt+'타자</div>';
      h+='</div>';
      h+='<button onclick="showEditGameModal(\''+g.id+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">날짜 입력</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  if(!selGid){
    // 날짜 미선택: 월간 전체 기록 뷰
    h+=rLogMonthly(allGames,calMon,calY,calM);
    return h;
  }

  // 날짜 선택: 해당 경기 상세 기록
  const be=S.blog.filter(e=>e.gid===selGid);
  const pbf=S.pit_bf.filter(e=>e.gid===selGid);
  const pr=S.pit_runs.filter(e=>e.gid===selGid);

  if(!be.length&&!pbf.length){
    h+='<div class="empty" style="padding:24px">이 경기의 기록이 없습니다.</div>';
    return h;
  }

  if(be.length){
    h+='<div class="seclbl">타자 기록 ('+be.length+'타석)</div>';
    be.slice().reverse().forEach(e=>{
      const oc=ocInfo(e.oc);
      const ex=[];
      if(e.rbi>0)ex.push(e.rbi+'타점');
      if(e.run>0)ex.push(e.run+'득점');
      if(e.sb>0)ex.push('도루');
      if(e.zone)ex.push('📍'+e.zone);
      const sy=S.syncedIds.has(e.id);
      h+='<div class="logitem">'
        +'<div class="logbadge" style="background:'+oc.bg+';color:'+oc.fg+';font-size:10px">'+oc.l+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div class="logplayer">'+esc(e.pn)+' <span style="font-size:10px;color:'+(sy?'#15803d':'#f59e0b')+'">'+(sy?'✓':'●')+'</span></div>'
        +'<div class="logdetail">'+(ex.length?ex.join(' · '):'—')+'</div>'
        +'</div>'
        +'<button onclick="showEditBatModal(\''+e.id+'\')" style="background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:5px 8px;font-size:11px;color:var(--txt2);cursor:pointer;margin-right:4px;font-family:inherit">✏</button>'
        +'<button class="delbtn" onclick="del(\'b\',\''+e.id+'\')">✕</button>'
        +'</div>';
    });
  }
  if(pbf.length){
    const pnos=[...new Set(pbf.map(e=>e.pno))];
    h+='<div class="seclbl">투수 기록 ('+pbf.length+'타자 상대)</div>';
    pnos.forEach(pno=>{
      const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
      const st=calcPitStats(pno,selGid);
      const pitRuns=pr.filter(e=>e.pno===pno);
      h+='<div class="logitem" style="background:var(--bg2);flex-direction:column;align-items:stretch;gap:5px">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<div class="logbadge" style="background:var(--red);color:#fff;font-size:11px">#'+pno+'</div>'
        +'<div style="flex:1"><div class="logplayer">'+esc(p.name)+'</div>'
        +'<div class="logdetail">'+st.ipd+'이닝 · '+st.h+'H · '+st.er+'ER · '+st.bb+'BB · '+st.k+'K</div></div>'
        +'</div>'
        +'<div style="padding-left:46px;display:flex;flex-direction:column;gap:4px">';
      pbf.filter(e=>e.pno===pno).slice().reverse().forEach(e=>{
        const oc=ocInfo(e.oc);const sy=S.syncedIds.has(e.id);
        h+='<div style="display:flex;align-items:center;gap:5px">'
          +'<span style="background:'+oc.bg+';color:'+oc.fg+';padding:2px 7px;border-radius:4px;font-size:11px">'+oc.l+'</span>'
          +'<span style="font-size:10px;color:'+(sy?'#15803d':'#f59e0b')+'">'+(sy?'✓':'●')+'</span>'

          +'<button onclick="del(\'pbf\',\''+e.id+'\')" style="background:none;border:none;color:var(--txt2);cursor:pointer;font-size:14px;line-height:1">✕</button>'
          +'</div>';

        });
        h+='</div>';
      }
      h+='</div></div>';
    });
  }
  return h;
}

// 월간 전체 기록 뷰
function rLogMonthly(allGames,calMon,calY,calM){
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const monGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===calMon);
  const prevGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===prevMon);
  let h='';

  // 대표 선수 이번달 vs 지난달 주요 타격 지표 3가지
  if(activeNo()){
    const myNo=Number(activeNo());
    const curGids=new Set(monGames.map(g=>g.id));
    const prevGids=new Set(prevGames.map(g=>g.id));
    const curBlog=S.blog.filter(e=>curGids.has(e.gid)&&Number(e.pno)===myNo);
    const prevBlog=S.blog.filter(e=>prevGids.has(e.gid)&&Number(e.pno)===myNo);
    function calcMS(entries){
      var ab=0,h2=0,bb=0,hbp=0,sf=0,d2=0,d3=0,hr=0;
      entries.forEach(function(e){var s=paS(e.oc);ab+=s.ab;h2+=s.h;bb+=s.bb;hbp+=s.hbp;sf+=s.sf;d2+=s.d2;d3+=s.d3;hr+=s.hr;});
      var avg=ab>0?h2/ab:null;
      var obp=(ab+bb+hbp+sf)>0?(h2+bb+hbp)/(ab+bb+hbp+sf):null;
      var slg=ab>0?(h2+d2+2*d3+3*hr)/ab:null;
      var ops=(obp!==null&&slg!==null)?obp+slg:null;
      return{avg:avg,obp:obp,ops:ops,pa:entries.length,ab:ab,h:h2};
    }
    const cur=calcMS(curBlog),prev=calcMS(prevBlog);
    const mp=ROSTER.find(function(x){return x.no===myNo;});
    const mpName=mp?mp.name:'#'+myNo;
    const prevMonLabel=(prevMon.slice(0,4)===String(calY)?'':prevMon.slice(0,4)+'년 ')+parseInt(prevMon.slice(5,7))+'월';
    if(cur.pa>0||prev.pa>0){
      h+='<div style="margin:8px 12px 4px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px">'+mpName+' '+calM+'월 주요 타격지표 <span style="font-weight:400;color:var(--txt2);font-size:11px">vs '+prevMonLabel+'</span></div>';
      h+='<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">'+cur.ab+'타수 '+cur.h+'안타</div>';
      h+='<div style="display:flex;gap:8px">';
      var stats2=[
        {key:'AVG',cur:cur.avg,prev:prev.avg},
        {key:'OBP',cur:cur.obp,prev:prev.obp},
        {key:'OPS',cur:cur.ops,prev:prev.ops}
      ];
      stats2.forEach(function(st){
        var cf=function(v){return v!==null?v.toFixed(3):'-';};
        var diff=(st.cur!==null&&st.prev!==null)?st.cur-st.prev:null;
        var arrow=diff===null?'':diff>0.001?'↑':diff<-0.001?'↓':'→';
        var arrowC=diff===null?'var(--txt2)':diff>0.001?'#16a34a':diff<-0.001?'#dc2626':'var(--txt2)';
        h+='<div style="flex:1;text-align:center;background:var(--bg2);border-radius:var(--r);padding:10px 6px">';
        h+='<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">'+st.key+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:var(--navy)">'+cf(st.cur)+'</div>';
        h+='<div style="font-size:11px;color:'+arrowC+';margin-top:3px">'+arrow+' '+cf(st.prev)+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // 이 달의 경기 목록
  if(!monGames.length){
    h+='<div class="empty" style="padding:24px">'+calM+'월 경기 기록이 없습니다.</div>';
    return h;
  }
  h+='<div class="seclbl">'+calY+'년 '+calM+'월 경기 목록</div>';
  monGames.forEach(function(g){
    var sd=g.date||'';
    var sdParts=sd.split('-');
    var sdow=sd&&sdParts.length===3?['일','월','화','수','목','금','토'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOff=(g.type||'O')==='O';
    h+='<div class="logitem" style="cursor:pointer" onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">';
    if(sd)h+=parseInt(sdParts[2])+'일('+sdow+') ';
    h+='vs '+esc(g.opp);
    h+=' <span style="background:'+(isOff?'#EBF0FB':'#dcfce7')+';color:'+(isOff?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+(isOff?'정식':'연습')+'</span>';
    h+='</div>';
    if(activeNo()){
      var myNo2=Number(activeNo());
      var mpBat2=S.blog.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var mpPit2=S.pit_bf.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var parts=[];
      if(mpBat2.length){
        var bAB2=0,bH2=0,bRBI2=0;
        mpBat2.forEach(function(e){var s=paS(e.oc);bAB2+=s.ab;bH2+=s.h;bRBI2+=e.rbi||0;});
        parts.push(bAB2+'타수 '+bH2+'안타'+(bRBI2?' · '+bRBI2+'타점':''));
      }
      if(mpPit2.length){var ps2=calcPitStats(myNo2,g.id);parts.push(ps2.ipd+'이닝');}
      if(parts.length)h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+parts.join(' / ')+'</div>';
    }
    h+='</div>';
    var sc=gameScore(g.id);
    if(sc.has){
      var win=sc.our>sc.opp,lose=sc.our<sc.opp;
      h+='<div style="text-align:right;flex-shrink:0;padding-left:10px">'
        +'<div style="font-size:18px;font-weight:800;letter-spacing:1px;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+'">'+sc.our+' - '+sc.opp+'</div>'
        +'<div style="font-size:10px;font-weight:700;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+';">'+(win?'승':lose?'패':'무')+'</div>'
        +'</div>';
    } else {
      h+='<span style="color:var(--txt2);font-size:18px;padding-left:8px">›</span>';
    }
    h+='</div>';
  });
  return h;
}

function rStats(){

      +'<th class="sth" onclick="showStatInfo(\'H\')">H</th><th class="sth" onclick="showStatInfo(\'2B\')">2B</th>'

        +'<td>'+s.r+'</td></tr>';
    });
    h+='</tbody></table></div>';

    h+='<div class="seclbl" style="display:flex;align-items:center">📈 투수 세이버매트릭스 <span style="font-size:10px;font-weight:400;color:var(--txt2);margin-left:4px">— MLB 기준 색상</span>'+tbtn+'</div>';
    if(myNo&&!myPitSt&&!isAdmin){
      h+=rNoRecMsg(myName,'투수');
      if(showAll)ps.forEach(function(s){h+=rPitTile(s,saberFocusNo);});
    } else {
      (showAll?ps:ps.filter(s=>Number(s.no)===saberFocusNo)).forEach(function(s){h+=rPitTile(s,saberFocusNo);});
    }
  } else if(!isAdmin&&myNo&&!myPitSt&&ps.length){
    h+=rNoRecMsg(myName,'투수');
  }
  return h;
}

// ── 스프레이 차트 ─────────────────────────────────────────
function rSprayChart(pno){
  var pno2=Number(pno);
  var roster=ROSTER.find(function(x){return Number(x.no)===pno2;});
  var playerName=roster?roster.name:('#'+pno2);
  // pno 기반 1차 검색
  var blog=S.blog.filter(function(e){return Number(e.pno)===pno2;});
  // pno 매칭 없으면 이름 기반 fallback
  if(blog.length===0&&roster){
    blog=S.blog.filter(function(e){return e.pn===roster.name;});
  }
  var entries=blog.filter(function(e){return e.zone;});
  console.log('[SprayChart] pno='+pno2+' name='+playerName+' blog='+blog.length+' zone='+entries.length);
  var cx=175,cy=200,r=162;
  var SECTORS=[
    {label:'3루수', keys:['3B','LF'],           startDeg:-45,endDeg:-26,color:'#e74c3c',inner:'#922b21'},
    {label:'유격수', keys:['SS'],           startDeg:-26,endDeg:-8, color:'#f39c12',inner:'#d35400'},
    {label:'중앙',   keys:['LC','CF','RC'], startDeg:-8, endDeg:10, color:'#f1c40f',inner:'#d4ac0d'},
    {label:'2루수',  keys:['2B'],           startDeg:10, endDeg:28, color:'#2ecc71',inner:'#1e8449'},
    {label:'1루수',  keys:['1B','RF'],           startDeg:28, endDeg:45, color:'#16a085',inner:'#0e6655'},
  ];
  function pxy(deg){
    var rd=deg*Math.PI/180;
    return{x:cx+r*Math.sin(rd),y:cy-r*Math.cos(rd)};
  }
  function f(v){return v.toFixed(1);}
  var sc=SECTORS.map(function(s){
    return Object.assign({},s,{count:s.keys.reduce(function(a,k){return a+(entries.filter(function(e){return e.zone===k;}).length);},0)});
  });
  var total=sc.reduce(function(a,x){return a+x.count;},0);
  var noData=total===0;
  var h='';

  if(noData){
    // 데이터 없을 때도 팬 틀은 보여줌
    var bg0=pxy(-45),bg1=pxy(45);
    h+='<path d="M '+cx+' '+cy+' L '+f(bg0.x)+' '+f(bg0.y)+' A '+r+' '+r+' 0 0 1 '+f(bg1.x)+' '+f(bg1.y)+' Z" fill="rgba(255,255,255,.06)"/>';
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.18"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var ep={x:cx+(r*0.6)*Math.sin(mid*Math.PI/180),y:cy-(r*0.6)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.25)" font-size="11">'+s.label+'</text>';
    });
  } else {
    // 거리 반호
    [0.48,0.74].forEach(function(ratio){
      var s=pxy(-45),e=pxy(45);
      var ri=r*ratio;
      var si={x:cx+ri*Math.sin(-45*Math.PI/180),y:cy-ri*Math.cos(-45*Math.PI/180)};
      var ei={x:cx+ri*Math.sin(45*Math.PI/180),y:cy-ri*Math.cos(45*Math.PI/180)};
      h+='<path d="M '+f(si.x)+' '+f(si.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(ei.x)+' '+f(ei.y)+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-dasharray="3 4"/>';
    });
    // 섹터
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      var pct=Math.round(s.count/total*100);
      // 섹터 채움
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.88"/>';
      // 안쪽 어둠
      var ri=r*0.38;
      var p1i={x:cx+ri*Math.sin(s.startDeg*Math.PI/180),y:cy-ri*Math.cos(s.startDeg*Math.PI/180)};
      var p2i={x:cx+ri*Math.sin(s.endDeg*Math.PI/180),y:cy-ri*Math.cos(s.endDeg*Math.PI/180)};
      h+='<path d="M '+cx+' '+cy+' L '+f(p1i.x)+' '+f(p1i.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(p2i.x)+' '+f(p2i.y)+' Z" fill="'+s.inner+'" opacity="0.4"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var lp={x:cx+(r*0.62)*Math.sin(mid*Math.PI/180),y:cy-(r*0.62)*Math.cos(mid*Math.PI/180)};
      // % 텍스트 - 폰트 크기 조정
      h+='<text x="'+f(lp.x)+'" y="'+f(lp.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="12" font-weight="900" opacity=".95">'+pct+'%</text>';
      // 타구수
      if(s.count>0){
        h+='<text x="'+f(lp.x)+'" y="'+f(lp.y+15)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.85)" font-size="11">'+s.count+'타구</text>';
      }
      // 구역 레이블 - 호 가장자리
      var ep={x:cx+(r*0.87)*Math.sin(mid*Math.PI/180),y:cy-(r*0.87)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-weight="600" opacity="0.9">'+s.label+'</text>';
    });
  }

  // 구분선
  [-26,-8,10,28].forEach(function(deg){
    var ep=pxy(deg);
    h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(ep.x)+'" y2="'+f(ep.y)+'" stroke="rgba(0,0,0,.28)" stroke-width="1.5"/>';
  });
  // 파울라인
  var fl=pxy(-45),fr=pxy(45);
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fl.x)+'" y2="'+f(fl.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fr.x)+'" y2="'+f(fr.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  // 외야 펜스 호
  h+='<path d="M '+f(fl.x)+' '+f(fl.y)+' A '+r+' '+r+' 0 0 1 '+f(fr.x)+' '+f(fr.y)+'" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>';
  // 홈플레이트
  h+='<polygon points="'+cx+','+(cy-8)+' '+(cx+6)+','+(cy+1)+' '+(cx+3)+','+(cy+7)+' '+(cx-3)+','+(cy+7)+' '+(cx-6)+','+(cy+1)+'" fill="white" opacity=".9"/>';
  // 제목
  h+='<text x="175" y="12" text-anchor="middle" fill="white" font-size="13" font-weight="700" opacity=".9">'+esc(playerName)+'의 스프레이 차트</text>';
  h+='<text x="175" y="25" text-anchor="middle" fill="rgba(255,255,255,.65)" font-size="11">'+total+'타구 방향 기록 / 전체 '+blog.length+'타석</text>';

  // 하단 요약 통계
  var pull=sc[0].count+sc[1].count;
  var ctr=sc[2].count;
  var oppo=sc[3].count+sc[4].count;
  var pp=total>0?Math.round(pull/total*100):0;
  var cp=total>0?Math.round(ctr/total*100):0;
  var op=total>0?Math.round(oppo/total*100):0;

  return '<div id="spray-section" style="padding:0 12px 8px">'
    +'<div style="background:#111827;border-radius:14px;overflow:hidden;padding:12px 0 10px">'
    +'<div style="display:flex;align-items:center;justify-content:flex-end;padding:0 12px 6px">'
    +'<button onclick="setSprayPlayer('+pno2+')" style="background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:14px;padding:10px 14px;border-radius:6px;min-height:44px;line-height:1">✕</button>'
    +'</div>'
    +'<svg viewBox="0 0 350 215" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'+h+'</svg>'
    // 범례
    +'<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 8px;flex-wrap:wrap">'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#e74c3c"></span>당겨치기</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f39c12"></span>유격수</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f1c40f"></span>중앙</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2ecc71"></span>2루수</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#16a085"></span>밀어치기</span>'
    +'</div>'
    // 3단 요약
    +(noData?('<div style="padding:0 12px;text-align:center;font-size:11px;color:rgba(255,255,255,.5)">타구 방향 데이터가 없습니다. 타석 입력 시 방향을 선택하면 표시됩니다.</div>'+'<div style="padding:2px 12px 4px;text-align:center;font-size:10px;color:rgba(255,255,255,.25)">[디버그] pno='+pno2+' 타석='+blog.length+'건 방향='+entries.length+'건</div>'):('<div style="display:flex;gap:6px;margin:0 12px">'+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#f87171">'+pp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">당겨치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#fde047">'+cp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">중앙</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#4ade80">'+op+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">밀어치기</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:white">'+total+'</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">기록타구</div></div>')+'</div>'))
    +'</div></div>';
}

function setSprayPlayer(pno){
  var key=Number(pno);
  S.sprayPlayer=(S.sprayPlayer===key)?null:key;
  S.statsShowAll=false;
  renderCt();
  if(S.sprayPlayer!==null){setTimeout(function(){var el=document.getElementById('spray-section');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);}
}

function delGame(gid){
  const g=S.games.find(x=>x.id===gid);
  if(!g)return;
  const bCnt=S.blog.filter(e=>e.gid===gid).length;
  const pCnt=S.pit_bf.filter(e=>e.gid===gid).length;
  const label='vs '+(g.opp||'?')+(g.date?' ('+g.date+')':'');
  var msg='경기를 삭제하시겠습니까?\n\n'+label;
  if(bCnt||pCnt)msg+='\n\n타자 기록 '+bCnt+'건, 투수 기록 '+pCnt+'건도 함께 삭제됩니다.';
  if(!confirm(msg))return;
  S.games=S.games.filter(x=>x.id!==gid);
  S.blog=S.blog.filter(e=>e.gid!==gid);
  S.pit_bf=S.pit_bf.filter(e=>e.gid!==gid);
  S.pit_runs=S.pit_runs.filter(e=>e.gid!==gid);
  if(S.logGameId===gid)S.logGameId=null;
  if(S.game&&S.game.id===gid)S.game=null;
  if(!S.deletedGids.includes(gid))S.deletedGids.push(gid);

  save();toast(label+' 삭제됨 (다음 동기화 시 서버에서도 삭제)','ok');r();

function checkDuplicateGames(){
  var groups={};
  S.games.forEach(function(g){
    var key=(g.date||'')+'__'+(g.opp||'');
    if(!groups[key])groups[key]=[];
    groups[key].push(g);
  });
  return Object.values(groups).filter(function(grp){return grp.length>1;});
}
function mergeGames(keepGid,removeGid){
  S.blog.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_bf.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.pit_runs.forEach(function(e){if(e.gid===removeGid)e.gid=keepGid;});
  S.games=S.games.filter(function(g){return g.id!==removeGid;});
  if(!S.deletedGids.includes(removeGid))S.deletedGids.push(removeGid);
  S.syncedIds.delete('g_'+removeGid);
  if(S.game&&S.game.id===removeGid){S.game=S.games.find(function(g){return g.id===keepGid;})||null;}
  if(S.logGameId===removeGid)S.logGameId=keepGid;

}

// ── 선수 관리 ─────────────────────────────────────────────
function toggleSibling(no,sibNo){
  var allA=ROSTER.filter(function(x){return x.no===no;});
  var allB=ROSTER.filter(function(x){return x.no===sibNo;});
  if(!allA.length||!allB.length)return;
  // 추가/제거 여부는 첫 항목 기준으로 결정
  if(!allA[0].siblings)allA[0].siblings=[];
  var adding=allA[0].siblings.indexOf(sibNo)<0;
  // 같은 번호의 모든 항목(타자+투수)에 동일하게 적용
  allA.forEach(function(p){
    if(!p.siblings)p.siblings=[];
    var i=p.siblings.indexOf(sibNo);
    if(adding&&i<0)p.siblings.push(sibNo);
    else if(!adding&&i>=0)p.siblings.splice(i,1);
  });
  allB.forEach(function(p){
    if(!p.siblings)p.siblings=[];
    var i=p.siblings.indexOf(no);
    if(adding&&i<0)p.siblings.push(no);
    else if(!adding&&i>=0)p.siblings.splice(i,1);
  });
  S.rosterDirty=true;save();
  var modal=ROSTER.find(function(x){return x.no===no;});
  showEditPlayerModal(no,modal?modal.r:'b');
}
function showEditPlayerModal(no,role){
  const p=ROSTER.find(x=>x.no===no&&x.r===role);if(!p)return;
  const sibs=p.siblings||[];
  var _seenNos=new Set();
  const others=ROSTER.filter(function(x){return x.no!==no&&!_seenNos.has(x.no)&&_seenNos.add(x.no);});
  var sibSection='<div class="mlbl" style="margin-top:12px">형제 연결 <span style="font-weight:400;font-size:11px;color:var(--txt2)">(같은 팀 형제 선택)</span></div>';
  if(others.length){
    sibSection+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">';
    others.forEach(function(x){
      var linked=sibs.indexOf(x.no)>=0;
      sibSection+='<button onclick="toggleSibling('+no+','+x.no+')" style="padding:9px 12px;border-radius:20px;border:none;background:'+(linked?'var(--navy)':'#e5e7eb')+';color:'+(linked?'#fff':'var(--txt)')+';font-size:12px;font-weight:'+(linked?'700':'400')+';cursor:pointer;font-family:inherit">'+(linked?'✓ ':'')+'#'+x.no+' '+esc(x.name)+'</button>';

function confirmEditPlayer(no,role){
  const nn=parseInt(document.getElementById('ep-no').value);
  const nm=document.getElementById('ep-name').value.trim();
  const np=document.getElementById('ep-pos').value.trim();
  if(!nm||!np){toast('이름과 포지션을 입력해주세요','err');return;}
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER[idx]={...ROSTER[idx],no:isNaN(nn)?no:nn,name:nm,pos:np};
  S.rosterDirty=true;save();closeModal();r();toast(nm+' 저장 완료','ok');
}
function deletePlayer(no,role){
  if(!confirm('이 선수를 삭제하시겠습니까?'))return;
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER.splice(idx,1);
  S.rosterDirty=true;save();closeModal();r();toast('삭제 완료');
}
function showAddPlayerModal(){
  const type=S.rosterSub===0?'b':'p';
  const nos=ROSTER.map(p=>p.no).filter(n=>!isNaN(n));
  const nextNo=nos.length?Math.max(...nos)+1:1;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'

function confirmAddPlayer(type){
  const no=parseInt(document.getElementById('ap-no').value)||0;

function confirmEditGame(gid){
  const d=document.getElementById('m-date').value.trim();
  const o=document.getElementById('m-opp').value.trim();
  const t=document.getElementById('m-gtype').value||'O';
  if(!d||!o){toast('날짜와 상대팀을 입력해주세요','err');return;}
  // S.games 업데이트 (없으면 추가)
  var g=S.games.find(function(x){return x.id===gid;});
  if(g){g.date=d;g.opp=o;g.type=t;}
  else{S.games.push({id:gid,no:S.gcnt++,date:d,opp:o,type:t});}
  // blog/pit_bf/pit_runs의 date·opp도 동기화
  [S.blog,S.pit_bf,S.pit_runs].forEach(function(arr){
    arr.filter(function(e){return e.gid===gid;}).forEach(function(e){e.date=d;e.opp=o;});
  });
  // 수정된 경기가 재동기화되도록 syncedIds에서 제거
  S.syncedIds.delete('g_'+gid);
  S.blog.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  S.pit_bf.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  // 이 경기를 선택 상태로 + 해당 월로 이동
  S.logGameId=gid;
  S.calMonth=d.slice(0,7);
  save();closeModal();renderCt();toast('경기 정보가 수정됐습니다','ok');
}
