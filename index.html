    +'<div class="mbtns"><button class="mcancel" onclick="closeModal()">취소</button>'
    +'<button class="mok" onclick="confirmGame()">'+(S.game?'변경':'경기 시작')+'</button></div></div></div>';
  setTimeout(()=>document.getElementById('m-opp').focus(),100);
}
function setGameType(t){
  const base='flex:1;padding:9px 0;border-radius:var(--r);border:1px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit';
  ['O','P'].forEach(x=>{
    const b=document.getElementById('m-type-'+x);
    if(!b)return;
    b.style.cssText=base+(x===t?';background:var(--navy);color:#fff;border-color:var(--navy)':';background:var(--card);color:var(--txt2)');
  });
  document.getElementById('m-gtype').value=t;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
var _pendingGame=null;
function confirmGame(){
  const d=document.getElementById('m-date').value.trim();
  const o=document.getElementById('m-opp').value.trim();
  const t=document.getElementById('m-gtype').value||'O';
  if(!d||!o){toast('날짜와 상대팀을 입력해주세요','err');return;}
  const dup=S.games.find(function(g){return g.date===d&&g.opp===o&&(!S.game||g.id!==S.game.id);});
  if(dup){
    const bCnt=S.blog.filter(function(e){return e.gid===dup.id;}).length;
    const pCnt=S.pit_bf.filter(function(e){return e.gid===dup.id;}).length;
    _pendingGame={d:d,o:o,t:t};
    document.getElementById('modal-root').innerHTML=
      '<div class="modal-bg"><div class="modal">'
      +'<h3>⚠ 중복 경기 감지</h3>'
      +'<div style="font-size:14px;color:var(--txt);line-height:1.7;margin-bottom:14px">'
      +'같은 날짜와 상대팀의 경기가 이미 있습니다.<br>'
      +'<strong>'+esc(d)+' vs '+esc(o)+'</strong><br>'
      +'<span style="font-size:12px;color:var(--txt2)">타자 '+bCnt+'건 · 투수 '+pCnt+'건 기록됨</span>'
      +'</div>'
      +'<div class="mbtns">'
      +'<button class="mcancel" onclick="resumeExistingGame(\''+dup.id+'\')" style="flex:1;background:#EBF0FB;color:var(--navy);border-color:#93c5fd">이어서 입력</button>'
      +'<button class="mok" onclick="forceCreateGame()" style="flex:1">새로 생성</button>'
      +'</div></div></div>';
    return;
  }
  doCreateGame(d,o,t);
}
function doCreateGame(d,o,t){
  S.game={id:UID(),no:S.gcnt++,date:d,opp:o,type:t,recordedBy:S.role||'admin'};
  S.games.push({...S.game});
  S.curPit=null;save();closeModal();r();toast('vs '+o+' '+(t==='P'?'연습':'정식')+'경기 시작!');
}
function resumeExistingGame(gid){
  const g=S.games.find(function(x){return x.id===gid;});
  if(!g)return;
  S.game={...g};S.curPit=null;save();closeModal();r();toast('기존 경기 이어서 입력합니다','ok');
}
function forceCreateGame(){
  if(!_pendingGame)return;
  doCreateGame(_pendingGame.d,_pendingGame.o,_pendingGame.t);
  _pendingGame=null;
}

// ── URL / 동기화 / 불러오기 ───────────────────────────────
function saveSchoolName(){S.schoolName=document.getElementById('school-input').value.trim();save();toast('학교명 저장 완료','ok');r();}
function saveUrl(){
  var wasEmpty=!S.scriptUrl;
  S.scriptUrl=document.getElementById('url-input').value.trim();
  S.scriptToken=document.getElementById('token-input').value.trim();
  save();
  if(wasEmpty&&S.scriptUrl)toast('URL 저장 완료! 이제 로그아웃 후 PIN으로 재로그인하세요','ok');
  else toast('URL/토큰 저장 완료','ok');
  r();
}
async function testConn(){
  const url=document.getElementById('url-input').value.trim();
  const tok=document.getElementById('token-input').value.trim();
  if(!url){toast('URL을 먼저 입력하세요','err');return;}
  const st=document.getElementById('connst');st.style.display='block';st.textContent='연결 확인 중...';st.style.color='#6b7280';
  try{
    const res=await fetch(url+(tok?'?token='+encodeURIComponent(tok):''),{method:'GET'});
    const data=await res.json();
    if(data.status==='ok'){st.textContent='✓ 연결 성공!';st.style.color='#15803d';}
    else if(data.message&&data.message.includes('인증')){st.textContent='✗ 인증 실패 - 토큰 확인';st.style.color='#991b1b';}
    else{st.textContent='⚠ 응답 오류';st.style.color='#b45309';}
  }catch(e){st.textContent='✗ 연결 실패 - URL 확인';st.style.color='#991b1b';}
}
async function doSync(){
  if(!S.scriptUrl||S.syncing)return;
  const bP=S.blog.filter(e=>!S.syncedIds.has(e.id));
  const pfP=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
  const prP=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));
  const gP=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
  const dG=S.deletedGids||[];
  if(!bP.length&&!pfP.length&&!prP.length&&!gP.length&&!dG.length&&!S.rosterDirty){toast('동기화할 데이터 없음');return;}
  S.syncing=true;r();
  try{
    if(bP.length||pfP.length||prP.length||gP.length||dG.length){
      const res=await fetch(S.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body:JSON.stringify({type:'sync',token:S.scriptToken||'',games:gP,bat_log:bP,pit_bf:pfP,pit_runs:prP,deleted_gids:dG})});
      const data=await res.json();
      if(data.status!=='ok')throw new Error(data.message||'서버 오류');
      bP.forEach(e=>S.syncedIds.add(e.id));
      pfP.forEach(e=>S.syncedIds.add(e.id));
      prP.forEach(e=>S.syncedIds.add(e.id));
      gP.forEach(g=>S.syncedIds.add('g_'+g.id));
      S.deletedGids=[];
    }
    if(S.rosterDirty){
      const rp=encodeURIComponent(JSON.stringify(ROSTER));
      const rr=await fetch(S.scriptUrl+'?action=saveRoster&data='+rp+(S.scriptToken?'&token='+encodeURIComponent(S.scriptToken):''));
      const rd=await rr.json();
      if(rd.status==='ok')S.rosterDirty=false;
    }
    S.lastSync=Date.now();save();
    const total=bP.length+pfP.length+prP.length;
    const delMsg=dG.length?' · '+dG.length+'경기 삭제':'';
    toast('☁ 동기화 완료 ('+(total>0?total+'건':'선수명단')+delMsg+'전송)','ok');
  }catch(e){toast('동기화 실패: '+e.message,'err');console.error(e);}
  S.syncing=false;r();
}
async function loadFromSheets(){
  if(!S.scriptUrl){toast('먼저 URL을 저장해주세요','err');return;}
  S.loading=true;r();
  try{
    const res=await fetch(S.scriptUrl+'?action=fetch'+(S.scriptToken?'&token='+encodeURIComponent(S.scriptToken):''));
    const data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'오류');

    // 서버가 권위(source of truth): 서버 데이터로 교체
    // 단, 아직 동기화 안 된 로컬 전용 항목은 보존
    const unsyncedGames=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
    const unsyncedBlog=S.blog.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitBf=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitRuns=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));

    const svrGameIds=new Set((data.games||[]).map(g=>g.id));
    const svrBlogIds=new Set((data.bat_log||[]).map(e=>e.id));
    const svrPitBfIds=new Set((data.pit_bf||[]).map(e=>e.id));
    const svrPitRunIds=new Set((data.pit_runs||[]).map(e=>e.id));

    // 서버 데이터 + 로컬 미동기화 항목 병합 (서버에 이미 있는 건 제외)
    S.games=[...(data.games||[]),...unsyncedGames.filter(g=>!svrGameIds.has(g.id))];
    S.blog=[...(data.bat_log||[]),...unsyncedBlog.filter(e=>!svrBlogIds.has(e.id))];
    S.pit_bf=[...(data.pit_bf||[]),...unsyncedPitBf.filter(e=>!svrPitBfIds.has(e.id))];
    S.pit_runs=[...(data.pit_runs||[]),...unsyncedPitRuns.filter(e=>!svrPitRunIds.has(e.id))];

    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);S.rosterDirty=false;}

    // syncedIds 재구성: 서버에서 온 항목만 synced로 표시
    S.syncedIds=new Set();
    (data.games||[]).forEach(g=>S.syncedIds.add('g_'+g.id));
    (data.bat_log||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_bf||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_runs||[]).forEach(e=>S.syncedIds.add(e.id));

    // 서버에서 삭제된 gid는 로컬 deletedGids에서도 제거 (이미 반영됨)
    S.deletedGids=(S.deletedGids||[]).filter(gid=>svrGameIds.has(gid));

    save();
    const svrTotal=(data.games||[]).length+(data.bat_log||[]).length+(data.pit_bf||[]).length+(data.pit_runs||[]).length;
    const rMsg=data.roster&&data.roster.length>0?' / 선수 '+data.roster.length+'명':'';
    toast('✓ 불러오기 완료 ('+svrTotal+'건)'+rMsg,'ok');
    var dups=checkDuplicateGames();
    if(dups.length)setTimeout(function(){toast('⚠ 중복 경기 '+dups.length+'건 감지 — 설정에서 처리하세요','err');},1800);
  }catch(e){toast('불러오기 실패 — URL 확인','err');console.error(e);}
  S.loading=false;r();
}

document.addEventListener('keydown',function(e){if(e.key!=='Enter')return;if(document.getElementById('pin-input')===document.activeElement){doLogin();return;}if(document.getElementById('m-opp'))confirmGame();});
load();r();
