function paS(o){
  const noAB=["BB","IBB","HBP","SF","SH"],hits=["1B","2B","3B","HR"];
  return{pa:1,ab:noAB.includes(o)?0:1,h:hits.includes(o)?1:0,
    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:o==="K"?1:0,sf:o==="SF"?1:0};
}
// MLB ЖИ░Вцђ вЊ▒ЖИЅ ьїљв│ё
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
  ERA: {good:3.50,bad:5.00,rev:true},
  WHIP:{good:1.20,bad:1.50,rev:true},
  FIP: {good:3.50,bad:5.00,rev:true},
  'K/9':{good:9.0,bad:6.0,rev:false},
  'BB/9':{good:3.0,bad:4.5,rev:true},
  'pitK%':{good:0.25,bad:0.15,rev:false},
  'pitBB%':{good:0.08,bad:0.12,rev:true},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'Рќ▓'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'Рќ╝'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'Рђћ'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pn;
    if(!m[k])m[k]={name:k,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.r==='b');
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.r==='b');
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function pendingCount(){
  return S.blog.filter(e=>!S.syncedIds.has(e.id)).length

    +(S.deletedGids&&S.deletedGids.length?S.deletedGids.length:0)
    +(S.rosterDirty?1:0);
}

  if(showRbi)h+='<div class="excard"><div class="exlbl">ьЃђВаљ (RBI)</div><div class="exval" id="ev-brbi">'+S.brbi+'</div><div class="exbtns"><button class="exbtn" onclick="adj(\'brbi\',-1)">Рѕњ</button><button class="exbtn" onclick="adj(\'brbi\',1)">+</button></div></div>';
  h+='<div class="excard"><div class="exlbl">вЈёвБе (SB)</div><div class="exval" id="ev-bsb">'+S.bsb+'</div><div class="exbtns"><button class="exbtn" onclick="adj(\'bsb\',-1)">Рѕњ</button><button class="exbtn" onclick="adj(\'bsb\',1)">+</button></div></div>';
  h+='<div class="excard"><div class="exlbl">вЈёвБеВІцьїе (CS)</div><div class="exval" id="ev-bcs">'+S.bcs+'</div><div class="exbtns"><button class="exbtn" onclick="adj(\'bcs\',-1)">Рѕњ</button><button class="exbtn" onclick="adj(\'bcs\',1)">+</button></div></div>';
  h+='</div>';
  if(isBIP){
    h+='<div style="padding:4px 12px 8px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:6px">­Ъј» ьЃђЖхг в░ЕьќЦ <span style="font-weight:400">(ВёаьЃЮВѓгьЋГ)</span></div>'
      +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:5px">';
    zoneOF.forEach(z=>{
      const sel=S.bzone===z;
      h+='<button onclick="S.bzone=S.bzone===\''+z+'\'?null:\''+z+'\';renderCt()" style="padding:9px 2px;border:'+(sel?'2px solid var(--navy)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(sel?'#EBF0FB':'var(--card)')+';color:'+(sel?'var(--navy)':'var(--txt2)')+';font-size:12px;font-weight:'+(sel?'700':'400')+';cursor:pointer;font-family:inherit">'+z+'</button>';
    });
    h+='</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">';
    zoneIF.forEach(z=>{
      const sel=S.bzone===z;
      h+='<button onclick="S.bzone=S.bzone===\''+z+'\'?null:\''+z+'\';renderCt()" style="padding:9px 2px;border:'+(sel?'2px solid var(--red)':'1px solid var(--bdr)')+';border-radius:var(--r);background:'+(sel?'#FDEDEC':'var(--card)')+';color:'+(sel?'var(--red)':'var(--txt2)')+';font-size:12px;font-weight:'+(sel?'700':'400')+';cursor:pointer;font-family:inherit">'+z+'</button>';
    });
    h+='</div>'+(S.bzone?'<div style="margin-top:5px;font-size:11px;color:var(--txt2);text-align:center">ВёаьЃЮ: <strong style="color:var(--navy)">'+S.bzone+'</strong> <button onclick="S.bzone=null;renderCt()" style="background:none;border:none;color:var(--txt2);cursor:pointer;text-decoration:underline;font-size:11px">ьЋ┤Ваю</button></div>':'')+'</div>';
  }
  h+='<div class="savewrap"><button class="savebtn" onclick="saveBat()">РюЊ ЖИ░вАЮ ВађВъЦ</button></div>';
  return h;
}

    +'<button class="stab pit'+(S.pitSub===1?' on':'')+'" onclick="S.pitSub=1;r()">­ЪњД ВІцВаљ В▓ўвдг</button>'

    h+=rOCSel('pit');

  } else {
    h+=rPitRunInput();

function rPitRunInput(){
  const gid=S.game?S.game.id:null;
  const runs=S.pit_runs.filter(e=>e.pno===S.curPit&&(gid?e.gid===gid:true));
  const er=runs.filter(e=>e.earned).length,ur=runs.filter(e=>!e.earned).length;
  let h='<div class="runsec"><p style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:10px">ВІцВаљ в░юВЃЮ ВІю ЖхгвХёьЋ┤Вёю ьЃГьЋўВёИВџћ</p>'

    +'<button class="rbigbtn uearn" onclick="addPitRun(false)">­ЪњД+ в╣ёВъљВ▒ЁВаљ<br><span style="font-size:11px;opacity:.7">ERA в»Ив░ўВўЂ</span></button>'
    +'</div>'
    +'<div class="rminirow">'

    +'<div class="rmini"><div class="rminiv" style="color:var(--txt2)">'+ur+'</div><div class="rminil">в╣ёВъљВ▒Ё (UER)</div></div>'
    +'<div class="rmini"><div class="rminiv">'+(er+ur)+'</div><div class="rminil">В┤Ю ВІцВаљ (R)</div></div>'
    +'</div>';
  if(runs.length){
    h+='<p style="font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px">ВІцВаљ ЖИ░вАЮ</p><div>';
    runs.slice().reverse().forEach(e=>{

// РћђРћђ ЖИ░вАЮ ьЃГ (ВаёВ▓┤ Ж▓йЖИ░ вфЕвАЮ) РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
function rLog(){
  // ВаёВ▓┤ Ж▓йЖИ░ вфЕвАЮ ВѕўВДЉ
  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  // blog/pit_bfВЌљВёю game ВаЋв│┤ в│┤ВЎё
  const knownGids=new Set(allGames.map(g=>g.id));
  const usedGids=[...new Set([...S.blog.map(e=>e.gid),...S.pit_bf.map(e=>e.gid)])].filter(Boolean);
  usedGids.forEach(gid=>{
    if(!knownGids.has(gid)){
      const sample=S.blog.find(e=>e.gid===gid)||S.pit_bf.find(e=>e.gid===gid);
      if(sample){allGames.push({id:gid,no:'?',date:sample.date||'',opp:sample.opp||'?'});knownGids.add(gid);}
    }
  });
  allGames.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  if(!allGames.length)
    return'<div class="empty">­ЪЊІ<br><br>ЖИ░вАЮВЮ┤ ВЌєВіхвІѕвІц.</div>';

  // ВёаьЃЮ Ж▓йЖИ░
  const selGid=S.logGameId;

  // вІгваЦ ьЉюВІю ВЏћ Ж▓░ВаЋ (ЖИ░в│И: ьўёВъг вЁё/ВЏћ)
  const now=new Date();
  const todayMon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  let calMon=S.calMonth||todayMon;
  const calY=parseInt(calMon.slice(0,4)),calM=parseInt(calMon.slice(5,7));
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const nextMon=calM===12?(calY+1)+'-01':calY+'-'+String(calM+1).padStart(2,'0');
  const firstDow=new Date(calY,calM-1,1).getDay();
  const daysInMon=new Date(calY,calM,0).getDate();

  // ВЮ┤ вІгВЮў Ж▓йЖИ░ вДх {dd -> game}
  const gameMap={};
  allGames.forEach(g=>{
    if(g.date&&g.date.slice(0,7)===calMon){
      const dd=g.date.slice(8,10);
      if(!gameMap[dd])gameMap[dd]=g;
    }
  });

  // вІгваЦ ваївЇћ
  const DOW=['ВЮ╝','ВЏћ','ьЎћ','Вѕў','вфЕ','ЖИѕ','ьєа'];
  let h='<div class="cal-wrap">';
  h+='<div class="cal-nav">'
    +'<button onclick="S.calMonth=\''+prevMon+'\';S.logGameId=null;renderCt()">&#8249;</button>'
    +'<span>'+calY+'вЁё '+calM+'ВЏћ</span>'
    +'<button onclick="S.calMonth=\''+nextMon+'\';S.logGameId=null;renderCt()">&#8250;</button>'
    +'</div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d,i){
    h+='<div class="cal-dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'var(--txt2)')+'">'+d+'</div>';
  });
  for(var ei=0;ei<firstDow;ei++)h+='<div class="cal-cell"></div>';
  for(var day=1;day<=daysInMon;day++){
    var ds=String(day).padStart(2,'0');
    var g=gameMap[ds];
    var isSel=g&&g.id===S.logGameId;
    var isOff=g&&(g.type||'O')==='O';
    var dow=new Date(calY,calM-1,day).getDay();
    var dc=dow===0?'#ef4444':dow===6?'#3b82f6':'var(--txt)';
    var isCurG=g&&S.game&&g.id===S.game.id;
    h+='<div class="cal-cell'+(g?' has-game':'')+(isSel?' selected':'')+'"'
      +(g?' onclick="var _gid=\''+g.id+'\';S.logGameId=(_gid===S.logGameId?null:_gid);S.calMonth=\''+calMon+'\';renderCt()"':'')+' >';
    h+='<span class="cal-day" style="color:'+dc+'">'+(isCurG?'<strong>'+day+'</strong>':day)+'</span>';
    if(g)h+='<span class="cal-dot" style="background:'+(isOff?'var(--navy)':'#16a34a')+'"></span>';
    h+='</div>';
  }
  h+='</div>';
  h+='<div class="cal-legend">'
    +'<span><span class="cal-dot" style="background:var(--navy);display:inline-block"></span>ВаЋВІЮЖ▓йЖИ░</span>'
    +'<span><span class="cal-dot" style="background:#16a34a;display:inline-block"></span>ВЌ░ВіхЖ▓йЖИ░</span>'
    +'</div>';

  // ВёаьЃЮ Ж▓йЖИ░ ВџћВЋй (вѓаВДю ьЂ┤вдГ ВІювДї)
  if(selGid){
    const selGame=allGames.find(function(g){return g.id===selGid;});
    if(selGame){
      var sd=selGame.date||'';
      var sdParts=sd.split('-');
      var sdow=sd?['ВЮ╝','ВЏћ','ьЎћ','Вѕў','вфЕ','ЖИѕ','ьєа'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
      var isOffSel=(selGame.type||'O')==='O';
      var isCurSel=S.game&&S.game.id===selGid;
      h+='<div class="cal-summary">';
      h+='<div class="cal-sum-date">';
      if(sd)h+=parseInt(sdParts[1])+'ВЏћ '+parseInt(sdParts[2])+'ВЮ╝ ('+sdow+') &nbsp;';
      h+='vs '+selGame.opp;
      h+=' <span style="background:'+(isOffSel?'#EBF0FB':'#dcfce7')+';color:'+(isOffSel?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 8px;font-size:11px;font-weight:600">'+(isOffSel?'ВаЋВІЮ':'ВЌ░Віх')+'</span>';
      if(isCurSel)h+=' <span style="background:#fee2e2;color:#b91c1c;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">ВДёьќЅВцЉ</span>';
      h+='<button onclick="showEditGameModal(\''+selGid+'\')" style="margin-left:auto;background:none;border:1px solid var(--bdr);border-radius:var(--r);padding:3px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:inherit;flex-shrink:0">РюЈ ВѕўВаЋ</button>';
      h+='<button onclick="delGame(\''+selGid+'\')" style="background:none;border:1px solid #fca5a5;border-radius:var(--r);padding:3px 10px;font-size:11px;color:#dc2626;cursor:pointer;font-family:inherit;flex-shrink:0">­ЪЌЉ ВѓГВаю</button>';
      h+='</div>';

      // вїђьЉю ВёаВѕў ЖИ░вАЮ
      if(S.myPlayer){
        var mp=ROSTER.find(function(x){return x.no===S.myPlayer;});
        if(mp){
          var mpBat=S.blog.filter(function(e){return e.gid===selGid&&e.pno===S.myPlayer;});
          var mpPit=S.pit_bf.filter(function(e){return e.gid===selGid&&e.pno===S.myPlayer;});
          h+='<div class="cal-sum-player">#'+mp.no+' '+mp.name+'</div>';
          if(mpBat.length){
            var bAB=0,bH=0,bRBI=0;
            mpBat.forEach(function(e){var s=paS(e.oc);bAB+=s.ab;bH+=s.h;bRBI+=e.rbi||0;});
            h+='<div class="cal-sum-stat">ьЃђЖ▓Е ┬и '+bAB+'ьЃђВѕў '+bH+'ВЋѕьЃђ'+(bRBI?' ┬и '+bRBI+'ьЃђВаљ':'')+'</div>';
          }
          if(mpPit.length){
            var ps=calcPitStats(S.myPlayer,selGid);
            h+='<div class="cal-sum-stat">ьѕгВѕў ┬и '+ps.ipd+'ВЮ┤вІЮ'+(ps.r?' ┬и '+ps.r+'ВІцВаљ (ВъљВ▒Ё '+ps.er+')':'')+'</div>';
          }
          if(!mpBat.length&&!mpPit.length)
            h+='<div class="cal-sum-stat" style="color:var(--txt2)">ВЮ┤ Ж▓йЖИ░ ЖИ░вАЮ ВЌєВЮї</div>';
        }
      } else {
        h+='<div class="cal-sum-stat" style="color:var(--txt2);font-size:12px">ВёцВаЋВЌљВёю вїђьЉю ВёаВѕўвЦ╝ ВДђВаЋьЋўвЕ┤ Ж░юВЮИ ЖИ░вАЮВЮ┤ ьЉюВІювљЕвІѕвІц.</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';

  // вѓаВДю ВЌєЖ▒░вѓў в╣ѕ Ж▓йЖИ░ в│хЖхг Вё╣ВЁў
  const noDateGames=allGames.filter(g=>!g.date||!g.date.match(/^\d{4}-\d{2}-\d{2}$/));
  if(noDateGames.length){
    h+='<div style="margin:8px 12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--rl);padding:12px 14px">';
    h+='<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:8px">Рџа вІгваЦВЌљ ьЉюВІювљўВДђ ВЋіВЮђ Ж▓йЖИ░ ('+noDateGames.length+'Ж░ю)</div>';
    h+='<div style="font-size:11px;color:#78350f;margin-bottom:10px;line-height:1.6">вѓаВДю ВаЋв│┤Ж░ђ ВЌєВќ┤ вІгваЦВЌљ ьЉюВІювљўВДђ ВЋіВіхвІѕвІц. ВѕўВаЋ в▓ёьі╝ВЮё вѕївЪг вѓаВДювЦ╝ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.</div>';
    noDateGames.forEach(function(g){
      var bCnt=S.blog.filter(function(e){return e.gid===g.id;}).length;
      var pCnt=S.pit_bf.filter(function(e){return e.gid===g.id;}).length;
      h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #fcd34d">';
      h+='<div style="flex:1">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">vs '+(g.opp||'?')+'</div>';
      h+='<div style="font-size:11px;color:var(--txt2)">ьЃђВёЮ '+bCnt+' ┬и ьѕгВѕў '+pCnt+'ьЃђВъљ</div>';
      h+='</div>';
      h+='<button onclick="showEditGameModal(\''+g.id+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">вѓаВДю ВъЁваЦ</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  if(!selGid){
    // вѓаВДю в»ИВёаьЃЮ: ВЏћЖ░ё ВаёВ▓┤ ЖИ░вАЮ ви░
    h+=rLogMonthly(allGames,calMon,calY,calM);
    return h;
  }

  // вѓаВДю ВёаьЃЮ: ьЋ┤вІ╣ Ж▓йЖИ░ ВЃЂВёИ ЖИ░вАЮ
  const be=S.blog.filter(e=>e.gid===selGid);
  const pbf=S.pit_bf.filter(e=>e.gid===selGid);
  const pr=S.pit_runs.filter(e=>e.gid===selGid);

  if(!be.length&&!pbf.length){
    h+='<div class="empty" style="padding:24px">ВЮ┤ Ж▓йЖИ░ВЮў ЖИ░вАЮВЮ┤ ВЌєВіхвІѕвІц.</div>';
    return h;
  }

  if(be.length){
    h+='<div class="seclbl">ьЃђВъљ ЖИ░вАЮ ('+be.length+'ьЃђВёЮ)</div>';
    be.slice().reverse().forEach(e=>{
      const oc=ocInfo(e.oc);
      const ex=[];
      if(e.rbi>0)ex.push(e.rbi+'ьЃђВаљ');

function rLogMonthly(allGames,calMon,calY,calM){
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const monGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===calMon);
  const prevGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===prevMon);
  let h='';

  // вїђьЉю ВёаВѕў ВЮ┤в▓ѕвІг vs ВДђвѓювІг ВБ╝Вџћ ьЃђЖ▓Е ВДђьЉю 3Ж░ђВДђ
  if(S.myPlayer){
    const myNo=Number(S.myPlayer);
    const curGids=new Set(monGames.map(g=>g.id));
    const prevGids=new Set(prevGames.map(g=>g.id));
    const curBlog=S.blog.filter(e=>curGids.has(e.gid)&&Number(e.pno)===myNo);
    const prevBlog=S.blog.filter(e=>prevGids.has(e.gid)&&Number(e.pno)===myNo);
    function calcMS(entries){
      var ab=0,h2=0,bb=0,hbp=0,sf=0,d2=0,d3=0,hr=0;
      entries.forEach(function(e){var s=paS(e.oc);ab+=s.ab;h2+=s.h;bb+=s.bb;hbp+=s.hbp;sf+=s.sf;d2+=s.d2;d3+=s.d3;hr+=s.hr;});
      var avg=ab>0?h2/ab:null;
      var obp=(ab+bb+hbp+sf)>0?(h2+bb+hbp)/(ab+bb+hbp+sf):null;
      var slg=ab>0?(h2+d2+2*d3+3*hr)/ab:null;
      var ops=(obp!==null&&slg!==null)?obp+slg:null;
      return{avg:avg,obp:obp,ops:ops,pa:entries.length,ab:ab,h:h2};
    }
    const cur=calcMS(curBlog),prev=calcMS(prevBlog);
    const mp=ROSTER.find(function(x){return x.no===myNo;});
    const mpName=mp?mp.name:'#'+myNo;
    const prevMonLabel=(prevMon.slice(0,4)===String(calY)?'':prevMon.slice(0,4)+'вЁё ')+parseInt(prevMon.slice(5,7))+'ВЏћ';
    if(cur.pa>0||prev.pa>0){
      h+='<div style="margin:8px 12px 4px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px">'+mpName+' '+calM+'ВЏћ ВБ╝Вџћ ьЃђЖ▓ЕВДђьЉю <span style="font-weight:400;color:var(--txt2);font-size:11px">vs '+prevMonLabel+'</span></div>';
      h+='<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">'+cur.ab+'ьЃђВѕў '+cur.h+'ВЋѕьЃђ</div>';
      h+='<div style="display:flex;gap:8px">';
      var stats2=[
        {key:'AVG',cur:cur.avg,prev:prev.avg},
        {key:'OBP',cur:cur.obp,prev:prev.obp},
        {key:'OPS',cur:cur.ops,prev:prev.ops}
      ];
      stats2.forEach(function(st){
        var cf=function(v){return v!==null?v.toFixed(3):'-';};
        var diff=(st.cur!==null&&st.prev!==null)?st.cur-st.prev:null;
        var arrow=diff===null?'':diff>0.001?'РєЉ':diff<-0.001?'РєЊ':'Рєњ';
        var arrowC=diff===null?'var(--txt2)':diff>0.001?'#16a34a':diff<-0.001?'#dc2626':'var(--txt2)';
        h+='<div style="flex:1;text-align:center;background:var(--bg2);border-radius:var(--r);padding:10px 6px">';
        h+='<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">'+st.key+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:var(--navy)">'+cf(st.cur)+'</div>';
        h+='<div style="font-size:11px;color:'+arrowC+';margin-top:3px">'+arrow+' '+cf(st.prev)+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // ВЮ┤ вІгВЮў Ж▓йЖИ░ вфЕвАЮ
  if(!monGames.length){
    h+='<div class="empty" style="padding:24px">'+calM+'ВЏћ Ж▓йЖИ░ ЖИ░вАЮВЮ┤ ВЌєВіхвІѕвІц.</div>';
    return h;
  }
  h+='<div class="seclbl">'+calY+'вЁё '+calM+'ВЏћ Ж▓йЖИ░ вфЕвАЮ</div>';
  monGames.forEach(function(g){
    var sd=g.date||'';
    var sdParts=sd.split('-');
    var sdow=sd&&sdParts.length===3?['ВЮ╝','ВЏћ','ьЎћ','Вѕў','вфЕ','ЖИѕ','ьєа'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOff=(g.type||'O')==='O';
    h+='<div class="logitem" style="cursor:pointer" onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">';
    if(sd)h+=parseInt(sdParts[2])+'ВЮ╝('+sdow+') ';
    h+='vs '+g.opp;
    h+=' <span style="background:'+(isOff?'#EBF0FB':'#dcfce7')+';color:'+(isOff?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+(isOff?'ВаЋВІЮ':'ВЌ░Віх')+'</span>';
    h+='</div>';
    if(S.myPlayer){
      var myNo2=Number(S.myPlayer);
      var mpBat2=S.blog.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var mpPit2=S.pit_bf.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var parts=[];
      if(mpBat2.length){
        var bAB2=0,bH2=0,bRBI2=0;
        mpBat2.forEach(function(e){var s=paS(e.oc);bAB2+=s.ab;bH2+=s.h;bRBI2+=e.rbi||0;});
        parts.push(bAB2+'ьЃђВѕў '+bH2+'ВЋѕьЃђ'+(bRBI2?' ┬и '+bRBI2+'ьЃђВаљ':''));
      }
      if(mpPit2.length){var ps2=calcPitStats(myNo2,g.id);parts.push(ps2.ipd+'ВЮ┤вІЮ');}
      if(parts.length)h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+parts.join(' / ')+'</div>';
    }
    h+='</div>';
    h+='<span style="color:var(--txt2);font-size:18px;padding-left:8px">Рђ║</span>';
    h+='</div>';
  });
  return h;
}

      const sel=S.sprayPlayer?S.sprayPlayer===s.name:activeSpray===s.name;
      h+='<tr style="cursor:pointer" onclick="setSprayPlayer(&apos;'+s.name+'&apos;)">'
        +'<td style="text-align:left;font-weight:700;color:'+(sel?'var(--navy)':'var(--txt)')+';text-decoration:'+(sel?'underline':'none')+'">'+s.name+(sel?' ­ЪЊЇ':'')+'</td>'
        +'<td>'+s.pa+'</td><td>'+s.ab+'</td><td>'+s.h+'</td><td>'+s.d2+'</td><td>'+s.d3+'</td>'
        +'<td style="color:var(--red);font-weight:600">'+s.hr+'</td>'
        +'<td>'+s.rbi+'</td><td>'+s.run+'</td><td>'+s.bb+'</td><td>'+s.so+'</td><td>'+s.sb+'</td></tr>';
    });
    h+='</tbody></table></div>';
    if(activeSpray)h+=rSprayChart(activeSpray);

    h+='<div class="seclbl" style="display:flex;align-items:center">­ЪЊі ьЃђВъљ ВёИВЮ┤в▓ёвДцьіИвдГВіц <span style="font-size:10px;font-weight:400;color:var(--txt2);margin-left:4px">Рђћ MLB ЖИ░Вцђ ВЃЅВЃЂ</span>'+tbtn+'</div>';
    const sortedBs=myNo?[...bs].sort((a,b)=>(Number(b.no)===myNo?1:0)-(Number(a.no)===myNo?1:0)):bs;
    if(myNo&&!myBatSt){
      h+=rNoRecMsg(myName,'ьЃђВъљ');
      if(showAll)sortedBs.forEach(function(s){h+=rBatTile(s,myNo);});
    } else {
      (showAll?sortedBs:sortedBs.filter(s=>Number(s.no)===myNo)).forEach(function(s){h+=rBatTile(s,myNo);});
    }
  }

  // РћђРћђ ьѕгВѕў РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
  if(ps.length){
    h+='<div class="seclbl">РџЙ ьѕгВѕў ЖИ░в│И ЖИ░вАЮ</div>'
      +'<div class="statwrap"><table class="pit"><thead><tr>'
      +'<th style="text-align:left;min-width:62px">ВёаВѕў</th>'
      +'<th>G</th><th>IP</th><th>H</th><th>BB</th>'
      +'<th style="color:#93c5fd">K</th><th style="color:#fca5a5">HR</th><th>ER</th><th>R</th>'
      +'</tr></thead><tbody>';
    ps.forEach(s=>{
      h+='<tr><td style="text-align:left;font-weight:700">'+s.name+'</td>'
        +'<td>'+s.g+'</td><td>'+s.ipd+'</td><td>'+s.h+'</td><td>'+s.bb+'</td>'
        +'<td style="color:#1d4ed8;font-weight:600">'+s.k+'</td>'
        +'<td style="color:var(--red)">'+s.hr+'</td>'
        +'<td style="color:var(--red);font-weight:600">'+s.er+'</td>'
        +'<td>'+s.r+'</td></tr>';
    });
    h+='</tbody></table></div>';

    h+='<div class="seclbl" style="display:flex;align-items:center">­ЪЊѕ ьѕгВѕў ВёИВЮ┤в▓ёвДцьіИвдГВіц <span style="font-size:10px;font-weight:400;color:var(--txt2);margin-left:4px">Рђћ MLB ЖИ░Вцђ ВЃЅВЃЂ</span>'+tbtn+'</div>';
    if(myNo&&!myPitSt){
      h+=rNoRecMsg(myName,'ьѕгВѕў');
      if(showAll)ps.forEach(function(s){h+=rPitTile(s,myNo);});
    } else {
      (showAll?ps:ps.filter(s=>Number(s.no)===myNo)).forEach(function(s){h+=rPitTile(s,myNo);});
    }
  }
  return h;
}

// РћђРћђ ВіцьћёваѕВЮ┤ В░еьіИ РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
function rSprayChart(playerName){
  var blog=S.blog.filter(function(e){return e.pn===playerName;});
  var entries=blog.filter(function(e){return e.zone;});
  var cx=175,cy=200,r=162;
  var SECTORS=[
    {label:'3вБеВѕў', keys:['3B','LF'],           startDeg:-45,endDeg:-26,color:'#e74c3c',inner:'#922b21'},
    {label:'ВюаЖ▓ЕВѕў', keys:['SS'],           startDeg:-26,endDeg:-8, color:'#f39c12',inner:'#d35400'},
    {label:'ВцЉВЋЎ',   keys:['LC','CF','RC'], startDeg:-8, endDeg:10, color:'#f1c40f',inner:'#d4ac0d'},
    {label:'2вБеВѕў',  keys:['2B'],           startDeg:10, endDeg:28, color:'#2ecc71',inner:'#1e8449'},
    {label:'1вБеВѕў',  keys:['1B','RF'],           startDeg:28, endDeg:45, color:'#16a085',inner:'#0e6655'},
  ];
  function pxy(deg){
    var rd=deg*Math.PI/180;
    return{x:cx+r*Math.sin(rd),y:cy-r*Math.cos(rd)};
  }
  function f(v){return v.toFixed(1);}
  var sc=SECTORS.map(function(s){
    return Object.assign({},s,{count:s.keys.reduce(function(a,k){return a+(entries.filter(function(e){return e.zone===k;}).length);},0)});
  });
  var total=sc.reduce(function(a,x){return a+x.count;},0);
  var noData=total===0;
  var h='';

  if(noData){
    // вЇ░ВЮ┤ьё░ ВЌєВЮё вЋївЈё ьїг ьІђВЮђ в│┤ВЌгВцї
    var bg0=pxy(-45),bg1=pxy(45);
    h+='<path d="M '+cx+' '+cy+' L '+f(bg0.x)+' '+f(bg0.y)+' A '+r+' '+r+' 0 0 1 '+f(bg1.x)+' '+f(bg1.y)+' Z" fill="rgba(255,255,255,.06)"/>';
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.18"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var ep={x:cx+(r*0.6)*Math.sin(mid*Math.PI/180),y:cy-(r*0.6)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.25)" font-size="11">'+s.label+'</text>';
    });
  } else {
    // Ж▒░вдг в░ўьўИ
    [0.48,0.74].forEach(function(ratio){
      var s=pxy(-45),e=pxy(45);
      var ri=r*ratio;
      var si={x:cx+ri*Math.sin(-45*Math.PI/180),y:cy-ri*Math.cos(-45*Math.PI/180)};
      var ei={x:cx+ri*Math.sin(45*Math.PI/180),y:cy-ri*Math.cos(45*Math.PI/180)};
      h+='<path d="M '+f(si.x)+' '+f(si.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(ei.x)+' '+f(ei.y)+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1" stroke-dasharray="3 4"/>';
    });
    // Вё╣ьё░
    sc.forEach(function(s){
      var p1=pxy(s.startDeg),p2=pxy(s.endDeg);
      var pct=Math.round(s.count/total*100);
      // Вё╣ьё░ В▒ёВЏђ
      h+='<path d="M '+cx+' '+cy+' L '+f(p1.x)+' '+f(p1.y)+' A '+r+' '+r+' 0 0 1 '+f(p2.x)+' '+f(p2.y)+' Z" fill="'+s.color+'" opacity="0.88"/>';
      // ВЋѕВфй Вќ┤вЉа
      var ri=r*0.38;
      var p1i={x:cx+ri*Math.sin(s.startDeg*Math.PI/180),y:cy-ri*Math.cos(s.startDeg*Math.PI/180)};
      var p2i={x:cx+ri*Math.sin(s.endDeg*Math.PI/180),y:cy-ri*Math.cos(s.endDeg*Math.PI/180)};
      h+='<path d="M '+cx+' '+cy+' L '+f(p1i.x)+' '+f(p1i.y)+' A '+f(ri)+' '+f(ri)+' 0 0 1 '+f(p2i.x)+' '+f(p2i.y)+' Z" fill="'+s.inner+'" opacity="0.4"/>';
      var mid=(s.startDeg+s.endDeg)/2;
      var lp={x:cx+(r*0.62)*Math.sin(mid*Math.PI/180),y:cy-(r*0.62)*Math.cos(mid*Math.PI/180)};
      // % ьЁЇВіцьіИ - ьЈ░ьіИ ьЂгЖИ░ ВА░ВаЋ
      h+='<text x="'+f(lp.x)+'" y="'+f(lp.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="12" font-weight="900" opacity=".95">'+pct+'%</text>';
      // ьЃђЖхгВѕў
      if(s.count>0){
        h+='<text x="'+f(lp.x)+'" y="'+f(lp.y+15)+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.85)" font-size="11">'+s.count+'ьЃђЖхг</text>';
      }
      // ЖхгВЌГ ваѕВЮ┤вИћ - ьўИ Ж░ђВъЦВъљвдг
      var ep={x:cx+(r*0.87)*Math.sin(mid*Math.PI/180),y:cy-(r*0.87)*Math.cos(mid*Math.PI/180)};
      h+='<text x="'+f(ep.x)+'" y="'+f(ep.y)+'" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="11" font-weight="600" opacity="0.9">'+s.label+'</text>';
    });
  }

  // ЖхгвХёВёа
  [-26,-8,10,28].forEach(function(deg){
    var ep=pxy(deg);
    h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(ep.x)+'" y2="'+f(ep.y)+'" stroke="rgba(0,0,0,.28)" stroke-width="1.5"/>';
  });
  // ьїїВџИвЮ╝ВЮИ
  var fl=pxy(-45),fr=pxy(45);
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fl.x)+'" y2="'+f(fl.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+f(fr.x)+'" y2="'+f(fr.y)+'" stroke="rgba(255,255,255,.55)" stroke-width="2.5"/>';
  // ВЎИВЋ╝ ьјюВіц ьўИ
  h+='<path d="M '+f(fl.x)+' '+f(fl.y)+' A '+r+' '+r+' 0 0 1 '+f(fr.x)+' '+f(fr.y)+'" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>';
  // ьЎѕьћїваѕВЮ┤ьіИ
  h+='<polygon points="'+cx+','+(cy-8)+' '+(cx+6)+','+(cy+1)+' '+(cx+3)+','+(cy+7)+' '+(cx-3)+','+(cy+7)+' '+(cx-6)+','+(cy+1)+'" fill="white" opacity=".9"/>';
  // ВаювфЕ
  h+='<text x="175" y="12" text-anchor="middle" fill="white" font-size="13" font-weight="700" opacity=".9">'+playerName+'ВЮў ВіцьћёваѕВЮ┤ В░еьіИ</text>';
  h+='<text x="175" y="25" text-anchor="middle" fill="rgba(255,255,255,.65)" font-size="11">'+total+'ьЃђЖхг в░ЕьќЦ ЖИ░вАЮ / ВаёВ▓┤ '+blog.length+'ьЃђВёЮ</text>';

  // ьЋўвІе ВџћВЋй ьєхЖ│ё
  var pull=sc[0].count+sc[1].count;
  var ctr=sc[2].count;
  var oppo=sc[3].count+sc[4].count;
  var pp=total>0?Math.round(pull/total*100):0;
  var cp=total>0?Math.round(ctr/total*100):0;
  var op=total>0?Math.round(oppo/total*100):0;

  return '<div id="spray-section" style="padding:0 12px 8px">'
    +'<div style="background:#111827;border-radius:14px;overflow:hidden;padding:12px 0 10px">'
    +'<div style="display:flex;align-items:center;justify-content:flex-end;padding:0 12px 6px">'
    +'<button onclick="setSprayPlayer(&apos;'+playerName+'&apos;)" style="background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.85);cursor:pointer;font-size:14px;padding:10px 14px;border-radius:6px;min-height:44px;line-height:1">РюЋ</button>'
    +'</div>'
    +'<svg viewBox="0 0 350 215" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'+h+'</svg>'
    // в▓ћвАђ
    +'<div style="display:flex;gap:8px;justify-content:center;margin:6px 0 8px;flex-wrap:wrap">'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#e74c3c"></span>вІ╣Ж▓еВ╣ўЖИ░</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f39c12"></span>ВюаЖ▓ЕВѕў</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#f1c40f"></span>ВцЉВЋЎ</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2ecc71"></span>2вБеВѕў</span>'
    +'<span style="font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#16a085"></span>в░ђВќ┤В╣ўЖИ░</span>'
    +'</div>'
    // 3вІе ВџћВЋй
    +(noData?('<div style="padding:0 12px;text-align:center;font-size:11px;color:rgba(255,255,255,.35)">ьЃђЖхг в░ЕьќЦ вЇ░ВЮ┤ьё░Ж░ђ ВЌєВіхвІѕвІц. ьЃђВёЮ ВъЁваЦ ВІю в░ЕьќЦВЮё ВёаьЃЮьЋўвЕ┤ ьЉюВІювљЕвІѕвІц.</div>'):('<div style="display:flex;gap:6px;margin:0 12px">'+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#f87171">'+pp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">вІ╣Ж▓еВ╣ўЖИ░</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#fde047">'+cp+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">ВцЉВЋЎ</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:#4ade80">'+op+'%</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">в░ђВќ┤В╣ўЖИ░</div></div>')+('<div style="flex:1;text-align:center;padding:8px 4px;border-radius:8px;background:rgba(255,255,255,.07)"><div style="font-size:18px;font-weight:800;color:white">'+total+'</div><div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px">ЖИ░вАЮьЃђЖхг</div></div>')+'</div>'))
    +'</div></div>';
}

function setSprayPlayer(name){
  S.sprayPlayer=(S.sprayPlayer===name)?null:name;
  renderCt();
  if(S.sprayPlayer){setTimeout(function(){var el=document.getElementById('spray-section');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);}
}

function selBat(no){S.bp=no;S.bs=1;r();}

function adj(key,d){

  S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,
    pno:p.no,pn:p.name,oc:S.bo,rbi:S.brbi,run:0,sb:S.bsb,cs:S.bcs,zone:S.bzone});
  save();toast(p.name+' '+ocInfo(S.bo).l+' ВађВъЦ!','ok');S.bs=0;S.bzone=null;r();
}
function pitOC(id){
  if(!S.game){toast('Ж▓йЖИ░вЦ╝ ве╝Вађ ВІюВъЉьЋ┤ВБ╝ВёИВџћ','err');return;}
  const p=ROSTER.find(x=>x.no===S.curPit);
  S.pit_bf.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:p.no,pn:p.name,oc:id});
  save();const st=calcPitStats(S.curPit,S.game.id);
  toast(p.name+' '+ocInfo(id).l+' ┬и '+st.ipd+'ВЮ┤вІЮ '+st.k+'K','ok');renderCt();
}
function addBatRun(pno){
  if(!S.game){toast('Ж▓йЖИ░вЦ╝ ве╝Вађ ВІюВъЉьЋ┤ВБ╝ВёИВџћ','err');return;}
  const entries=S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno);
  if(!entries.length){const p=ROSTER.find(x=>x.no===pno);S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:p.no,pn:p.name,oc:'_RUN',rbi:0,run:1,sb:0,cs:0});}
  else entries[entries.length-1].run=(entries[entries.length-1].run||0)+1;
  save();const p=ROSTER.find(x=>x.no===pno);toast(p.name+' вЊЮВаљ!','ok');
  const row=document.getElementById('rr-'+pno);
  if(row){row.classList.remove('flash');void row.offsetWidth;row.classList.add('flash');
    const c=row.querySelectorAll('div div')[1];if(c)c.textContent='ВЮ┤в▓ѕ Ж▓йЖИ░ '+getRunsThisGame(pno)+'вЊЮВаљ';}
}
function addPitRun(earned){
  if(!S.game){toast('Ж▓йЖИ░вЦ╝ ве╝Вађ ВІюВъЉьЋ┤ВБ╝ВёИВџћ','err');return;}
  const p=ROSTER.find(x=>x.no===S.curPit);
  S.pit_runs.push({id:UID(),gid:S.game.id,pno:p.no,pn:p.name,earned});
  save();toast(p.name+' '+(earned?'ВъљВ▒ЁВаљ':'в╣ёВъљВ▒ЁВаљ'),'ok');renderCt();
}
function delPitRun(id){S.pit_runs=S.pit_runs.filter(e=>e.id!==id);save();renderCt();}
function del(type,id){
  if(type==='b')S.blog=S.blog.filter(e=>e.id!==id);
  else if(type==='pbf')S.pit_bf=S.pit_bf.filter(e=>e.id!==id);
  S.syncedIds.delete(id);save();renderCt();
}
function delGame(gid){
  const g=S.games.find(x=>x.id===gid);
  if(!g)return;
  const bCnt=S.blog.filter(e=>e.gid===gid).length;
  const pCnt=S.pit_bf.filter(e=>e.gid===gid).length;
  const label='vs '+(g.opp||'?')+(g.date?' ('+g.date+')':'');
  var msg='Ж▓йЖИ░вЦ╝ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?\n\n'+label;
  if(bCnt||pCnt)msg+='\n\nьЃђВъљ ЖИ░вАЮ '+bCnt+'Ж▒┤, ьѕгВѕў ЖИ░вАЮ '+pCnt+'Ж▒┤вЈё ьЋеЖ╗ў ВѓГВаювљЕвІѕвІц.';
  if(!confirm(msg))return;
  S.games=S.games.filter(x=>x.id!==gid);
  S.blog=S.blog.filter(e=>e.gid!==gid);
  S.pit_bf=S.pit_bf.filter(e=>e.gid!==gid);
  S.pit_runs=S.pit_runs.filter(e=>e.gid!==gid);
  if(S.logGameId===gid)S.logGameId=null;
  if(S.game&&S.game.id===gid)S.game=null;
  if(!S.deletedGids.includes(gid))S.deletedGids.push(gid);
  S.syncedIds.delete('g_'+gid);
  save();toast(label+' ВѓГВаювље (вІцВЮї вЈЎЖИ░ьЎћ ВІю Вёюв▓ёВЌљВёювЈё ВѓГВаю)','ok');r();
}

function confirmEditEntry(){
  const es=editState;
  if(es.type==='bat'){
    const idx=S.blog.findIndex(x=>x.id===es.id);
    if(idx>=0){S.blog[idx]={...S.blog[idx],oc:es.oc,rbi:es.rbi,run:es.run,sb:es.sb,cs:es.cs,zone:es.zone};S.syncedIds.delete(es.id);}
  }else if(es.type==='pitbf'){
    const idx=S.pit_bf.findIndex(x=>x.id===es.id);
    if(idx>=0){S.pit_bf[idx]={...S.pit_bf[idx],oc:es.oc};S.syncedIds.delete(es.id);}
  }else if(es.type==='pitrun'){
    const idx=S.pit_runs.findIndex(x=>x.id===es.id);

  }
  save();closeModal();renderCt();toast('ВѕўВаЋ ВЎёвБї Рђћ ВъгвЈЎЖИ░ьЎћ ьЋёВџћ','ok');
}

    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'

    +'<div class="mlbl">ьЈгВДђВЁў</div><input type="text" id="ep-pos" value="'+p.pos+'" maxlength="5" placeholder="'+(role==='b'?'1B, SS, LF вЊ▒':'P')+'">'

    +'</div></div></div>';

function confirmEditPlayer(no,role){
  const nn=parseInt(document.getElementById('ep-no').value);
  const nm=document.getElementById('ep-name').value.trim();
  const np=document.getElementById('ep-pos').value.trim();
  if(!nm||!np){toast('ВЮ┤вдёЖ│╝ ьЈгВДђВЁўВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ','err');return;}
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER[idx]={...ROSTER[idx],no:isNaN(nn)?no:nn,name:nm,pos:np};

}
function deletePlayer(no,role){
  if(!confirm('ВЮ┤ ВёаВѕўвЦ╝ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?'))return;
  const idx=ROSTER.findIndex(x=>x.no===no&&x.r===role);
  if(idx>=0)ROSTER.splice(idx,1);
  S.rosterDirty=true;save();closeModal();r();toast('ВѓГВаю ВЎёвБї');
}
function showAddPlayerModal(){
  const type=S.rosterSub===0?'b':'p';
  const nos=ROSTER.map(p=>p.no).filter(n=>!isNaN(n));
  const nextNo=nos.length?Math.max(...nos)+1:1;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>'+(type==='b'?'ьЃђВъљ':'ьѕгВѕў')+' ВХћЖ░ђ</h3>'
    +'<div class="mlbl">вЊ▒в▓ѕьўИ</div><input type="number" id="ap-no" min="0" max="99" value="'+nextNo+'">'
    +'<div class="mlbl">ВЮ┤вдё</div><input type="text" id="ap-name" placeholder="ВёаВѕў ВЮ┤вдё" maxlength="10">'
    +'<div class="mlbl">ьЈгВДђВЁў</div><input type="text" id="ap-pos" placeholder="'+(type==='b'?'1B, 2B, SS, LF, CF, RF, C, DH':'P')+'" maxlength="5">'
    +'<div class="mbtns"><button class="mcancel" onclick="closeModal()">ВиеВєї</button>'
    +'<button class="mok" onclick="confirmAddPlayer(\''+type+'\')">ВХћЖ░ђ</button></div></div></div>';
  setTimeout(()=>document.getElementById('ap-name').focus(),100);
}
function confirmAddPlayer(type){
  const no=parseInt(document.getElementById('ap-no').value)||0;
  const name=document.getElementById('ap-name').value.trim();
  const pos=document.getElementById('ap-pos').value.trim();
  if(!name||!pos){toast('ВЮ┤вдёЖ│╝ ьЈгВДђВЁўВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ','err');return;}
  ROSTER.push({no,name,pos,r:type});
  ROSTER.sort((a,b)=>a.no-b.no);
  S.rosterDirty=true;save();closeModal();r();toast(name+' ВХћЖ░ђ ВЎёвБї','ok');
}

function confirmEditGame(gid){
  const d=document.getElementById('m-date').value.trim();
  const o=document.getElementById('m-opp').value.trim();
  const t=document.getElementById('m-gtype').value||'O';
  if(!d||!o){toast('вѓаВДюВЎђ ВЃЂвїђьїђВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ','err');return;}
  // S.games ВЌЁвЇ░ВЮ┤ьіИ (ВЌєВю╝вЕ┤ ВХћЖ░ђ)
  var g=S.games.find(function(x){return x.id===gid;});
  if(g){g.date=d;g.opp=o;g.type=t;}
  else{S.games.push({id:gid,no:S.gcnt++,date:d,opp:o,type:t});}
  // blog/pit_bf/pit_runsВЮў date┬иoppвЈё вЈЎЖИ░ьЎћ
  [S.blog,S.pit_bf,S.pit_runs].forEach(function(arr){
    arr.filter(function(e){return e.gid===gid;}).forEach(function(e){e.date=d;e.opp=o;});
  });
  // ВѕўВаЋвљю Ж▓йЖИ░Ж░ђ ВъгвЈЎЖИ░ьЎћвљўвЈёвАЮ syncedIdsВЌљВёю ВаюЖ▒░
  S.syncedIds.delete('g_'+gid);
  S.blog.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  S.pit_bf.filter(function(e){return e.gid===gid;}).forEach(function(e){S.syncedIds.delete(e.id);});
  // ВЮ┤ Ж▓йЖИ░вЦ╝ ВёаьЃЮ ВЃЂьЃювАю + ьЋ┤вІ╣ ВЏћвАю ВЮ┤вЈЎ
  S.logGameId=gid;
  S.calMonth=d.slice(0,7);
  save();closeModal();renderCt();toast('Ж▓йЖИ░ ВаЋв│┤Ж░ђ ВѕўВаЋвљљВіхвІѕвІц','ok');
}

async function doSync(){
  if(!S.scriptUrl||S.syncing)return;
  const bP=S.blog.filter(e=>!S.syncedIds.has(e.id));
  const pfP=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
  const prP=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));
  const gP=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
  const dG=S.deletedGids||[];
  if(!bP.length&&!pfP.length&&!prP.length&&!gP.length&&!dG.length&&!S.rosterDirty){toast('вЈЎЖИ░ьЎћьЋа вЇ░ВЮ┤ьё░ ВЌєВЮї');return;}
  S.syncing=true;r();
  try{
    if(bP.length||pfP.length||prP.length||gP.length||dG.length){
      const res=await fetch(S.scriptUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body:JSON.stringify({type:'sync',games:gP,bat_log:bP,pit_bf:pfP,pit_runs:prP,deleted_gids:dG})});
      const data=await res.json();
      if(data.status!=='ok')throw new Error(data.message||'Вёюв▓ё ВўцвЦў');
      bP.forEach(e=>S.syncedIds.add(e.id));
      pfP.forEach(e=>S.syncedIds.add(e.id));
      prP.forEach(e=>S.syncedIds.add(e.id));
      gP.forEach(g=>S.syncedIds.add('g_'+g.id));
      S.deletedGids=[];
    }
    if(S.rosterDirty){
      const rp=encodeURIComponent(JSON.stringify(ROSTER));
      const rr=await fetch(S.scriptUrl+'?action=saveRoster&data='+rp);
      const rd=await rr.json();
      if(rd.status==='ok')S.rosterDirty=false;
    }
    S.lastSync=Date.now();save();
    const total=bP.length+pfP.length+prP.length;
    const delMsg=dG.length?' ┬и '+dG.length+'Ж▓йЖИ░ ВѓГВаю':'';
    toast('РўЂ вЈЎЖИ░ьЎћ ВЎёвБї ('+(total>0?total+'Ж▒┤':'ВёаВѕўвфЁвІе')+delMsg+'ВаёВєА)','ok');
  }catch(e){toast('вЈЎЖИ░ьЎћ ВІцьїе: '+e.message,'err');console.error(e);}
  S.syncing=false;r();
}
async function loadFromSheets(){
  if(!S.scriptUrl){toast('ве╝Вађ URLВЮё ВађВъЦьЋ┤ВБ╝ВёИВџћ','err');return;}
  S.loading=true;r();
  try{
    const res=await fetch(S.scriptUrl+'?action=fetch');
    const data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'ВўцвЦў');

    // Вёюв▓ёЖ░ђ ЖХїВюё(source of truth): Вёюв▓ё вЇ░ВЮ┤ьё░вАю ЖхљВ▓┤
    // вІе, ВЋёВДЂ вЈЎЖИ░ьЎћ ВЋѕ вљю вАюВ╗г ВаёВџЕ ьЋГвфЕВЮђ в│┤ВА┤
    const unsyncedGames=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
    const unsyncedBlog=S.blog.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitBf=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitRuns=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));

    const svrGameIds=new Set((data.games||[]).map(g=>g.id));
    const svrBlogIds=new Set((data.bat_log||[]).map(e=>e.id));
    const svrPitBfIds=new Set((data.pit_bf||[]).map(e=>e.id));
    const svrPitRunIds=new Set((data.pit_runs||[]).map(e=>e.id));

    // Вёюв▓ё вЇ░ВЮ┤ьё░ + вАюВ╗г в»ИвЈЎЖИ░ьЎћ ьЋГвфЕ в│ЉьЋЕ (Вёюв▓ёВЌљ ВЮ┤в»И Въѕвіћ Ж▒┤ ВаюВЎИ)
    S.games=[...(data.games||[]),...unsyncedGames.filter(g=>!svrGameIds.has(g.id))];
    S.blog=[...(data.bat_log||[]),...unsyncedBlog.filter(e=>!svrBlogIds.has(e.id))];
    S.pit_bf=[...(data.pit_bf||[]),...unsyncedPitBf.filter(e=>!svrPitBfIds.has(e.id))];
    S.pit_runs=[...(data.pit_runs||[]),...unsyncedPitRuns.filter(e=>!svrPitRunIds.has(e.id))];

    if(data.roster&&data.roster.length>0){ROSTER.splice(0,ROSTER.length,...data.roster);S.rosterDirty=false;}

    // syncedIds ВъгЖхгВё▒: Вёюв▓ёВЌљВёю Вўе ьЋГвфЕвДї syncedвАю ьЉюВІю
    S.syncedIds=new Set();
    (data.games||[]).forEach(g=>S.syncedIds.add('g_'+g.id));
    (data.bat_log||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_bf||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_runs||[]).forEach(e=>S.syncedIds.add(e.id));

    // Вёюв▓ёВЌљВёю ВѓГВаювљю gidвіћ вАюВ╗г deletedGidsВЌљВёювЈё ВаюЖ▒░ (ВЮ┤в»И в░ўВўЂвље)
    S.deletedGids=(S.deletedGids||[]).filter(gid=>svrGameIds.has(gid));

    save();
    const svrTotal=(data.games||[]).length+(data.bat_log||[]).length+(data.pit_bf||[]).length+(data.pit_runs||[]).length;
    const rMsg=data.roster&&data.roster.length>0?' / ВёаВѕў '+data.roster.length+'вфЁ':'';
    toast('РюЊ вХѕвЪгВўцЖИ░ ВЎёвБї ('+svrTotal+'Ж▒┤)'+rMsg,'ok');
  }catch(e){toast('вХѕвЪгВўцЖИ░ ВІцьїе Рђћ URL ьЎЋВЮИ','err');console.error(e);}
  S.loading=false;r();
}
