function parseRosterSiblings(roster){
  (roster||[]).forEach(function(p){
    if(!p.siblings||p.siblings===''||p.siblings===null){p.siblings=[];return;}
    if(Array.isArray(p.siblings))return;
    if(typeof p.siblings==='string'){
      var s=p.siblings.trim();
      try{
        var parsed=JSON.parse(s);
        p.siblings=Array.isArray(parsed)?parsed.map(Number).filter(function(n){return!isNaN(n);}):[];
      }catch(e){
        // "5,7" эШХьЛЭ fallback
        p.siblings=s.split(',').map(function(x){return parseInt(x.trim());}).filter(function(n){return!isNaN(n);});
      }
    }
    if(!Array.isArray(p.siblings))p.siblings=[];
  });
}
function getSiblingGroup(){
  if(!S.myPlayer)return[];
  // ъ░ЩьЭА ы▓ИэШ╕ъ░А эГАьЮР/эИмьИШ ыСР эХныкйьЬ╝ыбЬ ьЮИьЭД ьИШ ьЮИьЬ╝ыпАыбЬ ыкиыУа эХныкйьЧРьДЬ siblings ьИШьзС
  var sibNos=[];
  ROSTER.filter(function(x){return x.no===S.myPlayer;}).forEach(function(me){
    if(Array.isArray(me.siblings))me.siblings.forEach(function(s){if(sibNos.indexOf(s)<0)sibNos.push(s);});
  });
  if(!sibNos.length)return[];
  var seen=new Set();
  return sibNos.map(function(sno){return ROSTER.find(function(x){return x.no===sno;});}).filter(function(p){return p&&!seen.has(p.no)&&seen.add(p.no);});
}

function paS(o){
  const noAB=["BB","IBB","HBP","SF","SH"],hits=["1B","2B","3B","HR"];
  return{pa:1,ab:noAB.includes(o)?0:1,h:hits.includes(o)?1:0,
    d2:o==="2B"?1:0,d3:o==="3B"?1:0,hr:o==="HR"?1:0,
    bb:(o==="BB"||o==="IBB")?1:0,hbp:o==="HBP"?1:0,so:(o==="K"||o==="KWP")?1:0,sf:o==="SF"?1:0};
}
// MLB ъ╕░ьдА ыУ▒ъ╕Й эМРы│Д
const MLB_BENCH={
  AVG: {good:0.280,bad:0.220,rev:false},
  OBP: {good:0.350,bad:0.300,rev:false},
  SLG: {good:0.450,bad:0.350,rev:false},
  OPS: {good:0.800,bad:0.650,rev:false},
  wOBA:{good:0.360,bad:0.300,rev:false},
  'wRC+':{good:115,bad:85,rev:false},
  ISO: {good:0.170,bad:0.090,rev:false},
  BABIP:{good:0.340,bad:0.260,rev:false},
  'BB%':{good:0.10,bad:0.06,rev:false},
  'K%': {good:0.15,bad:0.23,rev:true},
  'BB/K':{good:0.70,bad:0.35,rev:false},
  WAR: {good:2.0,bad:0,rev:false},
  ERA: {good:3.50,bad:5.00,rev:true},
  WHIP:{good:1.20,bad:1.50,rev:true},
  FIP: {good:3.50,bad:5.00,rev:true},
  'K/9':{good:9.0,bad:6.0,rev:false},
  'BB/9':{good:3.0,bad:4.5,rev:true},
  'pitK%':{good:0.25,bad:0.15,rev:false},
  'pitBB%':{good:0.08,bad:0.12,rev:true},
};
function statTier(key,val){
  const b=MLB_BENCH[key];
  if(!b)return'avg';
  if(b.rev)return val<=b.good?'good':val>=b.bad?'bad':'avg';
  return val>=b.good?'good':val<=b.bad?'bad':'avg';
}
function tierStyle(tier){
  if(tier==='good')return{bg:'#f0fdf4',fc:'#15803d',mark:'тЦ▓'};
  if(tier==='bad') return{bg:'#fff5f5',fc:'#b91c1c',mark:'тЦ╝'};
  return{bg:'var(--card)',fc:'var(--txt2)',mark:'тАФ'};
}
function batAgg(filtGids){
  const m={};
  for(const e of S.blog){
    if(filtGids&&!filtGids.has(e.gid))continue;
    const k=e.pn;
    if(!m[k])m[k]={name:k,no:e.pno,pa:0,ab:0,h:0,d2:0,d3:0,hr:0,bb:0,hbp:0,so:0,sf:0,rbi:0,run:0,sb:0,cs:0,gids:new Set()};
    const t=m[k],s=paS(e.oc);
    for(const f of['pa','ab','h','d2','d3','hr','bb','hbp','so','sf'])t[f]+=s[f];
    t.rbi+=e.rbi||0;t.run+=e.run||0;t.sb+=e.sb||0;t.cs+=e.cs||0;
    if(e.gid)t.gids.add(e.gid);
  }
  const wBB=0.69,wHBP=0.72,w1B=0.89,w2B=1.27,w3B=1.62,wHR=2.10;
  const players=Object.values(m).map(t=>{
    const singles=t.h-t.d2-t.d3-t.hr;
    const avg=t.ab>0?t.h/t.ab:0;
    const od=t.ab+t.bb+t.hbp+t.sf;
    const obp=od>0?(t.h+t.bb+t.hbp)/od:0;
    const slg=t.ab>0?(t.h+t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const iso=t.ab>0?(t.d2+2*t.d3+3*t.hr)/t.ab:0;
    const bd=t.ab-t.so-t.hr+t.sf;
    const babip=bd>0?(t.h-t.hr)/bd:0;
    const wn=wBB*t.bb+wHBP*t.hbp+w1B*singles+w2B*t.d2+w3B*t.d3+wHR*t.hr;
    const wd=t.ab+t.bb+t.hbp+t.sf;
    const woba=wd>0?wn/wd:0;
    return{...t,avg,obp,slg,ops:obp+slg,iso,babip,woba,
      bbp:t.pa>0?t.bb/t.pa:0,kp:t.pa>0?t.so/t.pa:0,
      bbk:t.so>0?t.bb/t.so:(t.bb>0?99:0),g:t.gids.size,singles};
  });
  const totalPA=players.reduce((s,p)=>s+p.pa,0);
  const lgwOBA=totalPA>0?players.reduce((s,p)=>s+p.woba*p.pa,0)/totalPA:0.320;
  return players.map(p=>{
    const wrc_plus=lgwOBA>0?Math.round(p.woba/lgwOBA*100):100;
    const bat_runs=(p.woba-lgwOBA)/1.15*p.pa;
    const repl_runs=2.0*p.pa/100;
    const war=(bat_runs+repl_runs)/10;
    return{...p,wrc_plus,war};
  }).sort((a,b)=>b.ops-a.ops);
}
function calcPitStats(pno,gid,filtGids){
  let bf=S.pit_bf.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  let runs=S.pit_runs.filter(e=>e.pno===pno&&(gid?e.gid===gid:true));
  if(filtGids){bf=bf.filter(e=>filtGids.has(e.gid));runs=runs.filter(e=>filtGids.has(e.gid));}
  const h=bf.filter(e=>['1B','2B','3B','HR'].includes(e.oc)).length;
  const hr=bf.filter(e=>e.oc==='HR').length;
  const bb=bf.filter(e=>['BB','IBB'].includes(e.oc)).length;
  const k=bf.filter(e=>e.oc==='K').length;
  const outs=bf.reduce((s,e)=>s+ocOuts(e.oc),0);
  const er=runs.filter(e=>e.earned).length,rv=runs.length;
  const iF=Math.floor(outs/3),iR=outs%3,ipf=iF+iR/3;
  const ipd=iR>0?iF+'.'+iR:''+iF;
  const era=ipf>0?er*9/ipf:0,whip=ipf>0?(h+bb)/ipf:0;
  const fip=ipf>0?(13*hr+3*bb-2*k)/ipf+3.10:0;
  return{bf:bf.length,h,hr,bb,k,outs,r:rv,er,ipd,ipf,era,whip,fip,
    k9:ipf>0?k*9/ipf:0,bb9:ipf>0?bb*9/ipf:0};
}
function pitAgg(filtGids){
  const src=filtGids?S.pit_bf.filter(e=>filtGids.has(e.gid)):S.pit_bf;
  const pnos=[...new Set(src.map(e=>e.pno))];
  return pnos.map(pno=>{
    const p=ROSTER.find(x=>x.no===pno)||{name:'#'+pno};
    const g=new Set(src.filter(e=>e.pno===pno).map(e=>e.gid)).size;
    return{...calcPitStats(pno,null,filtGids),name:p.name,no:pno,g};
  }).sort((a,b)=>a.era-b.era);
}
function getBattersThisGame(){
  if(!S.game)return ROSTER.filter(p=>p.r==='b');
  const app=new Set(S.blog.filter(e=>e.gid===S.game.id).map(e=>e.pno));
  const all=ROSTER.filter(p=>p.r==='b');
  return[...all.filter(p=>app.has(p.no)),...all.filter(p=>!app.has(p.no))];
}
function getRunsThisGame(pno){
  if(!S.game)return 0;
  return S.blog.filter(e=>e.gid===S.game.id&&e.pno===pno).reduce((s,e)=>s+(e.run||0),0);
}
function gameScore(gid){
  var our=S.blog.filter(function(e){return e.gid===gid;}).reduce(function(s,e){return s+(e.run||0);},0);
  var opp=S.pit_runs.filter(function(e){return e.gid===gid;}).length;
  var hasBat=S.blog.some(function(e){return e.gid===gid;});
  var hasPit=S.pit_runs.some(function(e){return e.gid===gid;});
  return{our:our,opp:opp,has:hasBat||hasPit};
}
function pendingCount(){
  return S.blog.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_bf.filter(e=>!S.syncedIds.has(e.id)).length
    +S.pit_runs.filter(e=>!S.syncedIds.has(e.id)).length
    +S.games.filter(g=>!S.syncedIds.has('g_'+g.id)).length
    +(S.deletedGids&&S.deletedGids.length?S.deletedGids.length:0)
    +(S.rosterDirty?1:0);
}

async function doSetupLogin(){

  const allGames=[...S.games].sort((a,b)=>String(b.date).localeCompare(String(a.date)));

function rLogMonthly(allGames,calMon,calY,calM){
  const prevMon=calM===1?(calY-1)+'-12':calY+'-'+String(calM-1).padStart(2,'0');
  const monGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===calMon);
  const prevGames=allGames.filter(g=>g.date&&g.date.slice(0,7)===prevMon);
  let h='';

  // ыМАэСЬ ьДаьИШ ьЭ┤ы▓ИыЛм vs ьзАыВЬыЛм ьг╝ьЪФ эГАъ▓й ьзАэСЬ 3ъ░АьзА
  if(activeNo()){
    const myNo=Number(activeNo());
    const curGids=new Set(monGames.map(g=>g.id));
    const prevGids=new Set(prevGames.map(g=>g.id));
    const curBlog=S.blog.filter(e=>curGids.has(e.gid)&&Number(e.pno)===myNo);
    const prevBlog=S.blog.filter(e=>prevGids.has(e.gid)&&Number(e.pno)===myNo);
    function calcMS(entries){
      var ab=0,h2=0,bb=0,hbp=0,sf=0,d2=0,d3=0,hr=0;
      entries.forEach(function(e){var s=paS(e.oc);ab+=s.ab;h2+=s.h;bb+=s.bb;hbp+=s.hbp;sf+=s.sf;d2+=s.d2;d3+=s.d3;hr+=s.hr;});
      var avg=ab>0?h2/ab:null;
      var obp=(ab+bb+hbp+sf)>0?(h2+bb+hbp)/(ab+bb+hbp+sf):null;
      var slg=ab>0?(h2+d2+2*d3+3*hr)/ab:null;
      var ops=(obp!==null&&slg!==null)?obp+slg:null;
      return{avg:avg,obp:obp,ops:ops,pa:entries.length,ab:ab,h:h2};
    }
    const cur=calcMS(curBlog),prev=calcMS(prevBlog);
    const mp=ROSTER.find(function(x){return x.no===myNo;});
    const mpName=mp?mp.name:'#'+myNo;
    const prevMonLabel=(prevMon.slice(0,4)===String(calY)?'':prevMon.slice(0,4)+'ыЕД ')+parseInt(prevMon.slice(5,7))+'ьЫФ';
    if(cur.pa>0||prev.pa>0){
      h+='<div style="margin:8px 12px 4px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px">';
      h+='<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px">'+mpName+' '+calM+'ьЫФ ьг╝ьЪФ эГАъ▓йьзАэСЬ <span style="font-weight:400;color:var(--txt2);font-size:11px">vs '+prevMonLabel+'</span></div>';
      h+='<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">'+cur.ab+'эГАьИШ '+cur.h+'ьХИэГА</div>';
      h+='<div style="display:flex;gap:8px">';
      var stats2=[
        {key:'AVG',cur:cur.avg,prev:prev.avg},
        {key:'OBP',cur:cur.obp,prev:prev.obp},
        {key:'OPS',cur:cur.ops,prev:prev.ops}
      ];
      stats2.forEach(function(st){
        var cf=function(v){return v!==null?v.toFixed(3):'-';};
        var diff=(st.cur!==null&&st.prev!==null)?st.cur-st.prev:null;
        var arrow=diff===null?'':diff>0.001?'тЖС':diff<-0.001?'тЖУ':'тЖТ';
        var arrowC=diff===null?'var(--txt2)':diff>0.001?'#16a34a':diff<-0.001?'#dc2626':'var(--txt2)';
        h+='<div style="flex:1;text-align:center;background:var(--bg2);border-radius:var(--r);padding:10px 6px">';
        h+='<div style="font-size:10px;color:var(--txt2);margin-bottom:4px">'+st.key+'</div>';
        h+='<div style="font-size:18px;font-weight:700;color:var(--navy)">'+cf(st.cur)+'</div>';
        h+='<div style="font-size:11px;color:'+arrowC+';margin-top:3px">'+arrow+' '+cf(st.prev)+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    }
  }

  // ьЭ┤ ыЛмьЭШ ъ▓╜ъ╕░ ыкйыбЭ
  if(!monGames.length){
    h+='<div class="empty" style="padding:24px">'+calM+'ьЫФ ъ▓╜ъ╕░ ъ╕░ыбЭьЭ┤ ьЧЖьК╡ыЛИыЛд.</div>';
    return h;
  }
  h+='<div class="seclbl">'+calY+'ыЕД '+calM+'ьЫФ ъ▓╜ъ╕░ ыкйыбЭ</div>';
  monGames.forEach(function(g){
    var sd=g.date||'';
    var sdParts=sd.split('-');
    var sdow=sd&&sdParts.length===3?['ьЭ╝','ьЫФ','эЩФ','ьИШ','ыкй','ъ╕И','эЖа'][new Date(parseInt(sdParts[0]),parseInt(sdParts[1])-1,parseInt(sdParts[2])).getDay()]:'';
    var isOff=(g.type||'O')==='O';
    h+='<div class="logitem" style="cursor:pointer" onclick="S.logGameId=\''+g.id+'\';S.calMonth=\''+calMon+'\';renderCt()">';
    h+='<div style="min-width:0;flex:1">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--txt)">';
    if(sd)h+=parseInt(sdParts[2])+'ьЭ╝('+sdow+') ';
    h+='vs '+esc(g.opp);
    h+=' <span style="background:'+(isOff?'#EBF0FB':'#dcfce7')+';color:'+(isOff?'var(--navy)':'#15803d')+';border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">'+(isOff?'ьаХьЛЭ':'ьЧ░ьК╡')+'</span>';
    h+='</div>';
    if(activeNo()){
      var myNo2=Number(activeNo());
      var mpBat2=S.blog.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var mpPit2=S.pit_bf.filter(function(e){return e.gid===g.id&&Number(e.pno)===myNo2;});
      var parts=[];
      if(mpBat2.length){
        var bAB2=0,bH2=0,bRBI2=0;
        mpBat2.forEach(function(e){var s=paS(e.oc);bAB2+=s.ab;bH2+=s.h;bRBI2+=e.rbi||0;});
        parts.push(bAB2+'эГАьИШ '+bH2+'ьХИэГА'+(bRBI2?' ┬╖ '+bRBI2+'эГАьаР':''));
      }
      if(mpPit2.length){var ps2=calcPitStats(myNo2,g.id);parts.push(ps2.ipd+'ьЭ┤ыЛЭ');}
      if(parts.length)h+='<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+parts.join(' / ')+'</div>';
    }
    h+='</div>';
    var sc=gameScore(g.id);
    if(sc.has){
      var win=sc.our>sc.opp,lose=sc.our<sc.opp;
      h+='<div style="text-align:right;flex-shrink:0;padding-left:10px">'
        +'<div style="font-size:18px;font-weight:800;letter-spacing:1px;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+'">'+sc.our+' - '+sc.opp+'</div>'
        +'<div style="font-size:10px;font-weight:700;color:'+(win?'#16a34a':lose?'#dc2626':'var(--txt2)')+';">'+(win?'ьК╣':lose?'эМи':'ым┤')+'</div>'
        +'</div>';
    } else {
      h+='<span style="color:var(--txt2);font-size:18px;padding-left:8px">тА║</span>';
    }
    h+='</div>';
  });
  return h;
}

function rSprayChart(pno){
  var pno2=Number(pno);
  var roster=ROSTER.find(function(x){return Number(x.no)===pno2;});
  var playerName=roster?roster.name:('#'+pno2);
  // pno ъ╕░ы░Ш 1ь░и ъ▓АьГЙ
  var blog=S.blog.filter(function(e){return Number(e.pno)===pno2;});
  // pno ыздь╣н ьЧЖьЬ╝ый┤ ьЭ┤ыжД ъ╕░ы░Ш fallback
  if(blog.length===0&&roster){
    blog=S.blog.filter(function(e){return e.pn===roster.name;});
  }
  var entries=blog.filter(function(e){return e.zone;});
  console.log('[SprayChart] pno='+pno2+' name='+playerName+' blog='+blog.length+' zone='+entries.length);
  var cx=175,cy=200,r=162;
  var SECTORS=[
    {label:'3ыгиьИШ', keys:['3B','LF'],           startDeg:-45,endDeg:-26,color:'#e74c3c',inner:'#922b21'},
    {label:'ьЬаъ▓йьИШ', keys:['SS'],           startDeg:-26,endDeg:-8, color:'#f39c12',inner:'#d35400'},
    {label:'ьдСьХЩ',   keys:['LC','CF','RC'], startDeg:-8, endDeg:10, color:'#f1c40f',inner:'#d4ac0d'},
    {label:'2ыгиьИШ',  keys:['2B'],           startDeg:10, endDeg:28, color:'#2ecc71',inner:'#1e8449'},
    {label:'1ыгиьИШ',  keys:['1B','RF'],           startDeg:28, endDeg:45, color:'#16a085',inner:'#0e6655'},
  ];
  function pxy(deg){
    var rd=deg*Math.PI/180;
    return{x:cx+r*Math.sin(rd),y:cy-r*Math.cos(rd)};
  }
  function f(v){return v.toFixed(1);}
  var sc=SECTORS.map(function(s){
    return Object.assign({},s,{count:s.keys.reduce(function(a,k){return a+(entries.filter(function(e){return e.zone===k;}).length);},0)});
  });
  var total=sc.reduce(function(a,x){return a+x.count;},0);
  var noData=total===0;

function applyPitBaseAdv(oc){
  if(!S.game)return;
  if(!S.pitBases)S.pitBases={b1:null,b2:null,b3:null};
  if(typeof S.pitOuts!=='number')S.pitOuts=0;
  var b={b1:S.pitBases.b1,b2:S.pitBases.b2,b3:S.pitBases.b3};
  var scored=[];
  var batEarned=(oc!=='E'&&oc!=='KWP');
  if(oc==='HR'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    scored.push({earned:batEarned});
    b.b1=null;b.b2=null;b.b3=null;
  }else if(oc==='3B'){
    if(b.b1)scored.push(b.b1);if(b.b2)scored.push(b.b2);if(b.b3)scored.push(b.b3);
    b.b1=null;b.b2=null;b.b3={earned:batEarned};
  }else if(oc==='2B'){
    if(b.b3)scored.push(b.b3);if(b.b2)scored.push(b.b2);
    b.b3=b.b1?b.b1:null;b.b2={earned:batEarned};b.b1=null;
  }else if(oc==='1B'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1={earned:batEarned};
  }else if(oc==='E'){
    if(b.b3)scored.push(b.b3);
    b.b3=b.b2;b.b2=b.b1;b.b1={earned:false};
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null){
      if(b.b2!=null){
        if(b.b3!=null){scored.push(b.b3);b.b3=b.b2;}
        else{b.b3=b.b2;}
        b.b2=b.b1;
      }else{b.b2=b.b1;}
    }
    b.b1={earned:batEarned};
  }else if(oc==='FC'){
    S.pitOuts++;
    b.b1={earned:true};
  }else if(oc==='K'||oc==='GO'||oc==='FO'){
    S.pitOuts++;
  }else if(oc==='DP'){
    S.pitOuts+=2;b.b1=null;
  }else if(oc==='SF'){
    S.pitOuts++;
    if(b.b3){scored.push(b.b3);b.b3=null;}
  }else if(oc==='SH'){
    S.pitOuts++;
    if(b.b3){scored.push(b.b3);}
    b.b3=b.b2;b.b2=b.b1;b.b1=null;
  }
  S.pitBases={b1:b.b1,b2:b.b2,b3:b.b3};
  if(scored.length&&S.curPit!=null){
    var pp=ROSTER.find(function(x){return x.no===S.curPit;});
    if(pp){
      scored.forEach(function(r){S.pit_runs.push({id:UID(),gid:S.game.id,pno:pp.no,pn:pp.name,earned:r.earned});});
      var erC=scored.filter(function(r){return r.earned;}).length;
      var uerC=scored.length-erC;
    }
  }
  if(S.pitOuts>=3)S.pitOuts=3;
}

function scoreRunnerBase(pno){
  if(!S.game||pno==null)return;
  var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});
  if(ents.length){ents[ents.length-1].run=(ents[ents.length-1].run||0)+1;}
  else{var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});S.blog.push({id:UID(),gid:S.game.id,date:S.game.date,opp:S.game.opp,pno:pno,pn:p?p.name:'#'+pno,oc:'_RUN',rbi:0,run:1,sb:0,cs:0});}
}
function calcAutoRBI(oc){
  var b=S.bases;
  if(oc==='HR')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0)+1;
  if(oc==='3B')return (b.b1!=null?1:0)+(b.b2!=null?1:0)+(b.b3!=null?1:0);
  if(oc==='2B')return 0;
  if(oc==='1B')return 0;
  if(oc==='SF')return (b.b3!=null?1:0);
  if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP')return (b.b1!=null&&b.b2!=null&&b.b3!=null)?1:0;
  return 0;
}
function applyBaseAdvancement(oc,pno){
  if(!S.game)return;
  var b={b1:S.bases.b1,b2:S.bases.b2,b3:S.bases.b3};
  if(oc==='HR'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    scoreRunnerBase(pno);S.bases={b1:null,b2:null,b3:null};
  }else if(oc==='3B'){
    if(b.b1!=null)scoreRunnerBase(b.b1);if(b.b2!=null)scoreRunnerBase(b.b2);if(b.b3!=null)scoreRunnerBase(b.b3);
    S.bases={b1:null,b2:null,b3:pno};
  }else if(oc==='2B'){
    var b3sc2=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2sc2=b.b2!=null&&S.runnerDecisions&&S.runnerDecisions[b.b2];
    var b1sc2=b.b1!=null&&S.runnerDecisions&&S.runnerDecisions[b.b1];
    if(b3sc2&&S.runnerDecisions[b.b3]!=='scored')scoreRunnerBase(b.b3);
    if(b2sc2&&S.runnerDecisions[b.b2]!=='scored')scoreRunnerBase(b.b2);
    if(b1sc2&&S.runnerDecisions[b.b1]!=='scored')scoreRunnerBase(b.b1);
    var nb3_2=null;
    if(b.b3!=null&&!b3sc2)nb3_2=b.b3;
    else if(b.b2!=null&&!b2sc2)nb3_2=b.b2;
    else if(b.b1!=null&&!b1sc2)nb3_2=b.b1;
    S.bases={b1:null,b2:pno,b3:nb3_2};
  }else if(oc==='1B'){
    var b3sc1=b.b3!=null&&S.runnerDecisions&&S.runnerDecisions[b.b3];
    var b2sc1=b.b2!=null&&S.runnerDecisions&&S.runnerDecisions[b.b2];
    if(b3sc1&&S.runnerDecisions[b.b3]!=='scored')scoreRunnerBase(b.b3);
    if(b2sc1&&S.runnerDecisions[b.b2]!=='scored')scoreRunnerBase(b.b2);
    var nb3_1=null,nb2_1=null;
    if(b.b3!=null&&!b3sc1){
      nb3_1=b.b3;
      // b3ъ░А ьЮФыги: b2ыПД ызЙэША 2ыги ьЮФыеШ тЖТ b1ьЭА ьзДыги ы╢Иъ░А(ыЛиьИЬэЩФ)
      nb2_1=(b.b2!=null&&!b2sc1)?b.b2:b.b1;
    }else{
      // b3 ыУЭьаР ыШРыКФ ьЧЖьЭМ: b2ъ░А 3ыги ьзДыги or ыУЭьаР
      if(b.b2!=null&&!b2sc1)nb3_1=b.b2;
      nb2_1=b.b1; // b1 ъ░ХьаЬ 2ыги ьзДыги
    }
    S.bases={b1:pno,b2:nb2_1,b3:nb3_1};
  }else if(oc==='BB'||oc==='IBB'||oc==='HBP'||oc==='KWP'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
  }else if(oc==='E'){
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('ь╢Фъ░А ьзДыгиыКФ ы▓аьЭ┤ьКд эШДэЩйьЧРьДЬ ьЭ┤ыПЩэХШьД╕ьЪФ','');
  }else if(oc==='FC'){
    S.outs=(S.outs||0)+1;
    if(b.b1!=null&&b.b2!=null&&b.b3!=null){scoreRunnerBase(b.b3);S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null&&b.b2!=null){S.bases={b1:pno,b2:b.b1,b3:b.b2};}
    else if(b.b1!=null){S.bases={b1:pno,b2:b.b1,b3:b.b3};}
    else{S.bases={b1:pno,b2:b.b2,b3:b.b3};}
    toast('ьХДьЫГыРЬ ьг╝ьЮРые╝ ы▓аьЭ┤ьКд эШДэЩйьЧРьДЬ ьаЬъ▒░эХ┤ьг╝ьД╕ьЪФ','');
  }else if(oc==='K'||oc==='GO'||oc==='FO'){
    S.outs=(S.outs||0)+1;
  }else if(oc==='DP'){
    S.outs=(S.outs||0)+2;S.bases={b1:null,b2:b.b2,b3:b.b3};
  }else if(oc==='SF'){
    S.outs=(S.outs||0)+1;if(b.b3!=null)scoreRunnerBase(b.b3);S.bases={b1:b.b1,b2:b.b2,b3:null};
  }else if(oc==='SH'){
    S.outs=(S.outs||0)+1;if(b.b3!=null)scoreRunnerBase(b.b3);
    S.bases={b1:null,b2:b.b1!=null?b.b1:null,b3:b.b2!=null?b.b2:null};
  }
}
function advanceBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  var lbl=(p?p.name:'ьДаьИШ')+(base==='b3'?' эЩИьЭ╕':base==='b2'?' 3ыги ьзДыги':' 2ыги ьзДыги');
  pushUndo(snapBaseSt(lbl));
  if(base==='b3'){
    scoreRunnerBase(pno);
    var sc=S.game?gameScore(S.game.id):{our:0,opp:0};
    S.bases.b3=null;
    save();renderGHdr();renderCt();toast((p?p.name:'ьДаьИШ')+' эЩИьЭ╕! '+sc.our+' : '+sc.opp,'ok');
  }else if(base==='b2'){
    S.bases.b3=pno;S.bases.b2=null;
    save();renderCt();toast((p?p.name:'ьДаьИШ')+' 3ыги ьзДыги','ok');
  }else if(base==='b1'){
    S.bases.b2=pno;S.bases.b1=null;
    save();renderCt();toast((p?p.name:'ьДаьИШ')+' 2ыги ьзДыги','ok');
  }
}
function stealBase(base){
  var pno=S.bases[base];if(pno==null)return;
  var p=ROSTER.find(function(x){return Number(x.no)===Number(pno);});
  pushUndo(snapBaseSt((p?p.name:'ьДаьИШ')+' ыПДыги ьД▒ъ│╡'));
  if(base==='b1'){S.bases.b2=pno;S.bases.b1=null;}
  else if(base==='b2'){S.bases.b3=pno;S.bases.b2=null;}
  else if(base==='b3'){scoreRunnerBase(pno);S.bases.b3=null;}
  if(S.game){var ents=S.blog.filter(function(e){return e.gid===S.game.id&&Number(e.pno)===Number(pno);});if(ents.length)ents[ents.length-1].sb=(ents[ents.length-1].sb||0)+1;}
  save();renderGHdr();renderCt();
  toast((p?p.name:'ьДаьИШ')+' ыПДыги ьД▒ъ│╡!','ok');
}
function caughtBase(base){
  var pno=S.bases[base];if(pno==null)return;

  save();renderCt();
  toast((p?p.name:'ьДаьИШ')+' ыПДыги ьЛдэМи','');
}

function toggleSibling(no,sibNo){
  var allA=ROSTER.filter(function(x){return x.no===no;});
  var allB=ROSTER.filter(function(x){return x.no===sibNo;});
  if(!allA.length||!allB.length)return;
  // ь╢Фъ░А/ьаЬъ▒░ ьЧмы╢АыКФ ь▓л эХныкй ъ╕░ьдАьЬ╝ыбЬ ъ▓░ьаХ
  if(!allA[0].siblings)allA[0].siblings=[];
  var adding=allA[0].siblings.indexOf(sibNo)<0;
  // ъ░ЩьЭА ы▓ИэШ╕ьЭШ ыкиыУа эХныкй(эГАьЮР+эИмьИШ)ьЧР ыПЩьЭ╝эХШъ▓М ьаБьЪй
  allA.forEach(function(p){
    if(!p.siblings)p.siblings=[];
    var i=p.siblings.indexOf(sibNo);
    if(adding&&i<0)p.siblings.push(sibNo);
    else if(!adding&&i>=0)p.siblings.splice(i,1);
  });
  allB.forEach(function(p){
    if(!p.siblings)p.siblings=[];
    var i=p.siblings.indexOf(no);
    if(adding&&i<0)p.siblings.push(no);
    else if(!adding&&i>=0)p.siblings.splice(i,1);
  });
  S.rosterDirty=true;save();
  var modal=ROSTER.find(function(x){return x.no===no;});
  showEditPlayerModal(no,modal?modal.r:'b');
}

function confirmEditGame(gid){

// DB ьаДэЩШ ьЛЬ ьЭ┤ ъ░Эь▓┤ ыВ┤ы╢АызМ ъ╡Рь▓┤. ьХ▒ ыбЬьзБьЭА ы│Аъ▓╜ ы╢ИэХДьЪФ.
const API={
  _u:function(){return S.scriptUrl;},
  _t:function(){return S.scriptToken?'&token='+encodeURIComponent(S.scriptToken):'';},
  _tk:function(){return S.scriptToken||'';},
  async sync(games,bat_log,pit_bf,pit_runs,deleted_gids){
    var res=await fetch(this._u(),{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
      body:JSON.stringify({type:'sync',token:this._tk(),games:games,bat_log:bat_log,pit_bf:pit_bf,pit_runs:pit_runs,deleted_gids:deleted_gids})});
    return res.json();
  },
  async fetchGames(){
    var res=await fetch(this._u()+'?action=fetchGames'+this._t());
    return res.json();
  },
  async fetchRecords(gids){
    var res=await fetch(this._u()+'?action=fetchRecords&gids='+encodeURIComponent(gids.join(','))+this._t());
    return res.json();
  },
  async fetchAll(){
    var res=await fetch(this._u()+'?action=fetch'+this._t());
    return res.json();
  },
  async saveRoster(roster){
    var rp=encodeURIComponent(JSON.stringify(roster));
    var res=await fetch(this._u()+'?action=saveRoster&data='+rp+this._t());
    return res.json();
  }
};

// эК╣ьаХ ъ▓╜ъ╕░ыУдьЭШ ъ╕░ыбЭызМ ьДЬы▓ДьЧРьДЬ ъ░Аьа╕ьЩА ыбЬь╗мьЧР ы│СэХй
async function fetchRecordsByGids(gids){
  if(!S.scriptUrl||!navigator.onLine||!gids||!gids.length)return{ok:false,reason:'offline or no gids'};
  try{
    var data=await API.fetchRecords(gids);
    if(data.status!=='ok')return{ok:false,reason:data.message||'ьДЬы▓Д ьШдыеШ'};
    var gidSet=new Set(gids);
    // ыбЬь╗м ып╕ыПЩъ╕░эЩФ(эО╕ьзС/ьЛаъ╖Ь) ыаИь╜ФыУЬ ы│┤ьб┤, ьДЬы▓Д ыаИь╜ФыУЬьЩА ь╢йыПМ ьЧЖьЭ┤ ы│СэХй
    function mergeRecords(local,server){
      var localForGids=local.filter(function(e){return gidSet.has(e.gid);});
      var localUnsynced=localForGids.filter(function(e){return !S.syncedIds.has(e.id);});
      var unsyncedIds=new Set(localUnsynced.map(function(e){return e.id;}));
      return [
        ...local.filter(function(e){return !gidSet.has(e.gid);}), // ым┤ъ┤АэХЬ ъ▓╜ъ╕░ ьЬаьзА
        ...localUnsynced, // ыбЬь╗м ып╕ыПЩъ╕░эЩФ ыаИь╜ФыУЬ ьЬаьзА
        ...(server||[]).filter(function(e){return !unsyncedIds.has(e.id);}) // ьДЬы▓Д ыаИь╜ФыУЬ (ыбЬь╗м эО╕ьзСы│╕ъ│╝ ь╢йыПМ ьаЬьЩ╕)
      ];
    }
    S.blog=mergeRecords(S.blog,data.bat_log);
    S.pit_bf=mergeRecords(S.pit_bf,data.pit_bf);
    S.pit_runs=mergeRecords(S.pit_runs,data.pit_runs);
    (data.bat_log||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_bf||[]).forEach(function(e){S.syncedIds.add(e.id);});
    (data.pit_runs||[]).forEach(function(e){S.syncedIds.add(e.id);});
    gids.forEach(function(gid){S.downloadedGids.add(gid);});
    save();
    return{ok:true,count:(data.bat_log||[]).length+(data.pit_bf||[]).length+(data.pit_runs||[]).length};
  }catch(e){console.error('fetchRecordsByGids',e);return{ok:false,reason:e.message};}
}

// эЖ╡ъ│Д эГн: ып╕ыЛдьЪ┤ыбЬыУЬ ъ▓╜ъ╕░ ъ╕░ыбЭ ьЮРыПЩ fetch

async function fetchGamesOnly(){
  if(!S.scriptUrl||!navigator.onLine)return{ok:false,reason:'offline'};
  try{
    const data=await API.fetchGames();
    if(data.status!=='ok')return{ok:false,reason:data.message||'ьДЬы▓Д ьШдыеШ'};
    const tombF=new Set(data.tombstone_gids||[]);
    if(tombF.size&&S.game&&tombF.has(S.game.id)){
      tombF.delete(S.game.id);
      toast('тЪа ьЭ┤ ъ▓╜ъ╕░ъ░А ыЛдые╕ ъ╕░ъ╕░ьЧРьДЬ ьВньаЬыРРьзАызМ ьзДэЦЙ ьдСьЭ┤ыпАыбЬ ьЬаьзАыРйыЛИыЛд','err');
    }
    // tombstone ьаБьЪй: ыбЬь╗мьЭШ ьВньаЬыРЬ ъ▓╜ъ╕░ ыН░ьЭ┤эД░ ьаХыжм
    var tombApplied=0;
    if(tombF.size){
      const before=S.games.length+S.blog.length+S.pit_bf.length+S.pit_runs.length;
      S.games=S.games.filter(function(g){return !tombF.has(g.id);});
      S.blog=S.blog.filter(function(e){return !tombF.has(e.gid);});
      S.pit_bf=S.pit_bf.filter(function(e){return !tombF.has(e.gid);});
      S.pit_runs=S.pit_runs.filter(function(e){return !tombF.has(e.gid);});
      S.deletedGids=(S.deletedGids||[]).filter(function(gid){return !tombF.has(gid);});
      tombApplied=before-(S.games.length+S.blog.length+S.pit_bf.length+S.pit_runs.length);
    }
    const localDel=new Set(S.deletedGids||[]);
    var added=0,updated=0;
    (data.games||[]).forEach(function(g){
      if(tombF.has(g.id)||localDel.has(g.id))return;
      var idx=S.games.findIndex(function(x){return x.id===g.id;});
      if(idx>=0){
        if(S.syncedIds.has('g_'+g.id)){
          S.games[idx]=Object.assign({},S.games[idx],g);
        }
        updated++;
      } else {
        S.games.push(g);
        S.syncedIds.add('g_'+g.id);
        added++;
      }
    });
    // S.gameьЭД ъ░▒ьЛа: endedый┤ ъ▓МьЮД эХ┤ьаЬ
    if(S.game){
      var fg=S.games.find(function(x){return x.id===S.game.id;});
      if(fg&&fg.status==='ended')S.game=null;
      else if(fg)S.game=Object.assign({},S.game,fg);
    }
    if(added||updated||tombApplied)save();
    return{ok:true,added:added};
  }catch(e){console.error('fetchGamesOnly',e);return{ok:false,reason:e.message};}
}
async function pushGamesOnly(){
  if(!S.scriptUrl||!navigator.onLine)return{ok:false,reason:'offline'};
  const gP=S.games.filter(function(g){return !S.syncedIds.has('g_'+g.id);});
  if(!gP.length)return{ok:true,pushed:0};
  try{
    const data=await API.sync(gP,[],[],[],[]);
    if(data.status!=='ok')return{ok:false,reason:data.message||'ьДЬы▓Д ьШдыеШ'};
    gP.forEach(function(g){S.syncedIds.add('g_'+g.id);S.downloadedGids.add(g.id);});
    save();
    return{ok:true,pushed:gP.length};
  }catch(e){console.error('pushGamesOnly',e);return{ok:false,reason:e.message};}
}
async function doSync(){
  if(!S.scriptUrl||S.syncing)return;
  const bP=S.blog.filter(e=>!S.syncedIds.has(e.id));
  const pfP=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
  const prP=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));
  const gP=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
  const dG=S.deletedGids||[];
  if(!bP.length&&!pfP.length&&!prP.length&&!gP.length&&!dG.length&&!S.rosterDirty){toast('ыПЩъ╕░эЩФэХа ыН░ьЭ┤эД░ ьЧЖьЭМ');return;}
  S.syncing=true;r();
  try{
    if(bP.length||pfP.length||prP.length||gP.length||dG.length){
      const data=await API.sync(gP,bP,pfP,prP,dG);
      if(data.status!=='ok')throw new Error(data.message||'ьДЬы▓Д ьШдыеШ');
      // tombstone ьаБьЪй: ьзДэЦЙ ьдСьЭ╕ ъ▓╜ъ╕░ыКФ ьЮРыПЩ ьаЬьЩ╕ эЫД ыВШыи╕ьзАызМ ьВньаЬ
      const tomb=new Set(data.tombstone_gids||[]);
      if(tomb.size&&S.game&&tomb.has(S.game.id)){
        tomb.delete(S.game.id);
        toast('тЪа ьЭ┤ ъ▓╜ъ╕░ъ░А ыЛдые╕ ъ╕░ъ╕░ьЧРьДЬ ьВньаЬыРРьзАызМ ьзДэЦЙ ьдСьЭ┤ыпАыбЬ ьЬаьзАыРйыЛИыЛд','err');
      }
      if(tomb.size){
        S.games=S.games.filter(g=>!tomb.has(g.id));
        S.blog=S.blog.filter(e=>!tomb.has(e.gid));
        S.pit_bf=S.pit_bf.filter(e=>!tomb.has(e.gid));
        S.pit_runs=S.pit_runs.filter(e=>!tomb.has(e.gid));
        S.deletedGids=(S.deletedGids||[]).filter(gid=>!tomb.has(gid));
      }
      // ьДЬы▓ДьЧРьДЬ ыЭ╜ьЬ╝ыбЬ ьВньаЬ ъ▒░ы╢АыРЬ gidыКФ deletedGidsьЧР ьЬаьзА (ъ▓╜ъ╕░ ьвЕыгМ эЫД ьЮмьЛЬыПД)
      const lockedSet=new Set(data.locked_gids||[]);
      if(lockedSet.size){toast('тЪа ьзДэЦЙ ьдСьЭ╕ ъ▓╜ъ╕░('+lockedSet.size+'ъ▒┤)ыКФ ьДЬы▓ДьЧРьДЬ ьВньаЬъ░А ъ▒░ы╢АыРРьК╡ыЛИыЛд','err');}
      bP.forEach(e=>{S.syncedIds.add(e.id);if(e.gid)S.downloadedGids.add(e.gid);});
      pfP.forEach(e=>{S.syncedIds.add(e.id);if(e.gid)S.downloadedGids.add(e.gid);});
      prP.forEach(e=>{S.syncedIds.add(e.id);if(e.gid)S.downloadedGids.add(e.gid);});
      gP.forEach(g=>{S.syncedIds.add('g_'+g.id);S.downloadedGids.add(g.id);});
      // ыЭ╜ьЬ╝ыбЬ ъ▒░ы╢АыРЬ gidыКФ ьВньаЬ ыМАъ╕░ьЧ┤ьЧР ьЬаьзА, ыВШыи╕ьзАыКФ ьаЬъ▒░
      S.deletedGids=(S.deletedGids||[]).filter(gid=>lockedSet.has(gid));
    }
    if(S.rosterDirty){
      const rd=await API.saveRoster(ROSTER);
      if(rd.status==='ok')S.rosterDirty=false;
    }
    S.lastSync=Date.now();save();
    const total=bP.length+pfP.length+prP.length;
    const delMsg=dG.length?' ┬╖ '+dG.length+'ъ▓╜ъ╕░ ьВньаЬ':'';
    toast('тШБ ыПЩъ╕░эЩФ ьЩДыгМ ('+(total>0?total+'ъ▒┤':'ьДаьИШыкЕыЛи')+delMsg+'ьаДьЖб)','ok');
  }catch(e){toast('ыПЩъ╕░эЩФ ьЛдэМи: '+e.message,'err');console.error(e);}
  S.syncing=false;r();
}
async function loadFromSheets(){
  if(!S.scriptUrl){toast('ыи╝ьаА URLьЭД ьаАьЮеэХ┤ьг╝ьД╕ьЪФ','err');return;}
  S.loading=true;r();
  try{
    const data=await API.fetchAll();
    if(data.status!=='ok')throw new Error(data.message||'ьШдыеШ');

    // ьДЬы▓Дъ░А ъ╢МьЬД(source of truth): ьДЬы▓Д ыН░ьЭ┤эД░ыбЬ ъ╡Рь▓┤
    // ыЛи, ьХДьзБ ыПЩъ╕░эЩФ ьХИ ыРЬ ыбЬь╗м ьаДьЪй эХныкйьЭА ы│┤ьб┤
    const unsyncedGames=S.games.filter(g=>!S.syncedIds.has('g_'+g.id));
    const unsyncedBlog=S.blog.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitBf=S.pit_bf.filter(e=>!S.syncedIds.has(e.id));
    const unsyncedPitRuns=S.pit_runs.filter(e=>!S.syncedIds.has(e.id));

    const svrGameIds=new Set((data.games||[]).map(g=>g.id));
    const svrBlogIds=new Set((data.bat_log||[]).map(e=>e.id));
    const svrPitBfIds=new Set((data.pit_bf||[]).map(e=>e.id));
    const svrPitRunIds=new Set((data.pit_runs||[]).map(e=>e.id));
    const tombSet=new Set(data.tombstone_gids||[]);
    if(tombSet.size&&S.game&&tombSet.has(S.game.id)){
      tombSet.delete(S.game.id);
      toast('тЪа ьЭ┤ ъ▓╜ъ╕░ъ░А ыЛдые╕ ъ╕░ъ╕░ьЧРьДЬ ьВньаЬыРРьзАызМ ьзДэЦЙ ьдСьЭ┤ыпАыбЬ ьЬаьзАыРйыЛИыЛд','err');
    }

    // ьДЬы▓Д ыН░ьЭ┤эД░ + ыбЬь╗м ып╕ыПЩъ╕░эЩФ эХныкй ы│СэХй (ьДЬы▓ДьЧР ьЭ┤ып╕ ьЮИыКФ ъ▒┤ ьаЬьЩ╕, tombstoneыРЬ gid ьаЬьЩ╕)
    S.games=[...(data.games||[]),...unsyncedGames.filter(g=>!svrGameIds.has(g.id)&&!tombSet.has(g.id))];
    S.blog=[...(data.bat_log||[]),...unsyncedBlog.filter(e=>!svrBlogIds.has(e.id)&&!tombSet.has(e.gid))];
    S.pit_bf=[...(data.pit_bf||[]),...unsyncedPitBf.filter(e=>!svrPitBfIds.has(e.id)&&!tombSet.has(e.gid))];
    S.pit_runs=[...(data.pit_runs||[]),...unsyncedPitRuns.filter(e=>!svrPitRunIds.has(e.id)&&!tombSet.has(e.gid))];

    if(data.roster&&data.roster.length>0){parseRosterSiblings(data.roster);ROSTER.splice(0,ROSTER.length,...data.roster);S.rosterDirty=false;}

    // syncedIds + downloadedGids ьЮмъ╡мьД▒
    S.syncedIds=new Set();
    S.downloadedGids=new Set();
    (data.games||[]).forEach(g=>{S.syncedIds.add('g_'+g.id);S.downloadedGids.add(g.id);});
    (data.bat_log||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_bf||[]).forEach(e=>S.syncedIds.add(e.id));
    (data.pit_runs||[]).forEach(e=>S.syncedIds.add(e.id));

    // tombstoneьЧР ьЮИыКФ gidыКФ deletedGidsьЧРьДЬыПД ьаЬъ▒░ (ьЭ┤ып╕ ьШБъ╡м ьВньаЬыРи)
    S.deletedGids=(S.deletedGids||[]).filter(gid=>svrGameIds.has(gid)&&!tombSet.has(gid));

    // S.gameьЭД ьДЬы▓Д ы▓ДьаДьЬ╝ыбЬ ъ░▒ьЛа: endedый┤ ъ▓МьЮД эХ┤ьаЬ, ьЧЖьЬ╝ый┤(tombstone) эХ┤ьаЬ
    if(S.game){
      var svrGame=S.games.find(function(g){return g.id===S.game.id;});
      if(!svrGame||svrGame.status==='ended')S.game=null;
      else S.game=Object.assign({},S.game,svrGame);
    }

    save();
    const svrTotal=(data.games||[]).length+(data.bat_log||[]).length+(data.pit_bf||[]).length+(data.pit_runs||[]).length;
    const rMsg=data.roster&&data.roster.length>0?' / ьДаьИШ '+data.roster.length+'ыкЕ':'';
    toast('тЬУ ы╢ИыЯмьШдъ╕░ ьЩДыгМ ('+svrTotal+'ъ▒┤)'+rMsg,'ok');
    var dups=checkDuplicateGames();
    if(dups.length)setTimeout(function(){toast('тЪа ьдСы│╡ ъ▓╜ъ╕░ '+dups.length+'ъ▒┤ ъ░РьзА тАФ ьДдьаХьЧРьДЬ ь▓ШыжмэХШьД╕ьЪФ','err');},1800);
  }catch(e){toast('ы╢ИыЯмьШдъ╕░ ьЛдэМи тАФ URL эЩХьЭ╕','err');console.error(e);}
  S.loading=false;r();
}

  navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(function(reg){
    reg.update();
  }).catch(function(e){console.log('SW registration failed',e);});
  navigator.serviceWorker.addEventListener('controllerchange',function(){window.location.reload();});
}
